    function ensureCloudClient() {
      if (supabaseClient && cloudReady) return true;
      const { url, anonKey } = getCloudConfig();
      if (!url || !anonKey) {
        showToast("云同步配置缺失，请联系网站管理员");
        return false;
      }
      supabaseClient = { url, anonKey, session: loadCloudSession() };
      currentUser = supabaseClient.session?.user || null;
      cloudReady = true;
      updateCloudUi();
      return true;
    }

    async function loadCloudData() {
      if (!supabaseClient || !currentUser) return;
      cloudLoading = true;
      setCloudStatus("syncing");
      try {
        const rows = await cloudRequest(`/rest/v1/todo_data?user_id=eq.${encodeURIComponent(currentUser.id)}&select=tasks,settings,templates`, {
          method: "GET"
        }, true);
        const data = Array.isArray(rows) ? rows[0] : rows;
        if (data) {
          tasks = normalizeTasks(data.tasks || []);
          const cloudSettings = data.settings || {};
          settings = normalizeSettings({ ...DEFAULT_SETTINGS, ...cloudSettings });
          const cloudViewState = normalizeViewState(cloudSettings.viewState);
          viewState = chooseLatestViewState(viewState, loadViewState(), settings.viewState);
          settings.viewState = viewState;
          const shouldPushLocalViewState = viewState && (!cloudViewState || viewState.savedAt > cloudViewState.savedAt);
          dayStates = normalizeDayStates(cloudSettings.dayStates || {});
          dayNotes = normalizeDayNotes(cloudSettings.dayNotes || []);
          taskTemplates = normalizeTemplates(data.templates || []);
          saveLocalSnapshot();
          applySettings();
          renderSelects();
          if (viewState) {
            restoringViewState = true;
            renderAround(new Date(viewState.year, viewState.month, 1));
            restoreViewState(viewState);
          } else {
            renderAround(bootAutoScrollActive ? new Date() : new Date(currentYear, currentMonth, 1));
            if (bootAutoScrollActive) scrollToTodayOnBoot();
          }
          showToast("已加载云端数据");
          if (shouldPushLocalViewState) setTimeout(() => saveCloudData(), 0);
        } else if (tasks.length || taskTemplates.length) {
          await saveCloudData();
          showToast("已把本地数据迁移到云端");
        }
        setCloudStatus("synced");
      } catch (error) {
        setCloudStatus("error");
        showToast("云端数据读取失败");
        console.error(error);
      } finally {
        cloudLoading = false;
        updateCloudUi();
      }
    }

    function queueCloudSave() {
      if (cloudLoading || !supabaseClient || !currentUser) return;
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => saveCloudData(), 700);
    }

    async function saveCloudData() {
      if (!supabaseClient || !currentUser) return;
      const latestViewState = chooseLatestViewState(viewState, settings.viewState, loadViewState());
      if (latestViewState) {
        viewState = latestViewState;
        settings.viewState = latestViewState;
      }
      setCloudStatus("syncing");
      const payload = {
        user_id: currentUser.id,
        tasks,
        settings: { ...settings, dayStates, dayNotes },
        templates: taskTemplates,
        updated_at: new Date().toISOString()
      };
      try {
        await cloudRequest("/rest/v1/todo_data?on_conflict=user_id", {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates,return=minimal" },
          body: JSON.stringify(payload)
        }, true);
      } catch (error) {
        setCloudStatus("error");
        showToast("云同步失败");
        console.error(error);
        return false;
      }
      lastCloudSyncAt = Date.now();
      setCloudStatus("synced");
      updateCloudUi();
      return true;
    }

    function getCloudConfig() {
      const url = (localStorage.getItem(SUPABASE_URL_KEY) || SUPABASE_URL || "").replace(/\/+$/, "");
      const anonKey = localStorage.getItem(SUPABASE_ANON_KEY_KEY) || SUPABASE_ANON_KEY || "";
      return { url, anonKey };
    }

    function getSiteUrl() {
      return `${window.location.origin}${window.location.pathname}`;
    }

    function getAuthErrorMessage(error) {
      const message = String(error?.message || "");
      if (/invalid login/i.test(message)) return "邮箱或密码不正确。";
      if (/email not confirmed/i.test(message)) return "邮箱还没有确认，请先点击确认邮件里的链接。";
      if (/already registered|already exists/i.test(message)) return "这个邮箱已经注册，请直接登录。";
      return message || "操作失败，请稍后重试。";
    }

    function loadCloudSession() {
      try {
        const raw = localStorage.getItem(SUPABASE_SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function setCloudSession(session) {
      if (!session?.access_token) throw new Error("登录响应无效");
      session.expires_at_ms = Date.now() + Math.max(Number(session.expires_in || 3600) - 60, 60) * 1000;
      session.user = session.user || parseJwtUser(session.access_token);
      localStorage.setItem(SUPABASE_SESSION_KEY, JSON.stringify(session));
      supabaseClient.session = session;
      currentUser = session.user || currentUser;
      updateCloudUi();
    }

    function parseJwtUser(token) {
      try {
        const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
        return { id: payload.sub, email: payload.email };
      } catch {
        return null;
      }
    }

    async function refreshCloudSession() {
      const session = supabaseClient?.session || loadCloudSession();
      if (!session?.refresh_token) return null;
      if (session.expires_at_ms && session.expires_at_ms > Date.now()) return session;
      const refreshed = await cloudRequest("/auth/v1/token?grant_type=refresh_token", {
        method: "POST",
        body: JSON.stringify({ refresh_token: session.refresh_token })
      }, false);
      setCloudSession(refreshed);
      return refreshed;
    }

    async function cloudRequest(path, options = {}, needAuth = true) {
      if (!supabaseClient) ensureCloudClient();
      const session = needAuth ? await refreshCloudSession() : null;
      const headers = {
        apikey: supabaseClient.anonKey,
        Authorization: `Bearer ${needAuth ? session?.access_token : supabaseClient.anonKey}`,
        "Content-Type": "application/json",
        ...(options.headers || {})
      };
      const response = await fetch(`${supabaseClient.url}${path}`, { ...options, headers });
      if (!response.ok) {
        let message = `${response.status} ${response.statusText}`;
        try {
          const data = await response.json();
          message = data.msg || data.message || data.error_description || message;
        } catch {}
        throw new Error(message);
      }
      if (response.status === 204) return null;
      const text = await response.text();
      return text ? JSON.parse(text) : null;
    }

    function saveLocalSnapshot() {
      const latestViewState = chooseLatestViewState(viewState, settings.viewState, loadViewState());
      if (latestViewState) {
        viewState = latestViewState;
        settings.viewState = latestViewState;
        saveViewStateLocal(latestViewState);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(taskTemplates));
      localStorage.setItem(DAY_STATES_KEY, JSON.stringify(dayStates));
      localStorage.setItem(DAY_NOTES_KEY, JSON.stringify(dayNotes));
    }

    function getCloudStatusText() {
      return cloudStatus === "syncing" ? "同步中"
        : cloudStatus === "synced" ? "已同步"
        : cloudStatus === "error" ? "同步失败"
        : currentUser ? "已同步" : "登录";
    }

    function updateCloudUi() {
      const { url, anonKey } = getCloudConfig();
      const configured = Boolean(url && anonKey);
      const statusText = getCloudStatusText();

        ? `已登录：${currentUser.email || currentUser.id}`

      els.accountStatus.classList.toggle("synced", currentUser && (cloudStatus === "synced" || cloudStatus === "idle"));
      els.accountStatus.classList.toggle("error", cloudStatus === "error");

      }
    }

    function setCloudStatus(status) {
      cloudStatus = status;
      updateCloudUi();
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? normalizeTasks(JSON.parse(raw)) : [];
      } catch {
        return [];
      }
    }

    function loadTemplates() {
      try {
        const raw = localStorage.getItem(TEMPLATES_KEY);
        return raw ? normalizeTemplates(JSON.parse(raw)) : [];
      } catch {
        return [];
      }
    }

    function loadDayStates() {
      try {
        const raw = localStorage.getItem(DAY_STATES_KEY);
        return raw ? normalizeDayStates(JSON.parse(raw)) : {};
      } catch {
        return {};
      }
    }

    function loadDayNotes() {
      try {
        const raw = localStorage.getItem(DAY_NOTES_KEY);
        return raw ? normalizeDayNotes(JSON.parse(raw)) : [];
      } catch {
        return [];
      }
    }

    function normalizeDayStates(value) {
      if (!value || typeof value !== "object" || Array.isArray(value)) return {};
      return Object.fromEntries(Object.entries(value).filter(([key, state]) => isDateKey(key) && ["good", "bad"].includes(state)));
    }

    function normalizeDayNotes(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .filter(row => row && isDateKey(row.date) && String(row.text || "").trim())
        .map(row => ({
          id: row.id || createId(),
          date: row.date,
          text: String(row.text || "").trim().slice(0, 1000),
          done: Boolean(row.done),
          createdAt: Number(row.createdAt) || Date.now(),
          sortIndex: Number.isFinite(Number(row.sortIndex)) ? Number(row.sortIndex) : Number(row.createdAt) || Date.now()
        }));
    }

    function normalizeTemplates(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .filter(row => row && (row.title || row.text))
        .map(row => ({
          id: row.id || createId(),
          title: String(row.title || row.text || "").trim(),
          category: normalizeCategoryId(row.category),
          priority: normalizePriority(row.priority),
          note: String(row.note || ""),
          progress: normalizeProgress(row.progress),
          createdAt: Number(row.createdAt) || Date.now()
        }))
        .filter(row => row.title);
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        if (parsed.version !== DEFAULT_SETTINGS.version && (Number(parsed.dayMinHeight) < 300 || Number(parsed.dayMinHeight) > 600)) {
          parsed.dayMinHeight = DEFAULT_SETTINGS.dayMinHeight;
        }
        return normalizeSettings({ ...DEFAULT_SETTINGS, ...parsed });
      } catch {
        return normalizeSettings({ ...DEFAULT_SETTINGS });
      }
    }

    function loadViewState() {
      try {
        const raw = localStorage.getItem(VIEW_STATE_KEY);
        return normalizeViewState(raw ? JSON.parse(raw) : null);
      } catch {
        return null;
      }
    }

    function saveViewStateLocal(state) {
      const next = normalizeViewState(state);
      if (!next) return;
      localStorage.setItem(VIEW_STATE_KEY, JSON.stringify(next));
    }

    function applySettings() {
      settings = normalizeSettings(settings);
      const density = DENSITY[settings.taskDensity] || DENSITY.standard;
      document.documentElement.style.setProperty("--day-min-h", `${settings.dayMinHeight}px`);
      document.documentElement.style.setProperty("--task-min-h", `${density.taskMinHeight}px`);
      document.documentElement.style.setProperty("--task-font-size", `${density.taskFontSize}px`);
      document.documentElement.style.setProperty("--task-pad-x", `${density.taskPadX}px`);
    }

    function normalizeSettings(value) {
      const next = { ...DEFAULT_SETTINGS, ...(value || {}) };
      next.dayMinHeight = clamp(Number(next.dayMinHeight) || DEFAULT_SETTINGS.dayMinHeight, 300, 600);
      next.version = DEFAULT_SETTINGS.version;
      next.taskDensity = DENSITY[next.taskDensity] ? next.taskDensity : DEFAULT_SETTINGS.taskDensity;
      next.taskDisplay = ["title", "note"].includes(next.taskDisplay) ? next.taskDisplay : DEFAULT_SETTINGS.taskDisplay;
      next.defaultCategory = DEFAULT_SETTINGS.defaultCategory;
      next.otherMonthMode = ["dim", "hideTasks"].includes(next.otherMonthMode) ? next.otherMonthMode : DEFAULT_SETTINGS.otherMonthMode;
      next.weekendStyle = ["normal", "tint"].includes(next.weekendStyle) ? next.weekendStyle : DEFAULT_SETTINGS.weekendStyle;
      next.dragEnabled = next.dragEnabled !== false;
      next.monthTintEnabled = next.monthTintEnabled !== false;
      next.lunarEnabled = next.lunarEnabled !== false;
      next.holidayEnabled = next.holidayEnabled !== false;
      next.specialDates = Array.isArray(next.specialDates) ? next.specialDates.filter(isValidSpecialDate) : [];
      next.categories = {};
      next.viewState = normalizeViewState(next.viewState);
      return next;
    }

    function normalizeViewState(value) {
      if (!value || typeof value !== "object") return null;
      const year = Number(value.year);
      const month = Number(value.month);
      const scrollY = Number(value.scrollY);
      const savedAt = Number(value.savedAt);
      const anchorDate = isDateKey(value.anchorDate) ? value.anchorDate : null;
      const anchorOffset = Number(value.anchorOffset);
      if (!Number.isInteger(year) || year < 1970 || year > 2100) return null;
      if (!Number.isInteger(month) || month < 0 || month > 11) return null;
      if (!Number.isFinite(scrollY) || scrollY < 0) return null;
      if (!Number.isFinite(savedAt) || savedAt <= 0) return null;
      const next = {
        year,
        month,
        scrollY: Math.max(0, Math.round(scrollY)),
        savedAt
      };
      if (anchorDate) {
        next.anchorDate = anchorDate;
        next.anchorOffset = Number.isFinite(anchorOffset) && anchorOffset >= 0 ? Math.round(anchorOffset) : 0;
      }
      return next;
    }

    function chooseLatestViewState(...states) {
      return states
        .map(normalizeViewState)
        .filter(Boolean)
        .sort((a, b) => b.savedAt - a.savedAt)[0] || null;
    }

    function getCategories() {
      return CATEGORIES;
    }

    function normalizeCategoryId(value) {
      return value === "work" ? "work" : "personal";
    }

    function renderColorPalette(selectedColor, scope, id = "") {
      return `<div class="color-palette" data-color-scope="${scope}" data-color-id="${id}">
        ${renderColorSwatches(selectedColor, scope, id)}
      </div>`;
    }

    function renderColorSwatches(selectedColor, scope, id = "") {
      const selected = isHexColor(selectedColor) ? selectedColor.toLowerCase() : "#8b5cf6";
      const colors = COLOR_SWATCHES.some(color => color.toLowerCase() === selected)
        ? COLOR_SWATCHES
        : [selectedColor, ...COLOR_SWATCHES];
      return colors.map(color => `
          <button class="color-swatch ${color.toLowerCase() === selected ? "active" : ""}" type="button" style="--swatch-color:${color}" aria-label="选择颜色 ${color}" onclick="selectPaletteColor('${scope}','${id}','${color}')"></button>
        `).join("");
    }

    function selectPaletteColor(scope, id, color) {
      if (!isHexColor(color)) return;
      const root = document.querySelector(".special-editor");
      if (!root) return;
      const input = els.specialColor;
      if (input) input.value = color;
      root.querySelectorAll(`[data-color-scope="${scope}"] .color-swatch`).forEach(btn => {
        btn.classList.toggle("active", btn.style.getPropertyValue("--swatch-color").trim().toLowerCase() === color.toLowerCase());
      });
    }

    function renderSpecialDateList() {
      if (!settings.specialDates.length) {
        els.specialDateList.innerHTML = '<div class="special-list"><div class="special-item"><span class="special-dot" style="--special-color:#cbd5e1"></span><span>暂无特殊日期</span></div></div>';
        return;
      }
      els.specialDateList.innerHTML = `<div class="special-list">${settings.specialDates.map(item => `
        <div class="special-item" data-special-id="${item.id}">
          <span class="special-dot" style="--special-color:${item.color}"></span>
          <span>${escapeHtml(item.name)} · ${item.type === "lunar" ? "农历" : "公历"} ${item.month}月${item.day}日</span>
          <span class="special-actions">
            <button class="mini-btn" type="button" onclick="editSpecialDate('${item.id}')">编辑</button>
            <button class="mini-btn bad" type="button" onclick="removeSpecialDate('${item.id}')">×</button>
          </span>
        </div>
      `).join("")}</div>`;
    }

    function addSpecialDateFromForm() {
      const item = {
        id: editingSpecialDateId || createId(),
        type: els.specialType.value === "lunar" ? "lunar" : "solar",
        month: clamp(Number(els.specialMonth.value) || 0, 1, 12),
        day: clamp(Number(els.specialDay.value) || 0, 1, 31),
        name: els.specialName.value.trim() || "特殊日期",
        color: isHexColor(els.specialColor.value) ? els.specialColor.value : "#8b5cf6"
      };
      if (!isValidSpecialDate(item)) {
        showToast("请填写有效的特殊日期");
        return;
      }
      if (editingSpecialDateId) {
        settings.specialDates = settings.specialDates.map(row => row.id === editingSpecialDateId ? item : row);
        showToast("特殊日期已更新");
      } else {
        settings.specialDates = [...settings.specialDates, item];
        showToast("特殊日期已添加");
      }
      resetSpecialDateEditor();
      renderSpecialDateList();
      renderVisibleWeeks();
    }

    function editSpecialDate(id) {
      const item = settings.specialDates.find(row => row.id === id);
      if (!item) return;
      editingSpecialDateId = id;
      els.specialType.value = item.type;
      els.specialMonth.value = item.month;
      els.specialDay.value = item.day;
      els.specialName.value = item.name;
      selectPaletteColor("special", "", item.color);
      document.getElementById("addSpecialDateBtn").textContent = "保存";
    }

    function resetSpecialDateEditor() {
      editingSpecialDateId = null;
      els.specialMonth.value = "";
      els.specialDay.value = "";
      els.specialName.value = "";
      els.specialType.value = "solar";
      els.specialColor.value = "#8b5cf6";
      if (els.specialColorPalette) {
        els.specialColorPalette.dataset.colorScope = "special";
        els.specialColorPalette.dataset.colorId = "";
        els.specialColorPalette.innerHTML = renderColorSwatches(els.specialColor.value, "special", "");
      }
      document.getElementById("addSpecialDateBtn").textContent = "添加";
    }

    function removeSpecialDate(id) {
      settings.specialDates = settings.specialDates.filter(item => item.id !== id);
      if (editingSpecialDateId === id) resetSpecialDateEditor();
      renderSpecialDateList();
      renderVisibleWeeks();
      showToast("特殊日期已删除");
    }

    function isValidSpecialDate(item) {
      return item && ["solar", "lunar"].includes(item.type) && Number(item.month) >= 1 && Number(item.month) <= 12 && Number(item.day) >= 1 && Number(item.day) <= 31 && typeof item.name === "string" && item.name.trim() && isHexColor(item.color);
    }

    function renderDateInlineMeta(date, marks) {
      const chips = [];
      const lunar = getLunarInfo(date);
      const pushChip = mark => {
        if (!mark?.name || chips.some(chip => chip.name === mark.name)) return;
        chips.push(mark);
      };
      if (settings.lunarEnabled && lunar?.display) pushChip({ kind: "lunar", name: lunar.display });
      marks.filter(mark => mark.kind === "special").forEach(pushChip);
      marks.filter(mark => mark.kind !== "special").forEach(pushChip);
      if (!chips.length) return "";
      return `<span class="date-inline-meta" title="${escapeAttr(chips.map(chip => chip.name).join(" · "))}">
        ${chips.map((chip, index) => {
          const style = chip.kind === "special" ? ` style="--special-color:${chip.color}"` : "";
          const sep = index ? '<span class="date-inline-sep">·</span>' : "";
          return `${sep}<span class="date-inline-chip ${chip.kind}"${style}>${escapeHtml(chip.name)}</span>`;
        }).join("")}
      </span>`;
    }

    function getDateMarks(date) {
      const key = toKey(date);
      const monthDay = key.slice(5);
      const marks = [];
      const lunar = getLunarInfo(date);
      const official = settings.holidayEnabled ? getOfficialHoliday(date) : null;
      const holiday = official || (settings.holidayEnabled ? HOLIDAY_2026[key] : null);
      if (holiday) marks.push({ kind: holiday.type === "workday" ? "workday" : "holiday", name: holiday.name });
      for (const item of settings.specialDates) {
        if (matchesSpecialDate(item, date, lunar)) marks.push({ kind: "special", name: item.name, color: item.color });
      }
      const solarFestival = SOLAR_FESTIVALS[monthDay];
      if (solarFestival && !hasEquivalentMark(marks, solarFestival)) marks.push({ kind: "festival", name: solarFestival });
      if (lunar) {
        const lunarFestival = LUNAR_FESTIVALS[`${lunar.month}-${lunar.day}`];
        if (lunarFestival && !hasEquivalentMark(marks, lunarFestival)) marks.push({ kind: "festival", name: lunarFestival });
      }
      return marks;
    }

    function matchesSpecialDate(item, date, lunar) {
      if (item.type === "solar") return date.getMonth() + 1 === item.month && date.getDate() === item.day;
      return lunar && lunar.month === item.month && lunar.day === item.day;
    }

    function getLunarInfo(date) {
      const chineseDays = window.chineseDays;
      if (chineseDays?.getLunarDate) {
        try {
          const info = chineseDays.getLunarDate(toKey(date));
          if (info?.lunarMon && info?.lunarDay) {
            const monthName = info.lunarMonCN || "";
            const dayName = info.lunarDayCN || LUNAR_DAY_NAMES[info.lunarDay - 1] || String(info.lunarDay);
            return {
              month: Number(info.lunarMon),
              day: Number(info.lunarDay),
              monthName,
              dayName,
              display: Number(info.lunarDay) === 1 ? `${monthName}${dayName}` : dayName
            };
          }
        } catch {}
      }
      try {
        var parts = new Intl.DateTimeFormat("zh-CN-u-ca-chinese", { month: "long", day: "numeric" }).formatToParts(date);
        var monthName = (parts.find(part => part.type === "month") || {}).value || "";
        var day = Number((parts.find(part => part.type === "day") || {}).value);
        var month = LUNAR_MONTH_NUM[monthName.replace("闰", "")];
        if (!month || !day) return null;
        var dayName = LUNAR_DAY_NAMES[day - 1] || `${day}`;
        return { month, day, monthName, dayName, display: day === 1 ? `${monthName}${dayName}` : dayName };
      } catch {
        return null;
      }
    }

    function getOfficialHoliday(date) {
      const chineseDays = window.chineseDays;
      if (!chineseDays?.getDayDetail) return null;
      try {
        const detail = chineseDays.getDayDetail(toKey(date));
        const name = normalizeHolidayName(detail?.name);
        if (!name) return null;
        return { type: detail.work ? "workday" : "holiday", name: detail.work ? "调休" : name };
      } catch {
        return null;
      }
    }

    function hasEquivalentMark(marks, name) {
      const key = normalizeFestivalKey(name);
      return marks.some(mark => normalizeFestivalKey(mark.name) === key);
    }

    function normalizeFestivalKey(name) {
      return String(name || "")
        .replace(/[节日]/g, "")
        .replace(/劳动/g, "五一")
        .trim();
    }

    function normalizeHolidayName(name) {
      if (!name || /^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)$/i.test(String(name))) return "";
      const parts = String(name).split(/[,\uff0c]/).map(part => part.trim()).filter(Boolean);
      const chinese = parts.find(part => /[\u4e00-\u9fff]/.test(part));
      return chinese || parts[0] || "";
    }

    function hexToSoftBg(hex) {
      const clean = isHexColor(hex) ? hex.slice(1) : "2563eb";
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, .12)`;
    }

    function isHexColor(value) {
      return typeof value === "string" && /^#[0-9a-fA-F]{6}$/.test(value);
    }

    function normalizeTasks(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .filter(row => row && (row.title || row.image?.src || row.contentBlocks?.length))
        .map(row => {
          const contentBlocks = normalizeContentBlocks(row.contentBlocks || (row.image?.src ? [{ type: "image", ...row.image }] : []));
          return {
            id: row.id || createId(),
            title: String(row.title || row.text || deriveTitleFromBlocks(contentBlocks)).trim(),
            date: isDateKey(row.date) ? row.date : toKey(new Date()),
            category: normalizeCategoryId(row.category || row.cat),
            priority: normalizePriority(row.priority),
            note: String(row.note || ""),
            progress: normalizeProgress(row.progress),
            done: Boolean(row.done),
            contentBlocks,
            sortIndex: Number.isFinite(Number(row.sortIndex)) ? Number(row.sortIndex) : Number(row.createdAt) || Date.now(),
            createdAt: Number(row.createdAt) || Date.now()
          };
        })
        .filter(row => row.title);
    }

    function normalizeContentBlocks(blocks) {
      if (!Array.isArray(blocks)) return [];
      return blocks.map(block => {
        if (block?.type === "image" && typeof block.src === "string" && block.src.startsWith("data:image/")) {
          return {
            type: "image",
            src: block.src,
            width: Number(block.width) || 0,
            height: Number(block.height) || 0,
            mime: block.mime || block.type || "image/webp",
            createdAt: Number(block.createdAt) || Date.now()
          };
        }
        const text = cleanPastedText(block?.text);
        if (block?.type === "text" && text) {
          return { type: "text", text, createdAt: Number(block.createdAt) || Date.now() };
        }
        return null;
      }).filter(Boolean).slice(0, 20);
    }

    function getTaskBlocks(task) {
      return normalizeContentBlocks(task.contentBlocks || (task.image?.src ? [{ type: "image", ...task.image }] : []));
    }

    function normalizeProgress(value) {
      if (value === "" || value === null || value === undefined) return null;
      const text = String(value).trim();
      if (!/^\d+$/.test(text)) return null;
      const number = Number(text);
      return Number.isInteger(number) && number >= 1 && number <= 100 ? number : null;
    }

    function normalizePriority(value) {
      return Object.prototype.hasOwnProperty.call(PRIORITIES, value) ? value : "normal";
    }

    function deriveTitleFromBlocks(blocks) {
      const text = blocks.find(block => block.type === "text")?.text;
      if (text) return text.split(/\r?\n/)[0].slice(0, 80);
      if (blocks.some(block => block.type === "image")) return "图片事项";
      return "";
    }

    function deriveFullTitleFromBlocks(blocks) {
      const text = blocks.find(block => block.type === "text")?.text;
      if (text) return text.replace(/\r\n/g, "\n").trim().slice(0, 500);
      if (blocks.some(block => block.type === "image")) return "图片事项";
      return "";
    }

    function taskOrder(a, b) {
      return orderValue(a) - orderValue(b)
        || (Number(a.createdAt) || 0) - (Number(b.createdAt) || 0);
    }

    function noteOrder(a, b) {
      return orderValue(a) - orderValue(b)
        || (Number(a.createdAt) || 0) - (Number(b.createdAt) || 0);
    }

    function orderValue(item) {
      const sortIndex = Number(item.sortIndex);
      if (Number.isFinite(sortIndex)) return sortIndex;
      const createdAt = Number(item.createdAt);
      return Number.isFinite(createdAt) ? createdAt : 0;
    }

    function nextSortIndex(dateKey) {
      const sameDay = tasks.filter(task => task.date === dateKey);
      return sameDay.length ? Math.max(...sameDay.map(orderValue)) + 1 : 0;
    }

    function nextNoteSortIndex(dateKey) {
      const sameDay = dayNotes.filter(note => note.date === dateKey);
      return sameDay.length ? Math.max(...sameDay.map(orderValue)) + 1 : 0;
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      queueCloudSave();
    }

    function persistTemplates() {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(taskTemplates));
      queueCloudSave();
    }

    function persistDayData() {
      localStorage.setItem(DAY_STATES_KEY, JSON.stringify(dayStates));
      localStorage.setItem(DAY_NOTES_KEY, JSON.stringify(dayNotes));
      queueCloudSave();
    }

    function getCategory(id) {
      const categoryId = normalizeCategoryId(id);
      return getCategories().find(cat => cat.id === categoryId) || getCategories()[0];
    }

    function getWeekDates(monday) {
      const dates = [];
      const start = getMonday(monday);
      for (let i = 0; i < 7; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        dates.push(date);
      }
      return dates;
    }

    function getMonday(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      return d;
    }

    function toKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function parseKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function isDateKey(value) {
      return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
    }

    function isToday(date) {
      return toKey(date) === toKey(new Date());
    }

    function createId() {
      return `task_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getStickyOffset() {
      const topbar = document.querySelector(".topbar").getBoundingClientRect().height;
      const weekday = window.matchMedia("(max-width: 720px)").matches ? 0 : document.querySelector(".weekday").getBoundingClientRect().height;
      return topbar + weekday;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1600);
    }

    function throttle(fn, wait) {
      let timer = null;
      return function throttled() {
        if (timer) return;
        timer = setTimeout(() => {
          timer = null;
          fn();
        }, wait);
      };
    }
  </script>
</body>
</html>
