<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极简待办</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f1f4f8;
      --line: #e1e6ed;
      --line-strong: #c8d1dc;
      --text: #1f2933;
      --muted: #6f7b88;
      --quiet: #9aa5b1;
      --primary: #2563eb;
      --primary-soft: #eaf1ff;
      --green: #10b981;
      --red: #e5484d;
      --amber: #f59e0b;
      --shadow: 0 12px 32px rgba(31, 41, 51, .08);
      --radius: 8px;
      --topbar-h: 64px;
      --weekday-h: 40px;
      --day-min-h: 360px;
      --task-min-h: 30px;
      --task-font-size: 13px;
      --task-pad-x: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--topbar-h);
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, .92);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: auto auto minmax(240px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 128px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-label {
      min-width: 120px;
      text-align: center;
      font-size: 16px;
      font-weight: 760;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 132px 112px;
      gap: 8px;
      min-width: 0;
    }

    .search, .select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: 0;
    }

    .search {
      width: 100%;
      padding: 0 12px;
    }

    .select {
      padding: 0 10px;
    }

    .search:focus, .select:focus, .task-input:focus, .modal :is(textarea, input, select, [contenteditable="true"]):focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .account-pill {
      min-height: 38px;
      max-width: 180px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-pill.syncing {
      color: #1d4ed8;
      background: #eaf1ff;
      border-color: #bfdbfe;
    }

    .account-pill.synced {
      color: #047857;
      background: #ecfdf5;
      border-color: #a7f3d0;
    }

    .account-pill.error {
      color: #b91c1c;
      background: #fff1f2;
      border-color: #fecaca;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 650;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--line-strong); }
    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.icon {
      width: 38px;
      padding: 0;
      font-size: 18px;
    }

    .weekday {
      position: sticky;
      top: var(--topbar-h);
      z-index: 20;
      min-height: var(--weekday-h);
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    .weekday span {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: .04em;
    }

    .calendar {
      padding: 1px 0 28px;
    }

    .sentinel {
      height: 1px;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .month-band-a .day:not(.is-today):not(.drag-over) {
      background: #ffffff;
    }

    .month-band-b .day:not(.is-today):not(.drag-over) {
      background: #fbfcff;
    }

    .month-start {
      position: relative;
    }

    .month-start::before {
      content: attr(data-month-title);
      position: absolute;
      left: 10px;
      top: -1px;
      z-index: 2;
      padding: 2px 8px;
      border: 1px solid #d7e2f2;
      border-radius: 0 0 7px 7px;
      background: rgba(248, 251, 255, .94);
      color: #64748b;
      font-size: 11px;
      font-weight: 750;
      pointer-events: none;
    }

    .day {
      min-width: 0;
      min-height: var(--day-min-h);
      background: var(--panel);
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .day.other-month {
      background: #fbfcfd;
      color: var(--quiet);
    }

    .day.other-month.hide-other-tasks .task-list {
      display: none;
    }

    .day.weekend.weekend-tint:not(.is-today) {
      background: #fffafa;
    }

    .day.weekend.weekend-tint:not(.is-today) .date-num {
      color: #d94665;
    }

    .day.is-today {
      position: relative;
      z-index: 1;
      background: #f5f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .42);
    }

    .day.is-today::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(37, 99, 235, .55);
    }

    .day:hover:not(.drag-over) {
      background: #f4f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .22);
    }

    .day.drag-over {
      background: #dbe8ff;
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .day.selected-day {
      background: #f7fbff;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .34);
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 24px;
    }

    .date-main {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }

    .date-extra {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: var(--quiet);
      font-size: 11px;
      line-height: 1;
      margin-top: 3px;
    }

    .date-lunar {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: -3px;
      min-height: 18px;
    }

    .date-badge {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 750;
      line-height: 1.2;
      color: #64748b;
      background: #eef2f7;
    }

    .date-badge.holiday {
      color: #b45309;
      background: rgba(245, 158, 11, .16);
    }

    .date-badge.workday {
      color: #64748b;
      background: rgba(100, 116, 139, .14);
    }

    .date-badge.festival {
      color: #be123c;
      background: rgba(244, 63, 94, .13);
    }

    .date-badge.term {
      color: #047857;
      background: rgba(16, 185, 129, .13);
    }

    .date-badge.special {
      color: var(--special-color, #7c3aed);
      background: var(--special-bg, rgba(124, 58, 237, .13));
    }

    .day.has-holiday:not(.is-today) {
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, .14);
    }

    .day.has-special:not(.is-today) {
      background: linear-gradient(180deg, var(--special-bg, rgba(124, 58, 237, .14)), rgba(255,255,255,.96) 52px);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--special-color, #7c3aed) 28%, transparent);
    }

    .day.has-special {
      position: relative;
    }

    .day.has-special::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 5px;
      background: var(--special-color, #7c3aed);
      opacity: .78;
      pointer-events: none;
    }

    .date-num {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .date-week {
      display: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .today-pill {
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 760;
    }

    .add-day {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--quiet);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
    }

    .day:hover .add-day {
      border-color: var(--line);
      background: #fff;
      color: var(--primary);
    }

    .task-list {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .task {
      min-height: var(--task-min-h);
      border: 1px solid color-mix(in srgb, var(--cat-color) 24%, var(--line));
      border-left: 4px solid var(--cat-color, var(--primary));
      border-radius: 7px;
      background: var(--cat-bg, #fff);
      padding: 3px 5px 3px var(--task-pad-x);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      cursor: grab;
      transition: box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .task.has-image {
      align-items: stretch;
      grid-template-columns: minmax(0, 1fr);
      padding: 6px;
      gap: 6px;
    }

    .task:hover {
      box-shadow: 0 4px 14px rgba(31, 41, 51, .08);
    }

    .task.dragging {
      opacity: .45;
      cursor: grabbing;
    }

    .drop-marker {
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    body.dragging-task {
      user-select: none;
    }

    .task.done {
      opacity: .72;
      filter: saturate(.65);
    }

    .task.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-title {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: var(--task-font-size);
      line-height: 1.25;
      font-weight: 700;
    }

    .task-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(148, 163, 184, .22);
      pointer-events: none;
    }

    .task-content {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .task-content-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task.has-image .task-main {
      display: grid;
      gap: 5px;
    }

    .task.has-image .task-title {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .task.has-image .task-actions {
      opacity: 1;
      justify-content: flex-start;
    }

    .task-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
    }

    .tag {
      border-radius: 5px;
      padding: 1px 5px;
      background: var(--panel-soft);
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .note {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .task-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      opacity: .18;
      transition: opacity .15s ease;
    }

    .task:hover .task-actions,
    .task:focus-within .task-actions {
      opacity: 1;
    }

    .mini-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
    }

    .mini-btn:hover { border-color: var(--line-strong); color: var(--text); }
    .mini-btn.good:hover { color: var(--green); border-color: #a7f3d0; background: #ecfdf5; }
    .mini-btn.bad:hover { color: var(--red); border-color: #fecaca; background: #fff1f2; }

    .empty-hint {
      color: var(--quiet);
      font-size: 12px;
      opacity: 0;
      transition: opacity .16s ease;
      padding: 6px 2px;
    }

    .day:hover .empty-hint { opacity: 1; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, .34);
      opacity: 0;
      transition: opacity .18s ease;
    }

    .modal-backdrop.show {
      display: flex;
      opacity: 1;
    }

    .modal-backdrop.closing {
      opacity: 0;
    }

    .modal {
      width: min(520px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      transform: translateY(10px) scale(.985);
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
    }

    .modal-backdrop.show .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-backdrop.closing .modal {
      transform: translateY(8px) scale(.99);
      opacity: 0;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .modal-grid {
      display: grid;
      gap: 10px;
    }

    .modal textarea,
    .modal input,
    .modal select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: 0;
      padding: 0 11px;
    }

    .modal textarea {
      min-height: 120px;
      resize: vertical;
      padding-top: 10px;
    }

    #taskTitle {
      min-height: 180px;
      padding: 12px;
      resize: vertical;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #taskTitle:empty::before {
      content: attr(data-placeholder);
      color: var(--quiet);
      pointer-events: none;
    }

    #taskTitle img {
      display: block;
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .modal-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .auth-status {
      min-height: 32px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
    }

    .auth-switch {
      margin-top: 4px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .auth-mode-link {
      min-height: 28px;
      border: 0;
      background: transparent;
      color: var(--primary);
      padding: 0;
      font-weight: 750;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-modal {
      width: min(760px, 96vw);
    }

    .settings-tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      overflow-x: auto;
    }

    .settings-tab {
      min-height: 32px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .settings-tab.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--primary);
      box-shadow: 0 1px 2px rgba(31, 41, 51, .06);
    }

    .settings-panel {
      display: none;
      gap: 12px;
    }

    .settings-panel.active {
      display: grid;
    }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
      align-items: center;
    }

    .setting-row label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .setting-row input[type="range"] {
      width: 100%;
    }

    .setting-help {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .setting-field {
      display: grid;
      gap: 6px;
    }

    .setting-field label,
    .category-settings-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .settings-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .category-settings {
      display: grid;
      gap: 8px;
    }

    .category-setting {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .category-setting input[type="color"] {
      width: 40px;
      height: 36px;
      padding: 2px;
    }

    .special-editor {
      display: grid;
      grid-template-columns: 112px 64px 64px minmax(0, 1fr) 44px auto;
      gap: 8px;
      align-items: center;
    }

    .special-editor input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 9px;
      outline: 0;
    }

    .special-editor input[type="color"] {
      width: 44px;
      padding: 2px;
    }

    .special-list {
      display: grid;
      gap: 6px;
    }

    .special-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
    }

    .special-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--special-color);
      flex: 0 0 auto;
    }

    .special-item span:nth-child(2) {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 30px;
      padding: 8px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .paste-zone {
      display: grid;
      gap: 8px;
      min-height: 168px;
      padding: 10px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfd;
      color: var(--muted);
      font-size: 12px;
      align-content: start;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .paste-zone:focus-within,
    .paste-zone.is-ready {
      border-color: var(--primary);
      background: #f5f8ff;
      color: var(--text);
    }

    .paste-zone button {
      justify-self: start;
    }

    .paste-zone-hint {
      color: var(--muted);
      line-height: 1.5;
    }

    .content-blocks {
      display: grid;
      gap: 8px;
    }

    .content-blocks:empty {
      display: none;
    }

    .content-block {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      line-height: 1.55;
    }

    .content-block img {
      width: min(100%, 360px);
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block-actions {
      display: flex;
      justify-content: flex-end;
    }

    .template-save {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      justify-self: start;
      min-height: 26px;
      padding: 2px 4px;
    }

    .template-save input {
      width: 16px;
      height: 16px;
    }

    .template-chip {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .template-chip button {
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
    }

    .bulk-grid {
      display: grid;
      gap: 10px;
    }

    .bulk-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .bulk-preview {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (prefers-reduced-motion: reduce) {
      .modal-backdrop,
      .modal {
        transition: none;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 70;
      transform: translateX(-50%) translateY(20px);
      border-radius: 8px;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }
      .month-nav {
        justify-content: flex-end;
      }
      .filters {
        grid-column: 1 / -1;
        grid-template-columns: minmax(180px, 1fr) 140px 120px;
      }
      .actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }

    @media (max-width: 720px) {
      :root { --topbar-h: auto; }
      .topbar {
        position: static;
        grid-template-columns: 1fr;
        padding: 14px;
      }
      .brand, .month-nav, .actions { justify-content: space-between; }
      .filters { grid-template-columns: 1fr; }
      .weekday { display: none; }
      .calendar { padding: 0 12px 24px; }
      .week {
        display: block;
        border: 0;
        background: transparent;
      }
      .day {
        min-height: auto;
        margin: 10px 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: 0 1px 2px rgba(31, 41, 51, .04);
      }
      .day.other-month {
        opacity: .7;
      }
      .day.is-today {
        box-shadow: inset 0 0 0 2px var(--primary), 0 8px 22px rgba(37, 99, 235, .12);
      }
      .date-week { display: inline; }
      .date-extra { margin-top: 0; }
      .empty-hint { opacity: 1; }
      .modal-row { grid-template-columns: 1fr; }
      .settings-two { grid-template-columns: 1fr; }
      .special-editor { grid-template-columns: 1fr 1fr; }
      .bulk-row { grid-template-columns: 1fr; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">待</div>
      <h1>极简待办</h1>
    </div>

    <nav class="month-nav" aria-label="月份导航">
      <button class="btn icon" id="prevMonthBtn" title="上个月">‹</button>
      <div class="month-label" id="monthLabel">--</div>
      <button class="btn icon" id="nextMonthBtn" title="下个月">›</button>
      <button class="btn" id="currentMonthBtn">当月</button>
      <button class="btn" id="todayBtn">今天</button>
    </nav>

    <div class="filters">
      <input class="search" id="searchInput" type="search" placeholder="搜索任务" autocomplete="off" />
      <select class="select" id="categoryFilter"></select>
      <select class="select" id="statusFilter">
        <option value="all">全部状态</option>
        <option value="open">未完成</option>
        <option value="done">已完成</option>
      </select>
    </div>

    <div class="actions">
      <span class="account-pill" id="accountStatus">本地模式</span>
      <button class="btn" id="authBtn">登录</button>
      <button class="btn" id="settingsBtn">设置</button>
      <button class="btn" id="exportBtn">导出</button>
      <button class="btn" id="importBtn">导入</button>
      <button class="btn primary" id="newTaskBtn">新任务</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <div class="weekday" aria-hidden="true">

    <span>周二</span>
    <span>周三</span>
    <span>周四</span>
    <span>周五</span>
    <span>周六</span>
    <span>周日</span>

  <main class="calendar" id="calendar">
    <div class="sentinel" id="topSentinel"></div>
    <div id="weeks"></div>
    <div class="sentinel" id="bottomSentinel"></div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="taskForm">
      <h2 id="modalTitle">新任务</h2>

        </div>
        <input id="taskNote" type="text" placeholder="备注，可选" maxlength="120" />

          <input id="saveTemplateCheck" type="checkbox" />

        <div class="template-strip" id="templateStrip"></div>
      </div>
      <div class="modal-actions">

        <button class="btn" type="button" id="cancelBtn">取消</button>
        <button class="btn primary" type="submit">保存</button>
      </div>
    </form>
  </div>

    function renderAround(date) {
      const start = getMonday(new Date(date.getFullYear(), date.getMonth(), 1));
      start.setDate(start.getDate() - 28);
      const weeks = [];
      const cursor = new Date(start);
      for (let i = 0; i < 18; i++) {
        weeks.push(getWeekDates(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = weeks[0][0];
      lastSunday = weeks[weeks.length - 1][6];
      els.weeks.innerHTML = weeks.map(renderWeek).join("");
      updateMonthFromScroll();
    }

    function renderVisibleWeeks() {
      document.querySelectorAll(".week").forEach(week => {
        const dates = JSON.parse(week.dataset.dates).map(parseKey);
        week.outerHTML = renderWeek(dates);
      });
      updateMonthFromScroll();
    }

    function renderWeek(dates) {
      const middle = dates[3];
      const monthKey = `${middle.getFullYear()}-${middle.getMonth()}`;
      const dateKeys = dates.map(toKey);
      const startsMonth = dates.some(d => d.getDate() === 1);
      const monthTitleDate = dates.find(d => d.getDate() === 1) || middle;
      const monthBand = settings.monthTintEnabled ? (monthTitleDate.getMonth() % 2 === 0 ? "month-band-a" : "month-band-b") : "";
      return `<section class="week ${monthBand} ${startsMonth ? "month-start" : ""}" data-month="${monthKey}" data-month-title="${monthTitleDate.getFullYear()}年${monthTitleDate.getMonth()+1}月" data-dates='${JSON.stringify(dateKeys)}'>
        ${dates.map(date => renderDay(date, monthKey)).join("")}
      </section>`;
    }

    function renderDay(date, monthKey) {
      const key = toKey(date);
      const dayMonthKey = `${date.getFullYear()}-${date.getMonth()}`;
      const isOtherMonth = dayMonthKey !== monthKey;
      const dayTasks = isOtherMonth && settings.otherMonthMode === "hideTasks" ? [] : getVisibleTasksForDate(key);
      const today = isToday(date);
      const weekend = date.getDay() === 0 || date.getDay() === 6;
      const weekday = WEEKDAYS[(date.getDay() + 6) % 7];
      const marks = getDateMarks(date);
      const special = marks.find(mark => mark.kind === "special");
      const style = special ? ` style="--special-color:${special.color};--special-bg:${hexToSoftBg(special.color)}"` : "";
      const classes = [
        "day",
        isOtherMonth ? "other-month" : "",
        isOtherMonth && settings.otherMonthMode === "hideTasks" ? "hide-other-tasks" : "",
        weekend ? "weekend" : "",
        settings.weekendStyle === "tint" ? "weekend-tint" : "",
        marks.some(mark => mark.kind === "holiday") ? "has-holiday" : "",
        special ? "has-special" : "",
        today ? "is-today" : "",
        selectedDateKey === key ? "selected-day" : ""
      ].filter(Boolean).join(" ");
      return `<article class="${classes}" data-date="${key}"${style} ondblclick="openModal('${key}')">
        <div class="day-head">
          <div class="date-main">
            <span class="date-num">${date.getDate()}</span>
            <span class="date-week">${weekday}</span>
            ${today ? '<span class="today-pill">今天</span>' : ""}
          </div>
          <button class="add-day" type="button" title="添加任务" onclick="event.stopPropagation();openModal('${key}')">+</button>
        </div>
        ${renderDateMeta(date, marks)}
        <div class="task-list" data-date="${key}">
          ${dayTasks.length ? dayTasks.map(renderTask).join("") : '<div class="empty-hint">双击或点 + 添加</div>'}
        </div>
      </article>`;
    }

    function renderTask(task) {
      const cat = getCategory(task.category);
      const showCategory = settings.taskDisplay === "category" || settings.taskDisplay === "note";
      const showNote = settings.taskDisplay === "note" && task.note;
      const blocks = getTaskBlocks(task);
      const visibleBlocks = blocks.filter(block => block.type === "image").slice(0, 3);
      const hasImage = blocks.some(block => block.type === "image");
      return `<div class="task ${task.done ? "done" : ""} ${hasImage ? "has-image" : ""}" draggable="${settings.dragEnabled ? "true" : "false"}" data-task-id="${task.id}" data-task-date="${task.date}" style="--cat-color:${cat.color};--cat-bg:${cat.bg}" ondblclick="event.stopPropagation();openModal('${task.date}','${task.id}')">
        <div class="task-main">
          ${visibleBlocks.length ? `<div class="task-content">${visibleBlocks.map(renderTaskBlock).join("")}</div>` : ""}
          <p class="task-title">${escapeHtml(task.title)}</p>
          ${showCategory ? `<span class="tag">${escapeHtml(cat.name)}</span>` : ""}
          ${showNote ? `<span class="note">${escapeHtml(task.note)}</span>` : ""}
        </div>
        <div class="task-actions">
          <button class="mini-btn good" type="button" title="${task.done ? "取消完成" : "完成"}" onclick="event.stopPropagation();toggleTask('${task.id}')">${task.done ? "↩" : "✓"}</button>
          <button class="mini-btn" type="button" title="编辑" onclick="event.stopPropagation();openModal('${task.date}','${task.id}')">✎</button>
          <button class="mini-btn bad" type="button" title="删除" onclick="event.stopPropagation();deleteTask('${task.id}')">×</button>
        </div>
      </div>`;
    }

    function renderTaskBlock(block) {
      if (block.type === "image") return `<img class="task-image" src="${escapeAttr(block.src)}" alt="图片内容" loading="lazy" />`;
      if (block.type === "text") return `<p class="task-content-text">${escapeHtml(block.text)}</p>`;
      return "";
    }

    function getVisibleTasksForDate(key) {
      const query = els.searchInput.value.trim().toLowerCase();
      const category = els.categoryFilter.value;
      const status = els.statusFilter.value;
      return tasks
        .filter(task => task.date === key)
        .filter(task => category === "all" || task.category === category)
        .filter(task => status === "all" || (status === "done" ? task.done : !task.done))
        .filter(task => !query || task.title.toLowerCase().includes(query) || (task.note || "").toLowerCase().includes(query) || getTaskBlocks(task).some(block => block.type === "text" && block.text.toLowerCase().includes(query)))
        .sort(taskOrder);
    }

    function handleDragStart(event) {
      if (!settings.dragEnabled) {
        event.preventDefault();
        return;
      }
      const taskEl = event.target.closest(".task");
      if (!taskEl) return;
      if (event.target.closest("button")) {
        event.preventDefault();
        return;
      }
      draggingTaskId = taskEl.dataset.taskId;
      taskEl.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggingTaskId);
    }

    function handleDragEnd() {
      draggingTaskId = null;
      dropBeforeTaskId = null;
      document.querySelectorAll(".task.dragging").forEach(el => el.classList.remove("dragging"));
      document.querySelectorAll(".day.drag-over").forEach(el => el.classList.remove("drag-over"));
      document.querySelectorAll(".drop-marker").forEach(el => el.remove());
    }

    function handleDragOver(event) {
      if (!settings.dragEnabled || !draggingTaskId) return;
      const day = event.target.closest(".day");
      if (!day) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      document.querySelectorAll(".day.drag-over").forEach(el => {
        if (el !== day) el.classList.remove("drag-over");
      });
      day.classList.add("drag-over");
      const position = getDropPosition(day, event.clientY);
      dropBeforeTaskId = position.beforeId;
      placeDropMarker(day, position.beforeId);
    }

    function handleDragLeave(event) {
      const day = event.target.closest(".day");
      if (!day || day.contains(event.relatedTarget)) return;
      day.classList.remove("drag-over");
    }

    function handleDrop(event) {
      if (!settings.dragEnabled || !draggingTaskId) return;
      const day = event.target.closest(".day");
      if (!day) return;
      event.preventDefault();
      const targetDate = day.dataset.date;
      moveTaskToDate(draggingTaskId, targetDate, dropBeforeTaskId);
      handleDragEnd();
    }

    function handleMouseDragStart(event) {
      if (!settings.dragEnabled) return;
      if (event.button !== 0 || event.target.closest("button")) return;
      const taskEl = event.target.closest(".task");
      if (!taskEl) return;
      mouseDrag = {
        id: taskEl.dataset.taskId,
        startX: event.clientX,
        startY: event.clientY,
        active: false,
        el: taskEl
      };
    }

    function handleMouseDragMove(event) {
      if (!mouseDrag) return;
      const distance = Math.hypot(event.clientX - mouseDrag.startX, event.clientY - mouseDrag.startY);
      if (!mouseDrag.active && distance < 8) return;
      mouseDrag.active = true;
      mouseDrag.el.classList.add("dragging");
      document.body.classList.add("dragging-task");
      const day = document.elementFromPoint(event.clientX, event.clientY)?.closest(".day");
      document.querySelectorAll(".day.drag-over").forEach(el => {
        if (el !== day) el.classList.remove("drag-over");
      });
      if (day) day.classList.add("drag-over");
      if (day) {
        const position = getDropPosition(day, event.clientY);
        dropBeforeTaskId = position.beforeId;
        placeDropMarker(day, position.beforeId);
      }
    }

    function handleMouseDragEnd(event) {
      if (!mouseDrag) return;
      const drag = mouseDrag;
      mouseDrag = null;
      drag.el.classList.remove("dragging");
      document.body.classList.remove("dragging-task");
      document.querySelectorAll(".day.drag-over").forEach(el => el.classList.remove("drag-over"));
      document.querySelectorAll(".drop-marker").forEach(el => el.remove());
      if (!drag.active) return;
      const day = document.elementFromPoint(event.clientX, event.clientY)?.closest(".day");
      if (day) {
        const position = getDropPosition(day, event.clientY);
        moveTaskToDate(drag.id, day.dataset.date, position.beforeId);
      }
    }

    function getDropPosition(day, clientY) {
      const taskEls = [...day.querySelectorAll(".task:not(.dragging)")];
      for (const el of taskEls) {
        const rect = el.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          return { beforeId: el.dataset.taskId };
        }
      }
      return { beforeId: null };
    }

    function placeDropMarker(day, beforeId) {
      document.querySelectorAll(".drop-marker").forEach(el => el.remove());
      const list = day.querySelector(".task-list");
      if (!list) return;
      const marker = document.createElement("div");
      marker.className = "drop-marker";
      const beforeEl = beforeId ? list.querySelector(`.task[data-task-id="${beforeId}"]`) : null;
      list.insertBefore(marker, beforeEl || null);
    }

    function moveTaskToDate(taskId, targetDate, beforeId = null) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || !targetDate) return false;
      const oldDate = task.date;
      task.date = targetDate;
      reorderDateTasks(targetDate, taskId, beforeId);
      if (oldDate !== targetDate) reorderDateTasks(oldDate);
      persist();
      renderVisibleWeeks();
      showToast(oldDate === targetDate ? "已调整顺序" : `已移动到 ${targetDate.slice(5)}`);
      return true;
    }

    function reorderDateTasks(dateKey, movedId = null, beforeId = null) {
      const ordered = tasks
        .filter(item => item.date === dateKey && item.id !== movedId)
        .sort(taskOrder);
      const moved = movedId ? tasks.find(item => item.id === movedId) : null;
      if (moved && moved.date === dateKey) {
        const targetIndex = beforeId ? ordered.findIndex(item => item.id === beforeId) : -1;
        ordered.splice(targetIndex >= 0 ? targetIndex : ordered.length, 0, moved);
      }
      ordered.forEach((item, index) => {
        item.sortIndex = index;
      });
    }

    function handleDocumentClick(event) {
      if (event.target.closest(".modal, button, input, select, textarea, .task")) return;
      const day = event.target.closest(".day");
      if (!day) return;
      selectDate(day.dataset.date);
      showToast(`已选中 ${selectedDateKey.slice(5)}，按 Ctrl+C 复制当天事项`);
    }

    function selectDate(dateKey) {
      selectedDateKey = dateKey;
      document.querySelectorAll(".day.selected-day").forEach(el => el.classList.remove("selected-day"));
      document.querySelectorAll(`.day[data-date="${dateKey}"]`).forEach(el => el.classList.add("selected-day"));
    }

    function handleDocumentCopy(event) {
      if (!selectedDateKey) return;
      if (document.activeElement && ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
      const rows = getTasksForDate(selectedDateKey);
      if (!rows.length) {
        showToast("当天没有可复制的事项");
        return;
      }
      const text = buildDateCopyText(selectedDateKey, rows);
      event.clipboardData.setData("text/plain", text);
      event.clipboardData.setData("text/html", buildDateCopyHtml(selectedDateKey, rows));
      event.preventDefault();
      showToast(`已复制 ${rows.length} 条事项`);
    }

    function buildDateCopyText(dateKey, rows) {
      const lines = [`${dateKey.replace(/-/g, "/")} 事项`, ""];
      rows.forEach((task, index) => {
        const cat = getCategory(task.category);
        lines.push(`${index + 1}. ${cat.name}｜${task.title}${task.done ? "（已完成）" : ""}`);
        if (task.note) lines.push(`备注：${task.note}`);
        getTaskBlocks(task).forEach(block => {
          if (block.type === "text") lines.push(block.text);
          if (block.type === "image") lines.push("[图片]");
        });
        lines.push("");
      });
      return lines.join("\n").trim();
    }

    function getTasksForDate(dateKey) {
      return tasks.filter(task => task.date === dateKey).sort(taskOrder);
    }

    function buildDateCopyHtml(dateKey, rows) {
      const parts = [`<h3>${escapeHtml(dateKey.replace(/-/g, "/"))} 事项</h3>`, "<ol>"];
      rows.forEach(task => {
        const cat = getCategory(task.category);
        parts.push(`<li><strong>${escapeHtml(cat.name)}｜${escapeHtml(task.title)}</strong>${task.done ? "（已完成）" : ""}`);
        if (task.note) parts.push(`<div>备注：${escapeHtml(task.note)}</div>`);
        getTaskBlocks(task).forEach(block => {
          if (block.type === "text") parts.push(`<p>${escapeHtml(block.text).replace(/\n/g, "<br>")}</p>`);
          if (block.type === "image") parts.push(`<div><img src="${escapeAttr(block.src)}" style="max-width:420px;height:auto;" /></div>`);
        });
        parts.push("</li>");
      });
      parts.push("</ol>");
      return parts.join("");
    }

    function setupInfiniteScroll() {
      const bottomObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) appendWeeks(8);
      }, { rootMargin: "700px 0px" });
      const topObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) prependWeeks(8);
      }, { rootMargin: "700px 0px" });
      bottomObserver.observe(els.bottomSentinel);
      topObserver.observe(els.topSentinel);
    }

    function appendWeeks(count) {
      if (loadingMore || !lastSunday) return;
      loadingMore = true;
      const cursor = new Date(lastSunday);
      cursor.setDate(cursor.getDate() + 1);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      const newLast = new Date(cursor);
      newLast.setDate(newLast.getDate() - 1);
      lastSunday = newLast;
      els.weeks.insertAdjacentHTML("beforeend", html);
      loadingMore = false;
    }

    function prependWeeks(count) {
      if (loadingMore || !firstMonday) return;
      loadingMore = true;
      const beforeTop = els.weeks.getBoundingClientRect().top;
      const start = new Date(firstMonday);
      start.setDate(start.getDate() - count * 7);
      const cursor = new Date(start);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = start;
      els.weeks.insertAdjacentHTML("afterbegin", html);
      const afterTop = els.weeks.getBoundingClientRect().top;
      window.scrollBy(0, afterTop - beforeTop);
      loadingMore = false;
    }

    function jumpMonth(delta) {
      const target = new Date(currentYear, currentMonth + delta, 1);
      currentYear = target.getFullYear();
      currentMonth = target.getMonth();
      ensureMonthRendered(target);
      setTimeout(() => scrollToMonth(target), 40);
    }

    function goToday() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();

    }

    function goCurrentMonth() {

    function ensureMonthRendered(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      if (document.querySelector(`.week[data-month="${key}"]`)) return;
      renderAround(date);
    }

    function scrollToMonth(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      const week = document.querySelector(`.week[data-month="${key}"]`);
      if (!week) return;
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: "smooth" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function scrollToDate(date, smooth) {
      const key = toKey(date);
      const cell = document.querySelector(`.day[data-date="${key}"]`);
      if (!cell) return;
      const week = cell.closest(".week");
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: smooth ? "smooth" : "auto" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function updateMonthFromScroll() {
      const weeks = document.querySelectorAll(".week");
      const threshold = getStickyOffset() + 14;
      for (const week of weeks) {
        const rect = week.getBoundingClientRect();
        if (rect.top <= threshold && rect.bottom > threshold) {
          const [year, month] = week.dataset.month.split("-").map(Number);
          updateMonthLabel(year, month);
          return;
        }
      }
      const first = weeks[0];
      if (first) {
        const [year, month] = first.dataset.month.split("-").map(Number);
        updateMonthLabel(year, month);
      }
    }

    async function handleTaskPaste(event) {
      const items = [...(event.clipboardData?.items || [])];
      let added = 0;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          event.preventDefault();
          const file = item.getAsFile();
          if (file) {
            const image = await compressImage(file);
            insertEditorImage(image);
            added++;
          }
        }
      }
      const text = cleanPastedText(event.clipboardData?.getData("text/plain"));
      if (text) {
        event.preventDefault();
        insertEditorText(text);
        added++;
      }
      if (added) {
        pendingBlocks = readEditorBlocks();
        showToast(`已粘贴 ${added} 项内容`);
      }
    }

    function renderContentBlocks() {
      pendingBlocks = normalizeContentBlocks(pendingBlocks);
      els.taskTitle.innerHTML = pendingBlocks.map(block => {
        if (block.type === "image") return `<img src="${escapeAttr(block.src)}" alt="粘贴图片" data-content-image="true" />`;

    function insertEditorImage(image) {
      els.taskTitle.focus();
      const img = document.createElement("img");

      img.dataset.contentImage = "true";
      img.dataset.width = image.width;
      img.dataset.height = image.height;
      img.dataset.mime = image.mime || image.type || "image/webp";
      insertNodeAtCursor(img);
      insertNodeAtCursor(document.createElement("br"));
    }

    function insertNodeAtCursor(node) {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) {
        els.taskTitle.appendChild(node);
        return;
      }
      const range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function readEditorBlocks() {
      const blocks = [];
      let textBuffer = "";
      const flushText = () => {
        const text = cleanPastedText(textBuffer);
        if (text) blocks.push({ type: "text", text });
        textBuffer = "";
      };
      const walk = node => {
        if (node.nodeType === Node.TEXT_NODE) {
          textBuffer += node.textContent || "";
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        if (node.tagName === "IMG" && node.src?.startsWith("data:image/")) {
          flushText();
          blocks.push({
            type: "image",
            src: node.src,
            width: Number(node.dataset.width) || node.naturalWidth || 0,
            height: Number(node.dataset.height) || node.naturalHeight || 0,
            mime: node.dataset.mime || "image/webp",
            createdAt: Date.now()
          });
          return;
        }
        if (node.tagName === "BR") {
          textBuffer += "\n";
          return;
        }
        if (["DIV", "P"].includes(node.tagName) && textBuffer && !textBuffer.endsWith("\n")) textBuffer += "\n";
        [...node.childNodes].forEach(walk);
        if (["DIV", "P"].includes(node.tagName)) textBuffer += "\n";
      };
      [...els.taskTitle.childNodes].forEach(walk);
      flushText();
      return normalizeContentBlocks(blocks);
    }

    function cleanPastedText(value) {
      const text = String(value || "").trim();
      if (!text || text === "undefined" || text === "null") return "";
      return text;
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = () => {
          img.onload = () => {
            const maxSide = 900;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const width = Math.max(1, Math.round(img.width * scale));
            const height = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            const src = canvas.toDataURL("image/webp", 0.78);
            resolve({ src, width, height, type: "image/webp", createdAt: Date.now() });
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function createBulkTasks(event) {
      event.preventDefault();
      const items = lastBulkItems.length ? lastBulkItems : buildBulkItems();
      if (!items.length) {
        showToast("没有可创建的任务");
        return;
      }
      const existing = new Set(tasks.map(t => `${t.date}|${t.title}`));
      const sortCounters = {};
      const rows = items.filter(item => !existing.has(`${item.date}|${item.title}`)).map(item => {
        sortCounters[item.date] = sortCounters[item.date] ?? nextSortIndex(item.date);
        return { id: createId(), title: item.title, date: item.date, category: item.category, note: item.note || "", done: false, createdAt: Date.now(), sortIndex: sortCounters[item.date]++ };
      });
      tasks = [...tasks, ...rows];

      closeBulk();
