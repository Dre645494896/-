    function mobileIcon(name) {
      const icons = {
        search: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.8" cy="10.8" r="6.3"></circle><path d="m16 16 4 4"></path></svg>',
        plus: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>',
        user: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M4 21a8 8 0 0 1 16 0"></path></svg>'
      };
      return icons[name] || icons.search;
    }

    function renderMobileDateStrip(selected) {
      const dates = [];
      for (let offset = -10; offset <= 10; offset++) {
        const date = new Date(selected);
        date.setDate(date.getDate() + offset);
        dates.push(date);
      }
      return dates.map(date => {
        const key = toKey(date);
        const lunar = getLunarInfo(date)?.display || "";
        const dow = ["日","一","二","三","四","五","六"][date.getDay()];
        return `<button class="mobile-date-btn ${key === mobileSelectedDate ? "active" : ""}" type="button" data-mobile-date="${key}" onclick="setMobileDate('${key}','day')">
          <span class="dow">${dow}</span>
          <span class="num">${date.getDate()}</span>
          <span class="lunar">${escapeHtml(lunar)}</span>
        </button>`;
      }).join("");
    }

    function focusMobileDateStrip() {
      if (!els.mobileDateStrip || mobileViewMode !== "day") return;
      const active = els.mobileDateStrip.querySelector(".mobile-date-btn.active");
      if (active) active.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
    }

    function renderMobileDayCard(dateKey) {
      const date = parseKey(dateKey);
      const tasksForDay = getMobileTasksForDate(dateKey);
      const notesForDay = getMobileNotesForDate(dateKey);
      const lunar = getLunarInfo(date)?.display || "";
      const title = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 · ${["周日","周一","周二","周三","周四","周五","周六"][date.getDay()]}`;
      const empty = !tasksForDay.length && !notesForDay.length ? '<div class="mobile-empty">当天暂无任务</div>' : "";
      return `<section class="mobile-day-card" data-mobile-date="${dateKey}">
        <div class="mobile-day-title">
          <strong>${title}</strong>
          <span>${escapeHtml(lunar)}</span>
        </div>
        <div class="task-list" data-date="${dateKey}">
          ${tasksForDay.map(renderTask).join("")}
          ${empty}
        </div>
        ${renderDayNotes(dateKey, notesForDay)}
      </section>`;
    }

    function renderMobileMonthStack(year, month) {
      const months = [];
      for (let offset = mobileMonthStartOffset; offset <= mobileMonthEndOffset; offset++) {
        const date = new Date(year, month + offset, 1);
        months.push(renderMobileMonth(date.getFullYear(), date.getMonth()));
      }
      return `<div class="mobile-month-stack">${months.join("")}</div>`;
    }

    function renderMobileMonth(year, month) {
      const start = getMonday(new Date(year, month, 1));
      const dates = [];
      const cursor = new Date(start);
      for (let i = 0; i < 42; i++) {
        dates.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      return `<section class="mobile-month-block" data-mobile-month="${year}-${month}">
        <h2>${month + 1}月</h2>
        <div class="mobile-month-grid">
          ${dates.map(date => renderMobileMonthCell(date, month)).join("")}
        </div>
      </section>`;
    }

    function renderMobileMonthCell(date, visibleMonth) {
      const key = toKey(date);
      const tasksForDay = getMobileTasksForDate(key);
      const notesForDay = getMobileNotesForDate(key);
      const count = tasksForDay.length + notesForDay.length;
      const lines = tasksForDay.slice(0, 3).map(task => {
        const priority = normalizePriority(task.priority);
        return `<span class="mobile-summary-line ${priority === "normal" ? "" : priority}"></span>`;
      }).join("");
      const more = count > 3 ? `<span class="mobile-summary-more">+${count - 3}</span>` : "";
      return `<button class="mobile-month-cell ${date.getMonth() !== visibleMonth ? "other" : ""} ${isToday(date) ? "today" : ""}" type="button" onclick="setMobileDate('${key}','day')">
        <span class="daynum">${date.getDate()}</span>
        <span class="lunar">${escapeHtml(getLunarInfo(date)?.display || "")}</span>
        <span class="mobile-summary-lines">${lines}${more}</span>
      </button>`;
    }

    function renderMobileYear(year) {
      const years = [];
      for (let current = year + mobileYearStartOffset; current <= year + mobileYearEndOffset; current++) {
        years.push(`<section class="mobile-year-section" data-mobile-year="${current}">
          <h2 class="mobile-year-title">${current}年</h2>
          <div class="mobile-year-grid">
            ${Array.from({ length: 12 }, (_, month) => renderMobileYearMonth(current, month)).join("")}
          </div>
        </section>`);
      }
      return `<div class="mobile-year-stack">${years.join("")}</div>`;
    }

    function renderMobileYearMonth(year, month) {
      const today = new Date();
      const current = today.getFullYear() === year && today.getMonth() === month;
      const last = new Date(year, month + 1, 0).getDate();
      const blanks = (new Date(year, month, 1).getDay() + 6) % 7;
      const cells = [
        ...Array.from({ length: blanks }, () => '<span></span>'),
        ...Array.from({ length: last }, (_, index) => {
          const date = new Date(year, month, index + 1);
          return `<span class="mobile-year-day ${isToday(date) ? "today" : ""}">${index + 1}</span>`;
        })
      ].join("");
      return `<button class="mobile-year-month ${current ? "current" : ""}" type="button" onclick="setMobileMonth(${year},${month})">
        <h3>${month + 1}月</h3>
        <div class="mobile-year-days">${cells}</div>
      </button>`;
    }

    function focusMobileContentAnchor() {
      if (!isMobileViewport() || !els.mobileContent) return;
      const selected = parseKey(mobileSelectedDate);
      let target = null;
      if (mobileViewMode === "month") {
        target = els.mobileContent.querySelector(`[data-mobile-month="${selected.getFullYear()}-${selected.getMonth()}"]`);
      } else if (mobileViewMode === "year") {
        target = els.mobileContent.querySelector(`[data-mobile-year="${selected.getFullYear()}"]`);
      }
      if (target) animateMobileContentScroll(Math.max(0, target.offsetTop - 18));
    }

    function animateMobileContentScroll(top) {
      if (!els.mobileContent) return;
      clearInterval(mobileScrollTimer);
      const start = els.mobileContent.scrollTop;
      const change = top - start;
      if (Math.abs(change) < 2) {
        els.mobileContent.scrollTop = top;
        return;
      }
      const startedAt = Date.now();
      const duration = 320;
      mobileScrollTimer = setInterval(() => {
        const progress = Math.min(1, (Date.now() - startedAt) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        els.mobileContent.scrollTop = start + change * eased;
        if (progress >= 1) clearInterval(mobileScrollTimer);
      }, 16);
    }

    function scheduleMobileContentFocus() {
      if (mobileViewMode !== "month" && mobileViewMode !== "year") return;
      setTimeout(focusMobileContentAnchor, 140);
      setTimeout(focusMobileContentAnchor, 420);
    }

    function resetMobileRange(mode) {
      if (mode === "month") {
        mobileMonthStartOffset = -12;
        mobileMonthEndOffset = 12;
      } else if (mode === "year") {
        mobileYearStartOffset = -10;
        mobileYearEndOffset = 10;
      }
    }

    function handleMobileContentScroll() {
      if (!isMobileViewport() || mobileRangeExpanding || !els.mobileContent) return;
      if (mobileViewMode !== "month" && mobileViewMode !== "year") return;
      const content = els.mobileContent;
      const nearTop = content.scrollTop < 260;
      const nearBottom = content.scrollHeight - content.scrollTop - content.clientHeight < 520;
      if (!nearTop && !nearBottom) return;
      const beforeHeight = content.scrollHeight;
      const beforeTop = content.scrollTop;
      let changed = false;
      if (mobileViewMode === "month") {
        if (nearTop) { mobileMonthStartOffset -= 12; changed = true; }
        if (nearBottom) { mobileMonthEndOffset += 12; changed = true; }
      } else {
        if (nearTop) { mobileYearStartOffset -= 10; changed = true; }
        if (nearBottom) { mobileYearEndOffset += 10; changed = true; }
      }
      if (!changed) return;
      mobileRangeExpanding = true;
      suppressMobileFocus = true;
      renderMobile();
      suppressMobileFocus = false;
      content.scrollTop = nearTop ? beforeTop + (content.scrollHeight - beforeHeight) : beforeTop;
      mobileRangeExpanding = false;
    }

    function updateMobileRangePoll() {
      clearInterval(mobileRangePollTimer);
      if (mobileViewMode === "month" || mobileViewMode === "year") {
        mobileRangePollTimer = setInterval(handleMobileContentScroll, 320);
      }
    }

    function setMobileDate(dateKey, mode = "day") {
      if (!isDateKey(dateKey)) return;
      mobileSelectedDate = dateKey;
      mobileViewMode = mode;
      if (mode === "month" || mode === "year") resetMobileRange(mode);
      resetMobileContentScrollOnRender = true;
      renderMobileAnimated();
    }

    function prefersReducedMotion() {
      return window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
    }

    function shiftMobileDay(offset, animated = false) {
      const current = parseKey(mobileSelectedDate);
      current.setDate(current.getDate() + offset);
      const nextKey = toKey(current);
      if (animated) {
        animateMobileDaySwitch(nextKey, offset);
      } else {
        setMobileDate(nextKey, "day");
      }
      showToast(`已切换到 ${nextKey.slice(5)}`);
    }

    function getMobileDayCard() {
      return els.mobileContent?.querySelector(".mobile-day-card") || null;
    }

    function resetMobileSwipeCard(card = getMobileDayCard()) {
      if (!card) return;
      card.classList.remove("mobile-swipe-active", "mobile-swipe-settle", "mobile-swipe-enter");
      card.style.removeProperty("transform");
      card.style.removeProperty("opacity");
      card.style.removeProperty("--mobile-swipe-enter-x");
    }

    function animateMobileDaySwitch(nextKey, offset) {
      const card = getMobileDayCard();
      if (!card || prefersReducedMotion()) {
        mobileSelectedDate = nextKey;
        mobileViewMode = "day";
        resetMobileContentScrollOnRender = true;
        renderMobile();
        focusMobileDateStrip();
        return;
      }
      mobileSwipeAnimating = true;
      const width = Math.max(els.mobileContent?.clientWidth || window.innerWidth || 360, 320);
      const exitX = offset > 0 ? -width : width;
      const enterX = offset > 0 ? `${Math.round(width * .28)}px` : `${Math.round(width * -.28)}px`;
      card.classList.remove("mobile-swipe-active");
      card.classList.add("mobile-swipe-settle");
      card.style.transform = `translate3d(${exitX}px, 0, 0) scale(.985)`;
      card.style.opacity = ".22";
      window.setTimeout(() => {
        mobileSelectedDate = nextKey;
        mobileViewMode = "day";
        resetMobileContentScrollOnRender = true;
        renderMobile();
        const nextCard = getMobileDayCard();
        if (nextCard) {
          nextCard.style.setProperty("--mobile-swipe-enter-x", enterX);
          nextCard.classList.add("mobile-swipe-enter");
          window.setTimeout(() => resetMobileSwipeCard(nextCard), 260);
        }
        mobileSwipeAnimating = false;
      }, 210);
    }

    function handleMobileSwipeStart(event) {
      if (!isMobileViewport() || mobileViewMode !== "day" || event.button !== 0 || mobileSortDrag || mobileSwipeAnimating) return;
      if (event.target.closest("button, input, select, textarea, [contenteditable='true']")) return;
      const card = getMobileDayCard();
      if (!card) return;
      resetMobileSwipeCard(card);
      mobileSwipe = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        lastX: event.clientX,
        lastY: event.clientY,
        card,
        cancelled: false,
        locked: false
      };
    }

    function handleMobileSwipeMove(event) {
      if (!mobileSwipe || mobileSwipe.pointerId !== event.pointerId || mobileSwipe.cancelled || mobileSortDrag) return;
      mobileSwipe.lastX = event.clientX;
      mobileSwipe.lastY = event.clientY;
      const dx = event.clientX - mobileSwipe.startX;
      const dy = event.clientY - mobileSwipe.startY;
      if (!mobileSwipe.locked && Math.abs(dx) > 18 && Math.abs(dx) > Math.abs(dy) * 1.35) {
        mobileSwipe.locked = true;
        mobileSwipe.card.classList.add("mobile-swipe-active");
      }
      if (mobileSwipe.locked) {
        const width = Math.max(els.mobileContent?.clientWidth || window.innerWidth || 360, 320);
        const damped = Math.max(-width * .82, Math.min(width * .82, dx));
        const progress = Math.min(1, Math.abs(damped) / width);
        mobileSwipe.card.style.transform = `translate3d(${damped}px, 0, 0) scale(${1 - progress * .018})`;
        mobileSwipe.card.style.opacity = String(1 - progress * .18);
        event.preventDefault();
      }
    }

    function handleMobileSwipeEnd(event) {
      if (!mobileSwipe || mobileSwipe.pointerId !== event.pointerId) return;
      const swipe = mobileSwipe;
      mobileSwipe = null;
      if (swipe.cancelled || mobileSortDrag || mobileViewMode !== "day") {
        resetMobileSwipeCard(swipe.card);
        return;
      }
      const dx = (event.clientX || swipe.lastX) - swipe.startX;
      const dy = (event.clientY || swipe.lastY) - swipe.startY;
      if (Math.abs(dx) >= 60 && Math.abs(dx) > Math.abs(dy) * 1.35) {
        shiftMobileDay(dx < 0 ? 1 : -1, true);
        return;
      }
      swipe.card.classList.remove("mobile-swipe-active");
      swipe.card.classList.add("mobile-swipe-settle");
      swipe.card.style.transform = "translate3d(0, 0, 0) scale(1)";
      swipe.card.style.opacity = "1";
      window.setTimeout(() => resetMobileSwipeCard(swipe.card), 230);
    }

    function cancelMobileSwipe() {
      if (mobileSwipe?.card) resetMobileSwipeCard(mobileSwipe.card);
      mobileSwipe = null;
    }

    function setMobileMonth(year, month) {
      mobileSelectedDate = toKey(new Date(year, month, 1));
      mobileViewMode = "month";
      resetMobileRange("month");
      resetMobileContentScrollOnRender = true;
      renderMobileAnimated();
    }

    function handleMobileTitleClick() {
      if (mobileViewMode === "day") {
        mobileViewMode = "month";
        resetMobileRange("month");
        resetMobileContentScrollOnRender = true;
      } else if (mobileViewMode === "month") {
        mobileViewMode = "year";
        resetMobileRange("year");
        resetMobileContentScrollOnRender = true;
      }
      renderMobileAnimated();
    }

    function toggleMobileSearch() {
      mobileSearchOpen = !mobileSearchOpen;
      updateMobileHeader(parseKey(mobileSelectedDate));
      if (mobileSearchOpen) {
        els.mobileSearchInput.focus();
        renderMobileSearchResults();
      }
    }

    function goMobileToday() {
      const today = toKey(new Date());
      const previousMode = mobileViewMode;
      mobileSelectedDate = today;
      if (previousMode === "year") {
        mobileViewMode = "month";
        resetMobileRange("month");
      } else {
        mobileViewMode = "day";
      }
      resetMobileContentScrollOnRender = true;
      renderMobileAnimated();
    }

    function renderMobileSearchResults() {
      const query = els.mobileSearchInput.value.trim().toLowerCase();
      if (!query) {
        els.mobileSearchResults.innerHTML = '<div class="mobile-empty">输入关键词搜索任务</div>';
        return;
      }
      const results = tasks
        .filter(task => taskMatchesMobileQuery(task, query))
        .sort((a, b) => a.date.localeCompare(b.date) || taskOrder(a, b))
        .slice(0, 30);
      els.mobileSearchResults.innerHTML = results.length ? results.map(task => {
        const cat = getCategory(task.category);
        const priority = normalizePriority(task.priority);
        const priorityText = priority === "normal" ? "" : ` · ${PRIORITIES[priority].name}`;
        return `<button class="mobile-search-result" type="button" onclick="jumpMobileSearchResult('${task.id}')">
          <strong>${escapeHtml(task.title)}</strong>
          <span>${task.date} · ${escapeHtml(cat.name)}${priorityText}</span>
        </button>`;
      }).join("") : '<div class="mobile-empty">没有匹配任务</div>';
    }

    function jumpMobileSearchResult(taskId) {
      const task = tasks.find(item => item.id === taskId);
      if (!task) return;
      mobileSelectedDate = task.date;
      mobileViewMode = "day";
      mobileSearchOpen = false;
      els.mobileSearchInput.value = "";
      pendingMobileHighlightId = taskId;
      resetMobileContentScrollOnRender = true;
      renderMobileAnimated();
    }

    function taskMatchesMobileQuery(task, query) {
      return task.title.toLowerCase().includes(query)
        || (task.note || "").toLowerCase().includes(query)
        || getTaskBlocks(task).some(block => block.type === "text" && block.text.toLowerCase().includes(query));
    }

    function getMobileTasksForDate(dateKey) {
      return tasks.filter(task => task.date === dateKey).sort(taskOrder);
    }

    function getMobileNotesForDate(dateKey) {
      return dayNotes.filter(note => note.date === dateKey).sort(noteOrder);
    }

    function handleMobileSortPointerDown(event) {
      if (!isMobileViewport() || mobileViewMode !== "day" || event.button !== 0) return;
      if (mobileSwipe?.locked) return;
      const task = event.target.closest(".task");
      if (!task || event.target.closest("button, input, select, textarea")) return;
      const taskId = task.dataset.taskId;
      const dateKey = task.dataset.taskDate;
      if (!taskId || !dateKey) return;
      const startX = event.clientX;
      const startY = event.clientY;
      let armed = true;
      const cleanup = () => {
        armed = false;
        clearTimeout(timer);
        document.removeEventListener("pointermove", cancel);
        document.removeEventListener("pointerup", cleanup);
        document.removeEventListener("pointercancel", cleanup);
      };
      const timer = setTimeout(() => {
        if (!armed) return;
        cleanup();
        cancelMobileSwipe();
        beginMobileSortDrag(task, taskId, dateKey, startX, startY, event.pointerId);
      }, 420);
      const cancel = moveEvent => {
        if (Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY) > 18) cleanup();
      };
      document.addEventListener("pointermove", cancel);
      document.addEventListener("pointerup", cleanup, { once: true });
      document.addEventListener("pointercancel", cleanup, { once: true });
    }

    function beginMobileSortDrag(taskEl, taskId, dateKey, x, y, pointerId) {
      if (mobileSortDrag) return;
      const rect = taskEl.getBoundingClientRect();
      const preview = taskEl.cloneNode(true);
      preview.classList.add("drag-preview");
      preview.style.width = `${rect.width}px`;
      preview.style.height = `${rect.height}px`;
      document.body.appendChild(preview);
      taskEl.classList.add("dragging");
      els.mobileContent.style.overflow = "hidden";
      mobileSortDrag = { taskEl, taskId, dateKey, preview, offsetX: x - rect.left, offsetY: y - rect.top, targetId: null };
      moveMobileSortPreview(x, y);
      document.body.classList.add("dragging-task");
      document.addEventListener("pointermove", handleMobileSortMove);
      document.addEventListener("pointerup", finishMobileSortDrag, { once: true });
      document.addEventListener("pointercancel", cancelMobileSortDrag, { once: true });
      try { taskEl.setPointerCapture(pointerId); } catch {}
      showToast("拖动调整顺序");
    }

    function handleMobileSortMove(event) {
      if (!mobileSortDrag) return;
      event.preventDefault();
      moveMobileSortPreview(event.clientX, event.clientY);
      const list = els.mobileContent.querySelector(`.task-list[data-date="${mobileSortDrag.dateKey}"]`);
      if (!list) return;
      const siblings = Array.from(list.querySelectorAll(".task:not(.dragging)"));
      let beforeId = null;
      for (const item of siblings) {
        const rect = item.getBoundingClientRect();
        if (event.clientY < rect.top + rect.height / 2) {
          beforeId = item.dataset.taskId;
          break;
        }
      }
      mobileSortDrag.targetId = beforeId;
      document.querySelectorAll(".drop-marker").forEach(el => el.remove());
      const marker = document.createElement("div");
      marker.className = "drop-marker";
      if (beforeId) list.querySelector(`[data-task-id="${beforeId}"]`)?.before(marker);
      else list.appendChild(marker);
    }

    function moveMobileSortPreview(x, y) {
      if (!mobileSortDrag) return;
      mobileSortDrag.preview.style.transform = `translate3d(${x - mobileSortDrag.offsetX}px, ${y - mobileSortDrag.offsetY}px, 0)`;
    }

    function finishMobileSortDrag() {
      if (!mobileSortDrag) return;
      const drag = mobileSortDrag;
      const beforeId = drag.targetId;
      cleanupMobileSortDrag();
      reorderTaskWithinDate(drag.taskId, drag.dateKey, beforeId);
    }

    function cancelMobileSortDrag() {
      cleanupMobileSortDrag();
    }

    function cleanupMobileSortDrag() {
      if (!mobileSortDrag) return;
      mobileSortDrag.taskEl.classList.remove("dragging");
      mobileSortDrag.preview.remove();
      document.body.classList.remove("dragging-task");
      document.querySelectorAll(".drop-marker").forEach(el => el.remove());
      document.removeEventListener("pointermove", handleMobileSortMove);
      els.mobileContent.style.overflow = "";
      mobileSortDrag = null;
    }

    function reorderTaskWithinDate(taskId, dateKey, beforeId) {
      const ordered = tasks.filter(task => task.date === dateKey && task.id !== taskId).sort(taskOrder);
      const moved = tasks.find(task => task.id === taskId);
      if (!moved) return;
      const index = beforeId ? Math.max(0, ordered.findIndex(task => task.id === beforeId)) : ordered.length;
      ordered.splice(index < 0 ? ordered.length : index, 0, moved);
      ordered.forEach((task, order) => {
        task.sortIndex = order + 1;
      });
      saveLocalSnapshot();
      renderVisibleWeeks();
      renderMobile();
      queueCloudSave();
      showToast("顺序已更新");
    }

    function renderSelects() {
      const categories = getCategories();
      const taskOptions = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join("");
      els.taskCategory.innerHTML = taskOptions;
      els.bulkCategory.innerHTML = taskOptions;
      updateCategoryToggle();
    }

    function renderAround(date) {
      const start = getMonday(new Date(date.getFullYear(), date.getMonth(), 1));
      start.setDate(start.getDate() - 28);
      const weeks = [];
      const cursor = new Date(start);
      for (let i = 0; i < 18; i++) {
        weeks.push(getWeekDates(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = weeks[0][0];
      lastSunday = weeks[weeks.length - 1][6];
      els.weeks.innerHTML = weeks.map(renderWeek).join("");
      updateMonthFromScroll();
      updateTaskTitleOverflow();
      renderMobile();
    }

    function renderVisibleWeeks() {
      document.querySelectorAll(".week").forEach(week => {
        const dates = JSON.parse(week.dataset.dates).map(parseKey);
        week.outerHTML = renderWeek(dates);
      });
      updateMonthFromScroll();
      updateTaskTitleOverflow();
      renderMobile();
    }

    function renderWeek(dates) {
      const middle = dates[3];
      const monthKey = `${middle.getFullYear()}-${middle.getMonth()}`;
      const dateKeys = dates.map(toKey);
      const startsMonth = dates.some(d => d.getDate() === 1);
      const monthTitleDate = dates.find(d => d.getDate() === 1) || middle;
      const monthBand = settings.monthTintEnabled ? (monthTitleDate.getMonth() % 2 === 0 ? "month-band-a" : "month-band-b") : "";
      return `<section class="week ${monthBand} ${startsMonth ? "month-start" : ""}" data-month="${monthKey}" data-month-title="${monthTitleDate.getFullYear()}年${monthTitleDate.getMonth()+1}月" data-dates='${JSON.stringify(dateKeys)}'>
        ${dates.map(date => renderDay(date, monthKey)).join("")}
      </section>`;
    }

    function renderDay(date, monthKey) {
      const key = toKey(date);
      const dayMonthKey = `${date.getFullYear()}-${date.getMonth()}`;
      const isOtherMonth = dayMonthKey !== monthKey;
      const dayTasks = isOtherMonth && settings.otherMonthMode === "hideTasks" ? [] : getVisibleTasksForDate(key);
      const notes = isOtherMonth && settings.otherMonthMode === "hideTasks" ? [] : getVisibleNotesForDate(key);
      const dayState = dayStates[key] || "";
      const today = isToday(date);
      const weekend = date.getDay() === 0 || date.getDay() === 6;
      const weekday = WEEKDAYS[(date.getDay() + 6) % 7];
      const marks = getDateMarks(date);
      const special = marks.find(mark => mark.kind === "special");
      const isWorkAdjustDay = marks.some(mark => mark.kind === "workday");
      const isRestDay = !isWorkAdjustDay && (weekend || marks.some(mark => mark.kind === "holiday"));
      const dayTypePill = isWorkAdjustDay
        ? '<span class="work-adjust-pill">调休上班</span>'
        : isRestDay ? '<span class="rest-day-pill">休息</span>' : "";
      const style = special ? ` style="--special-color:${special.color};--special-bg:${hexToSoftBg(special.color)}"` : "";
      const classes = [
        "day",
        isOtherMonth ? "other-month" : "",
        isOtherMonth && settings.otherMonthMode === "hideTasks" ? "hide-other-tasks" : "",
        weekend ? "weekend" : "",
        settings.weekendStyle === "tint" ? "weekend-tint" : "",
        marks.some(mark => mark.kind === "holiday") ? "has-holiday" : "",
        isRestDay ? "rest-day" : "",
        isWorkAdjustDay ? "work-adjust-day" : "",
        special ? "has-special" : "",
        dayState === "good" ? "day-good" : "",
        dayState === "bad" ? "day-bad" : "",
        today ? "is-today" : "",
        selectedDateKey === key ? "selected-day" : ""
      ].filter(Boolean).join(" ");
      return `<article class="${classes}" data-date="${key}"${style} ondblclick="openModal('${key}')">
        <div class="day-head">
          <div class="date-main">
            <span class="date-num">${date.getDate()}</span>
            ${dayTypePill}
            ${renderDateInlineMeta(date, marks)}
            <span class="date-week">${weekday}</span>
            ${today ? '<span class="today-pill">今天</span>' : ""}
          </div>
          <div class="day-actions">
            <button class="day-action good ${dayState === "good" ? "active" : ""}" type="button" title="标记完成日" onclick="event.stopPropagation();setDayState('${key}','good')">✓</button>
            <button class="day-action bad ${dayState === "bad" ? "active" : ""}" type="button" title="标记异常日" onclick="event.stopPropagation();setDayState('${key}','bad')">×</button>
            <button class="add-day" type="button" title="添加日期备注" onclick="event.stopPropagation();openNoteModal('${key}')">+</button>
          </div>
        </div>
        <div class="task-list" data-date="${key}">
          ${dayTasks.length ? dayTasks.map(renderTask).join("") : '<div class="empty-hint">双击添加任务，点 + 添加备注</div>'}
        </div>
        ${renderDayNotes(key, notes)}
      </article>`;
    }
    function renderTask(task) {
      const cat = getCategory(normalizeCategoryId(task.category));
      const showNote = settings.taskDisplay === "note" && task.note;
      const blocks = getTaskBlocks(task);
      const visibleBlocks = blocks.filter(block => block.type === "image").slice(0, 3);
      const hasImage = blocks.some(block => block.type === "image");
      const progress = normalizeProgress(task.progress);
      const priority = normalizePriority(task.priority);
      const priorityClass = priority === "normal" ? "" : `priority-${priority}`;
      const priorityLabel = priority === "normal" ? "" : PRIORITIES[priority].name;
      return `<div class="task ${task.done ? "done" : ""} ${hasImage ? "has-image" : ""} ${priorityClass}" draggable="false" data-task-id="${task.id}" data-task-date="${task.date}" style="--cat-color:${cat.color};--cat-bg:${cat.bg}" ondblclick="event.stopPropagation();openModal('${task.date}','${task.id}')">
        <div class="task-main">
          ${visibleBlocks.length ? `<div class="task-content">${visibleBlocks.map(renderTaskBlock).join("")}</div>` : ""}
          <div class="task-title-wrap">
            <p class="task-title">${escapeHtml(task.title)}</p>
            <p class="task-title-more hidden">......</p>
          </div>
          ${priorityLabel ? `<span class="priority-tag ${priority}">${escapeHtml(priorityLabel)}</span>` : ""}
          ${progress ? `<span class="progress-tag">进度 ${progress}%</span>` : ""}
          ${showNote ? `<span class="note">${escapeHtml(task.note)}</span>` : ""}
        </div>
        <div class="task-actions">
          <button class="mini-btn good" type="button" title="${task.done ? "取消完成" : "完成"}" onclick="event.stopPropagation();toggleTask('${task.id}')">${task.done ? "↩" : "✓"}</button>
          <button class="mini-btn bad" type="button" title="删除" onclick="event.stopPropagation();deleteTask('${task.id}')">×</button>
        </div>
      </div>`;
    }

    function renderTaskBlock(block) {
      if (block.type === "image") return `<img class="task-image" src="${escapeAttr(block.src)}" alt="图片内容" loading="lazy" draggable="false" />`;
      if (block.type === "text") return `<p class="task-content-text">${escapeHtml(block.text)}</p>`;
      return "";
    }

    function updateTaskTitleOverflow() {
      requestAnimationFrame(() => {
        document.querySelectorAll(".task-title").forEach(title => {
          const more = title.nextElementSibling?.classList.contains("task-title-more") ? title.nextElementSibling : null;
          if (!more) return;
          const hasExplicitOverflow = (title.textContent || "").split(/\r?\n/).length > 3;
          const hasVisualOverflow = title.scrollHeight > title.clientHeight + 1;
          more.classList.toggle("hidden", !(hasExplicitOverflow || hasVisualOverflow));
        });
      });
    }

    function renderDayNotes(dateKey, notes = getVisibleNotesForDate(dateKey)) {
      if (!notes.length) return `<div class="day-notes" data-date="${dateKey}"></div>`;
      return `<div class="day-notes" data-date="${dateKey}">
        ${notes.map(renderDayNote).join("")}
      </div>`;
    }

    function renderDayNote(note) {
      return `<div class="day-note ${note.done ? "done" : ""}" data-note-id="${note.id}" data-note-date="${note.date}" ondblclick="event.stopPropagation();openNoteModal('${note.date}','${note.id}')">
        <p class="day-note-title">${escapeHtml(note.text)}</p>
        <div class="day-note-actions">
          <button class="mini-btn good" type="button" title="${note.done ? "取消完成" : "完成"}" onclick="event.stopPropagation();toggleDayNote('${note.id}')">${note.done ? "↩" : "✓"}</button>
          <button class="mini-btn bad" type="button" title="删除" onclick="event.stopPropagation();deleteDayNote('${note.id}')">×</button>
        </div>
      </div>`;
    }

    function getVisibleTasksForDate(key) {
      const query = els.searchInput.value.trim().toLowerCase();
      return tasks
        .filter(task => task.date === key)
        .filter(task => normalizeCategoryId(task.category) === activeCategory)
        .filter(task => !query || task.title.toLowerCase().includes(query) || (task.note || "").toLowerCase().includes(query) || getTaskBlocks(task).some(block => block.type === "text" && block.text.toLowerCase().includes(query)))
        .sort(taskOrder);
    }

    function getVisibleNotesForDate(key) {
      return dayNotes
        .filter(note => note.date === key)
        .sort(noteOrder);
    }

    function setActiveCategory(category) {
      const next = normalizeCategoryId(category);
      if (activeCategory === next) return;
      activeCategory = next;
      updateCategoryToggle();
      renderVisibleWeeks();
    }

    function updateCategoryToggle() {
      if (!els.categoryToggle) return;
      els.categoryToggle.querySelectorAll("[data-category-view]").forEach(button => {
        button.classList.toggle("active", button.dataset.categoryView === activeCategory);
      });
    }

    function toggleDesktopSearch() {
      const open = !els.desktopSearch.classList.contains("open");
      els.desktopSearch.classList.toggle("open", open);
      if (open) setTimeout(() => els.searchInput.focus(), 0);
      else {
        els.searchInput.value = "";
        renderVisibleWeeks();
      }
    }

    function closeDesktopSearch() {
      if (!els.desktopSearch?.classList.contains("open")) return;
      els.desktopSearch.classList.remove("open");
      els.searchInput.value = "";
      renderVisibleWeeks();
    }

    function handlePointerDragStart(event) {
      if (isMobileViewport()) return;
      beginUnifiedDrag(event, "pointer");
    }

    function handlePointerDragMove(event) {
      updateUnifiedDrag(event, "pointer");
    }

    function handlePointerDragEnd(event) {
      finishUnifiedDrag(event, "pointer");
    }

    function handleLegacyDragStart(event) {
      if (activeDrag) return;
      beginUnifiedDrag(event, "mouse");
    }

    function handleLegacyDragMove(event) {
      updateUnifiedDrag(event, "mouse");
    }

    function handleLegacyDragEnd(event) {
      finishUnifiedDrag(event, "mouse");
    }

    function beginUnifiedDrag(event, source) {
      if (!settings.dragEnabled || event.button !== 0 || activeDrag) return;
      if (event.target.closest("button, input, select, textarea, [contenteditable='true']")) return;
      const noteEl = event.target.closest(".day-note");
      const taskEl = noteEl ? null : event.target.closest(".task");
      const el = noteEl || taskEl;
      if (!el) return;
      const type = noteEl ? "note" : "task";
      activeDrag = {
        source,
        pointerId: source === "pointer" ? event.pointerId : null,
        type,
        id: type === "note" ? el.dataset.noteId : el.dataset.taskId,
        sourceDate: type === "note" ? el.dataset.noteDate : el.dataset.taskDate,
        startX: event.clientX,
        startY: event.clientY,
        x: event.clientX,
        y: event.clientY,
        active: false,
        copyMode: event.altKey,
        el,
        preview: null,
        targetDate: null,
        beforeId: null
      };
    }

    function updateUnifiedDrag(event, source) {
      if (!activeDrag || activeDrag.source !== source) return;
      if (source === "pointer" && activeDrag.pointerId !== event.pointerId) return;
      const distance = Math.hypot(event.clientX - activeDrag.startX, event.clientY - activeDrag.startY);
      if (!activeDrag.active && distance < 8) return;
      event.preventDefault();
      if (!activeDrag.active) activateUnifiedDrag(event);
      activeDrag.x = event.clientX;
      activeDrag.y = event.clientY;
      activeDrag.copyMode = event.altKey;
      activeDrag.preview?.classList.toggle("copy-mode", activeDrag.copyMode);
      moveDragPreview(event.clientX, event.clientY);
      updateUnifiedDropTarget(event.clientX, event.clientY);
    }

    function activateUnifiedDrag(event) {
      activeDrag.active = true;
      activeDrag.el.classList.add("dragging");
      if (Number.isInteger(event.pointerId)) {
        activeDrag.el.setPointerCapture?.(event.pointerId);
      }
      document.body.classList.add("dragging-task");
      activeDrag.preview = createDragPreview(activeDrag.el);
      moveDragPreview(event.clientX, event.clientY);
    }

    function finishUnifiedDrag(event, source) {
      if (!activeDrag || activeDrag.source !== source) return;
      if (source === "pointer" && activeDrag.pointerId !== event.pointerId) return;
      const drag = activeDrag;
      drag.copyMode = event.altKey || drag.copyMode;
      if (Number.isInteger(event.pointerId)) {
        drag.el.releasePointerCapture?.(event.pointerId);
      }
      if (drag.active) {
        suppressNextClick = true;
        const day = getDropDayAt(event.clientX, event.clientY);
        const targetDate = day?.dataset.date || drag.targetDate;
        if (targetDate) {
          const position = day ? getUnifiedDropPosition(day, drag.type, event.clientY) : { beforeId: drag.beforeId };
          if (drag.copyMode && drag.type === "task") copyTaskToDate(drag.id, targetDate, position.beforeId);
          if (drag.copyMode && drag.type === "note") copyNoteToDate(drag.id, targetDate, position.beforeId);
          if (!drag.copyMode && drag.type === "task") moveTaskToDate(drag.id, targetDate, position.beforeId);
          if (!drag.copyMode && drag.type === "note") moveNoteToDate(drag.id, targetDate, position.beforeId);
        }
      }
      activeDrag = null;
      cleanupUnifiedDrag(drag);
    }

    function createDragPreview(el) {
      const rect = el.getBoundingClientRect();
      const preview = el.cloneNode(true);
      preview.classList.add("drag-preview");
      preview.classList.toggle("copy-mode", activeDrag.copyMode);
      preview.classList.remove("dragging");
      preview.style.width = `${rect.width}px`;
      preview.style.height = `${rect.height}px`;
      preview.style.left = "0";
      preview.style.top = "0";
      preview.style.setProperty("--drag-offset-x", `${activeDrag.startX - rect.left}px`);
      preview.style.setProperty("--drag-offset-y", `${activeDrag.startY - rect.top}px`);
      document.body.appendChild(preview);
      return preview;
    }

    function moveDragPreview(clientX, clientY) {
      if (!activeDrag?.preview) return;
      const offsetX = Number.parseFloat(activeDrag.preview.style.getPropertyValue("--drag-offset-x")) || 0;
      const offsetY = Number.parseFloat(activeDrag.preview.style.getPropertyValue("--drag-offset-y")) || 0;
      activeDrag.preview.style.transform = `translate3d(${clientX - offsetX}px, ${clientY - offsetY}px, 0)`;
    }

    function updateUnifiedDropTarget(clientX, clientY) {
      const day = getDropDayAt(clientX, clientY);
      document.querySelectorAll(".day.drag-over").forEach(el => {
        if (el !== day) el.classList.remove("drag-over");
      });
      if (!day) {
        clearDropMarkers();
        return;
      }
      day.classList.add("drag-over");
      const position = getUnifiedDropPosition(day, activeDrag.type, clientY);
      activeDrag.targetDate = day.dataset.date;
      activeDrag.beforeId = position.beforeId;
      placeUnifiedDropMarker(day, activeDrag.type, position.beforeId);
    }

    function getDropDayAt(clientX, clientY) {
      const stack = document.elementsFromPoint(clientX, clientY);
      const sourceDay = activeDrag?.sourceDate ? document.querySelector(`.day[data-date="${activeDrag.sourceDate}"]`) : null;
      for (const el of stack) {
        if (el.closest?.(".drag-preview, .dragging, .drop-marker, .note-drop-marker")) continue;
        const day = el.closest?.(".day");
        if (day) {
          if (activeDrag?.type === "note" && sourceDay && day !== sourceDay) {
            const sourceRect = sourceDay.getBoundingClientRect();
            const stillSortingNearSource =
              clientX >= sourceRect.left &&
              clientX <= sourceRect.right &&
              clientY >= sourceRect.top - 24 &&
              clientY <= sourceRect.bottom + 90 &&
              Math.abs(clientX - activeDrag.startX) < 72;
            if (stillSortingNearSource) return sourceDay;
          }
          return day;
        }
      }
      return null;
    }

    function getUnifiedDropPosition(day, type, clientY) {
      const selector = type === "note" ? ".day-note:not(.dragging)" : ".task:not(.dragging)";
      const idName = type === "note" ? "noteId" : "taskId";
      const items = [...day.querySelectorAll(selector)];
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) return { beforeId: el.dataset[idName] };
      }
      return { beforeId: null };
    }

    function placeUnifiedDropMarker(day, type, beforeId) {
      const list = day.querySelector(type === "note" ? ".day-notes" : ".task-list");
      if (!list) return;
      const markerClass = type === "note" ? "note-drop-marker" : "drop-marker";
      const itemSelector = type === "note" ? ".day-note" : ".task";
      const idAttr = type === "note" ? "noteId" : "taskId";
      const existing = list.querySelector(`.${markerClass}`);
      const beforeEl = beforeId ? [...list.querySelectorAll(itemSelector)].find(el => el.dataset[idAttr] === beforeId) : null;
      if (existing && existing.nextElementSibling === beforeEl) return;
      animateListChange(list, () => {
        clearDropMarkers();
        const marker = document.createElement("div");
        marker.className = markerClass;
        list.insertBefore(marker, beforeEl || null);
      });
    }

    function animateListChange(list, mutate) {
      const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
      if (reduceMotion) {
        mutate();
        return;
      }
      const items = [...list.querySelectorAll(".task:not(.dragging), .day-note:not(.dragging)")];
      const before = new Map(items.map(el => [el, el.getBoundingClientRect()]));
      mutate();
      requestAnimationFrame(() => {
        for (const el of items) {
          const first = before.get(el);
          if (!first || !el.isConnected) continue;
          const last = el.getBoundingClientRect();
          const dx = first.left - last.left;
          const dy = first.top - last.top;
          if (!dx && !dy) continue;
          el.style.transition = "none";
          el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
          requestAnimationFrame(() => {
            el.style.transition = "transform .18s cubic-bezier(.2,.8,.2,1)";
            el.style.transform = "translate3d(0,0,0)";
            setTimeout(() => {
              el.style.transition = "";
              el.style.transform = "";
            }, 210);
          });
        }
      });
    }

    function clearDropMarkers() {
      document.querySelectorAll(".drop-marker, .note-drop-marker").forEach(el => el.remove());
    }

    function cleanupUnifiedDrag(drag) {
      drag.el.classList.remove("dragging");
      drag.preview?.remove();
      document.body.classList.remove("dragging-task");
      document.querySelectorAll(".day.drag-over").forEach(el => el.classList.remove("drag-over"));
      clearDropMarkers();
    }
    function moveTaskToDate(taskId, targetDate, beforeId = null) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || !targetDate) return false;
      const oldDate = task.date;
      task.date = targetDate;
      reorderDateTasks(targetDate, taskId, beforeId);
      if (oldDate !== targetDate) reorderDateTasks(oldDate);
      persist();
      renderVisibleWeeks();
      showToast(oldDate === targetDate ? "已调整顺序" : `已移动到 ${targetDate.slice(5)}`);
      return true;
    }

    function moveNoteToDate(noteId, targetDate, beforeId = null) {
      const note = dayNotes.find(item => item.id === noteId);
      if (!note || !targetDate) return false;
      const oldDate = note.date;
      note.date = targetDate;
      reorderDateNotes(targetDate, noteId, beforeId);
      if (oldDate !== targetDate) reorderDateNotes(oldDate);
      persistDayData();
      renderVisibleWeeks();
      showToast(oldDate === targetDate ? "备注顺序已调整" : `备注已移动到 ${targetDate.slice(5)}`);
      return true;
    }

    function copyTaskToDate(taskId, targetDate, beforeId = null) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || !targetDate) return false;
      const copy = {
        ...task,
        id: createId(),
        date: targetDate,
        done: false,
        priority: normalizePriority(task.priority),
        createdAt: Date.now(),
        sortIndex: nextSortIndex(targetDate),
        contentBlocks: getTaskBlocks(task).map(block => ({ ...block, createdAt: Number(block.createdAt) || Date.now() }))
      };
      const progress = normalizeProgress(task.progress);
      if (progress) copy.progress = progress;
      else delete copy.progress;
      tasks.push(copy);
      reorderDateTasks(targetDate, copy.id, beforeId);
      persist();
      renderVisibleWeeks();
      showToast(`已复制到 ${targetDate.slice(5)}`);
      return true;
    }

    function copyNoteToDate(noteId, targetDate, beforeId = null) {
      const note = dayNotes.find(item => item.id === noteId);
      if (!note || !targetDate) return false;
      const copy = {
        ...note,
        id: createId(),
        date: targetDate,
        done: false,
        createdAt: Date.now(),
        sortIndex: nextNoteSortIndex(targetDate)
      };
      dayNotes.push(copy);
      reorderDateNotes(targetDate, copy.id, beforeId);
      persistDayData();
      renderVisibleWeeks();
      showToast(`已复制到 ${targetDate.slice(5)}`);
      return true;
    }

    function reorderDateTasks(dateKey, movedId = null, beforeId = null) {
      const ordered = tasks
        .filter(item => item.date === dateKey && item.id !== movedId)
        .sort(taskOrder);
      const moved = movedId ? tasks.find(item => item.id === movedId) : null;
      if (moved && moved.date === dateKey) {
        const targetIndex = beforeId ? ordered.findIndex(item => item.id === beforeId) : -1;
        ordered.splice(targetIndex >= 0 ? targetIndex : ordered.length, 0, moved);
      }
      ordered.forEach((item, index) => {
        item.sortIndex = index;
      });
    }

    function reorderDateNotes(dateKey, movedId = null, beforeId = null) {
      const ordered = dayNotes
        .filter(item => item.date === dateKey && item.id !== movedId)
        .sort(noteOrder);
      const moved = movedId ? dayNotes.find(item => item.id === movedId) : null;
      if (moved && moved.date === dateKey) {
        const targetIndex = beforeId ? ordered.findIndex(item => item.id === beforeId) : -1;
        ordered.splice(targetIndex >= 0 ? targetIndex : ordered.length, 0, moved);
      }
      ordered.forEach((item, index) => {
        item.sortIndex = index;
      });
    }

    function setDayState(dateKey, state) {
      if (!isDateKey(dateKey)) return;
      if (dayStates[dateKey] === state) {
        delete dayStates[dateKey];
      } else {
        dayStates[dateKey] = state;
      }
      persistDayData();
      renderVisibleWeeks();
      showToast(dayStates[dateKey] === "good" ? "已标记为淡绿色" : dayStates[dateKey] === "bad" ? "已标记为淡红色" : "已取消日期标记");
    }

    function handleDocumentClick(event) {
      if (suppressNextClick) {
        suppressNextClick = false;
        event.preventDefault();
        return;
      }
      if (els.desktopSearch?.classList.contains("open") && !event.target.closest(".desktop-search")) {
        closeDesktopSearch();
      }
      if (event.target.closest(".modal, button, input, select, textarea, .task, .day-note")) return;
      const day = event.target.closest(".day");
      if (!day) return;
      selectDate(day.dataset.date);
      showToast(`已选中 ${selectedDateKey.slice(5)}，按 Ctrl+C 复制当天事项`);
    }

    function selectDate(dateKey) {
      selectedDateKey = dateKey;
      document.querySelectorAll(".day.selected-day").forEach(el => el.classList.remove("selected-day"));
      document.querySelectorAll(`.day[data-date="${dateKey}"]`).forEach(el => el.classList.add("selected-day"));
    }

    function handleDocumentCopy(event) {
      if (!selectedDateKey) return;
      if (hasActiveTextSelection()) return;
      if (isCopyFromEditableContext()) return;
      const rows = getCopyRowsForDate(selectedDateKey);
      if (!rows.length) {
        showToast("当天没有可复制的用户内容");
        return;
      }
      const text = buildDateCopyText(selectedDateKey, rows);
      event.clipboardData.setData("text/plain", text);
      event.clipboardData.setData("text/html", buildDateCopyHtml(selectedDateKey, rows));
      event.preventDefault();
      showToast(`已复制 ${rows.length} 条用户内容`);
    }

    function hasActiveTextSelection() {
      const selection = window.getSelection?.();
      if (!selection || selection.rangeCount === 0) return false;
      return selection.toString().trim().length > 0;
    }

    function isCopyFromEditableContext() {
      const el = document.activeElement;
      if (!el) return false;
      if (["INPUT", "TEXTAREA", "SELECT"].includes(el.tagName)) return true;
      return Boolean(el.closest?.(".modal, [contenteditable='true']"));
    }

    function buildDateCopyText(dateKey, rows) {
      const lines = [];
      let number = 1;
      rows.forEach(row => {
        const parts = getUserTextParts(row);
        if (!parts.length) return;
        lines.push(`${number}. ${parts.shift()}`);
        parts.forEach(part => lines.push(part));
        number += 1;
      });
      return lines.join("\n").trim();
    }

    function getTasksForDate(dateKey) {
      return tasks.filter(task => task.date === dateKey).sort(taskOrder);
    }

    function getNotesForDate(dateKey) {
      return dayNotes.filter(note => note.date === dateKey).sort(noteOrder);
    }

    function getCopyRowsForDate(dateKey) {
      return getTasksForDate(dateKey)
        .map(item => ({ type: "task", item }))
        .filter(row => getUserTextParts(row).length || getUserImageBlocks(row).length);
    }

    function buildDateCopyHtml(dateKey, rows) {
      const parts = ["<ol>"];
      rows.forEach(row => {
        const textParts = getUserTextParts(row);
        const imageBlocks = getUserImageBlocks(row);
        parts.push("<li>");
        textParts.forEach((text, index) => {
          parts.push(index === 0 ? `<strong>${escapeHtml(text)}</strong>` : `<p>${escapeHtml(text).replace(/\n/g, "<br>")}</p>`);
        });
        imageBlocks.forEach(block => {
          if (block.type === "text") parts.push(`<p>${escapeHtml(block.text).replace(/\n/g, "<br>")}</p>`);
          if (block.type === "image") parts.push(`<div><img src="${escapeAttr(block.src)}" style="max-width:420px;height:auto;" /></div>`);
        });
        parts.push("</li>");
      });
      parts.push("</ol>");
      return parts.join("");
    }

    function getUserTextParts(row) {
      if (row.type === "note") return [row.item.text].filter(Boolean);
      const task = row.item;
      const textBlocks = getTaskBlocks(task).filter(block => block.type === "text").map(block => block.text).filter(Boolean);
      const hasImages = getTaskBlocks(task).some(block => block.type === "image");
      const fallbackTitle = hasImages && task.title === "图片事项" ? "" : task.title;
      const parts = textBlocks.length ? [...textBlocks] : [fallbackTitle].filter(Boolean);
      if (task.note) parts.push(task.note);
      const progress = normalizeProgress(task.progress);
      if (progress) parts.push(`${progress}%`);
      return parts;
    }

    function getUserImageBlocks(row) {
      if (row.type !== "task") return [];
      return getTaskBlocks(row.item).filter(block => block.type === "image");
    }

    function setupInfiniteScroll() {
      const bottomObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) appendWeeks(8);
      }, { rootMargin: "700px 0px" });
      const topObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) prependWeeks(8);
      }, { rootMargin: "700px 0px" });
      bottomObserver.observe(els.bottomSentinel);
      topObserver.observe(els.topSentinel);
    }

    function appendWeeks(count) {
      if (loadingMore || !lastSunday) return;
      loadingMore = true;
      const cursor = new Date(lastSunday);
      cursor.setDate(cursor.getDate() + 1);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      const newLast = new Date(cursor);
      newLast.setDate(newLast.getDate() - 1);
      lastSunday = newLast;
      els.weeks.insertAdjacentHTML("beforeend", html);
      loadingMore = false;
    }

    function prependWeeks(count) {
      if (loadingMore || !firstMonday) return;
      loadingMore = true;
      const beforeTop = els.weeks.getBoundingClientRect().top;
      const start = new Date(firstMonday);
      start.setDate(start.getDate() - count * 7);
      const cursor = new Date(start);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = start;
      els.weeks.insertAdjacentHTML("afterbegin", html);
      const afterTop = els.weeks.getBoundingClientRect().top;
      window.scrollBy(0, afterTop - beforeTop);
      loadingMore = false;
    }

    function jumpMonth(delta) {
      const target = new Date(currentYear, currentMonth + delta, 1);
      currentYear = target.getFullYear();
      currentMonth = target.getMonth();
      ensureMonthRendered(target);
      setTimeout(() => scrollToMonth(target), 40);
    }

    function goToday() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      ensureMonthRendered(today);
      setTimeout(() => scrollToDate(today, true), 40);
    }

    function goCurrentMonth() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      ensureMonthRendered(today);
      setTimeout(() => scrollToMonth(new Date(today.getFullYear(), today.getMonth(), 1)), 40);
    }

    function scrollToTodayOnBoot() {
      const today = new Date();
      const run = () => {
        ensureMonthRendered(today);
        scrollToDate(today, false);
      };
      run();
      requestAnimationFrame(() => {
        run();
        setTimeout(() => {
          if (!isDateInView(today)) run();
        }, 180);
      });
    }

    function restoreViewState(state) {
      const next = normalizeViewState(state);
      if (!next) {
        bootAutoScrollActive = true;
        scrollToTodayOnBoot();
        return;
      }
      restoringViewState = true;
      const target = new Date(next.year, next.month, 1);
      ensureMonthRendered(target);
      const restore = () => {
        const max = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
        let top = next.scrollY;
        if (next.anchorDate && isDateKey(next.anchorDate)) {
          ensureDateRendered(parseKey(next.anchorDate));
          const anchorCell = document.querySelector(`.day[data-date="${next.anchorDate}"]`);
          const anchorWeek = anchorCell?.closest(".week");
          if (anchorWeek) {
            const weekTop = anchorWeek.getBoundingClientRect().top + window.scrollY;
            top = weekTop + next.anchorOffset;
          }
        }
        window.scrollTo({ top: clamp(top, 0, max), behavior: "auto" });
        updateMonthFromScroll();
      };
      restore();
      requestAnimationFrame(() => {
        restore();
        setTimeout(() => {
          restore();
          setTimeout(() => {
            restoringViewState = false;
          }, 700);
        }, 180);
      });
    }

    function cancelBootAutoScroll() {
      bootAutoScrollActive = false;
    }

    function ensureMonthRendered(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      if (document.querySelector(`.week[data-month="${key}"]`)) return;
      renderAround(date);
    }

    function scrollToMonth(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      const week = document.querySelector(`.week[data-month="${key}"]`);
      if (!week) return;
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: "smooth" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function scrollToDate(date, smooth) {
      const key = toKey(date);
      const cell = document.querySelector(`.day[data-date="${key}"]`);
      if (!cell) return;
      const week = cell.closest(".week");
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: smooth ? "smooth" : "auto" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function isDateInView(date) {
      const cell = document.querySelector(`.day[data-date="${toKey(date)}"]`);
      if (!cell) return false;
      const rect = cell.getBoundingClientRect();
      const topLimit = getStickyOffset();
      return rect.top >= topLimit && rect.top < window.innerHeight * 0.72;
    }

    function updateMonthFromScroll() {
      const weeks = document.querySelectorAll(".week");
      const threshold = getStickyOffset() + 14;
      for (const week of weeks) {
        const rect = week.getBoundingClientRect();
        if (rect.top <= threshold && rect.bottom > threshold) {
          const [year, month] = week.dataset.month.split("-").map(Number);
          updateMonthLabel(year, month);
          return;
        }
      }
      const first = weeks[0];
      if (first) {
        const [year, month] = first.dataset.month.split("-").map(Number);
        updateMonthLabel(year, month);
      }
    }

    function updateMonthLabel(year, month) {
      currentYear = year;
      currentMonth = month;
      els.monthLabel.textContent = `${year}年${month + 1}月`;
    }

    function captureViewState() {
      const anchor = getCurrentViewAnchor();
      return normalizeViewState({
        year: currentYear,
        month: currentMonth,
        scrollY: Math.max(0, Math.round(window.scrollY || 0)),
        savedAt: Date.now(),
        anchorDate: anchor?.date || null,
        anchorOffset: anchor?.offset || 0
      });
    }

    function getCurrentViewAnchor() {
      const threshold = getStickyOffset() + 14;
      const weeks = [...document.querySelectorAll(".week")];
      let candidate = weeks.find(week => {
        const rect = week.getBoundingClientRect();
        return rect.top <= threshold && rect.bottom > threshold;
      }) || weeks.find(week => week.getBoundingClientRect().bottom > threshold) || weeks[0];
      if (!candidate) return null;
      const dates = JSON.parse(candidate.dataset.dates || "[]");
      const date = dates[0];
      if (!isDateKey(date)) return null;
      const weekTop = candidate.getBoundingClientRect().top + window.scrollY;
      return {
        date,
        offset: Math.max(0, Math.round((window.scrollY - weekTop) || 0))
      };
    }

    function saveCurrentViewState() {
      if (restoringViewState) return;
      const next = captureViewState();
      if (!next) return;
      const previous = viewState;
      if (previous && previous.year === next.year && previous.month === next.month && Math.abs(previous.scrollY - next.scrollY) < 4) return;
      viewState = next;
      settings.viewState = next;
      saveViewStateLocal(next);
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      queueCloudSave();
    }

    function saveCurrentViewStateImmediate() {

    async function handleTaskPaste(event) {
      const items = [...(event.clipboardData?.items || [])];
      let added = 0;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          event.preventDefault();
          const file = item.getAsFile();
          if (file) {
            const image = await compressImage(file);
            insertEditorImage(image);
            added++;
          }
        }
      }
      const text = cleanPastedText(event.clipboardData?.getData("text/plain"));
      if (text) {
        event.preventDefault();
        insertEditorText(text);
        added++;
      }
      if (added) {
        pendingBlocks = readEditorBlocks();
        showToast(`已粘贴 ${added} 项内容`);
      }
    }

    function renderContentBlocks() {
      pendingBlocks = normalizeContentBlocks(pendingBlocks);
      els.taskTitle.innerHTML = pendingBlocks.map(block => {
        if (block.type === "image") return `<img src="${escapeAttr(block.src)}" alt="粘贴图片" data-content-image="true" />`;
        return escapeHtml(block.text || "").replace(/\n/g, "<br>");
      }).join("");
      els.taskTitle.classList.toggle("is-ready", pendingBlocks.length > 0);
    }

    function removeContentBlock(index) {

    function insertEditorText(text) {

    function insertEditorImage(image) {
      els.taskTitle.focus();
      const img = document.createElement("img");
      img.src = image.src;
      img.alt = "粘贴图片";
      img.dataset.contentImage = "true";
      img.dataset.width = image.width;
      img.dataset.height = image.height;
      img.dataset.mime = image.mime || image.type || "image/webp";
      insertNodeAtCursor(img);
      insertNodeAtCursor(document.createElement("br"));
    }

    function insertNodeAtCursor(node) {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) {
        els.taskTitle.appendChild(node);
        return;
      }
      const range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function readEditorBlocks() {
      const blocks = [];
      let textBuffer = "";
      const flushText = () => {
        const text = cleanPastedText(textBuffer);
        if (text) blocks.push({ type: "text", text });
        textBuffer = "";
      };
      const walk = node => {
        if (node.nodeType === Node.TEXT_NODE) {
          textBuffer += node.textContent || "";
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        if (node.tagName === "IMG" && node.src?.startsWith("data:image/")) {
          flushText();
          blocks.push({
            type: "image",
            src: node.src,
            width: Number(node.dataset.width) || node.naturalWidth || 0,
            height: Number(node.dataset.height) || node.naturalHeight || 0,
            mime: node.dataset.mime || "image/webp",
            createdAt: Date.now()
          });
          return;
        }
        if (node.tagName === "BR") {
          textBuffer += "\n";
          return;
        }
        if (["DIV", "P"].includes(node.tagName) && textBuffer && !textBuffer.endsWith("\n")) textBuffer += "\n";
        [...node.childNodes].forEach(walk);
        if (["DIV", "P"].includes(node.tagName)) textBuffer += "\n";
      };
      [...els.taskTitle.childNodes].forEach(walk);
      flushText();
      return normalizeContentBlocks(blocks);
    }

    function cleanPastedText(value) {
      const text = String(value || "").trim();
      if (!text || text === "undefined" || text === "null") return "";
      return text;
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = () => {
          img.onload = () => {
            const maxSide = 900;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const width = Math.max(1, Math.round(img.width * scale));
            const height = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            const src = canvas.toDataURL("image/webp", 0.78);
            resolve({ src, width, height, type: "image/webp", createdAt: Date.now() });
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function clearDoneTasks() {
      const before = tasks.length;
      tasks = tasks.filter(task => !task.done);

    function saveTemplate(payload) {
      const title = payload.title.trim();
      if (!title) return;
      const progress = normalizeProgress(payload.progress);
      const priority = normalizePriority(payload.priority);
      const category = normalizeCategoryId(payload.category);
      const exists = taskTemplates.some(t => t.title === title && normalizeCategoryId(t.category) === category && normalizePriority(t.priority) === priority && (t.note || "") === (payload.note || "") && normalizeProgress(t.progress) === progress);
      if (exists) return;
      const template = { id: createId(), title, category, priority, note: payload.note || "", createdAt: Date.now() };
      if (progress) template.progress = progress;
      taskTemplates.unshift(template);

    function createBulkTasks(event) {
      event.preventDefault();
      const items = lastBulkItems.length ? lastBulkItems : buildBulkItems();
      if (!items.length) {
        showToast("没有可创建的任务");
        return;
      }
      const existing = new Set(tasks.map(t => `${t.date}|${t.title}`));
      const sortCounters = {};
      const rows = items.filter(item => !existing.has(`${item.date}|${item.title}`)).map(item => {
        sortCounters[item.date] = sortCounters[item.date] ?? nextSortIndex(item.date);
        return { id: createId(), title: item.title, date: item.date, category: item.category, priority: "normal", note: item.note || "", done: false, createdAt: Date.now(), sortIndex: sortCounters[item.date]++ };
      });
      tasks = [...tasks, ...rows];
      persist();
      closeBulk();
      renderVisibleWeeks();
      showToast(`已创建 ${rows.length} 条任务`);
    }

    function buildBulkItems() {
      const mode = els.bulkMode.value;
      const category = normalizeCategoryId(els.bulkCategory.value || settings.defaultCategory);
      const title = els.bulkTitle.value.trim();
      if (mode === "text") return parseBulkText(category);
      if (!title) return [];
      const start = parseKey(els.bulkStart.value || toKey(new Date()));
      const end = parseKey(els.bulkEnd.value || els.bulkStart.value || toKey(new Date()));
      if (end < start) return [];
      const items = [];
      if (mode === "range") {
        walkDates(start, end, d => items.push({ title, date: toKey(d), category }));
      } else if (mode === "weekly") {
        const weekdays = Array.from(els.bulkWeekdays.selectedOptions).map(o => Number(o.value));
        const allow = weekdays.length ? weekdays : [start.getDay()];
        walkDates(start, end, d => { if (allow.includes(d.getDay())) items.push({ title, date: toKey(d), category }); });
      } else if (mode === "monthly") {
        const day = clamp(Number(els.bulkMonthDay.value) || start.getDate(), 1, 31);
        const cur = new Date(start.getFullYear(), start.getMonth(), 1);
        while (cur <= end) {
          const last = new Date(cur.getFullYear(), cur.getMonth() + 1, 0).getDate();
          const d = new Date(cur.getFullYear(), cur.getMonth(), Math.min(day, last));
          if (d >= start && d <= end) items.push({ title, date: toKey(d), category });
          cur.setMonth(cur.getMonth() + 1);
        }
      } else if (mode === "interval") {
        const step = clamp(Number(els.bulkMonthDay.value) || 1, 1, 365);
        const cur = new Date(start);
        while (cur <= end) {
          items.push({ title, date: toKey(cur), category });
          cur.setDate(cur.getDate() + step);
        }
      }
      return items.slice(0, 500);
    }

    function parseBulkText(category) {
      return els.bulkText.value.split(/\r?\n/).map(line => line.trim()).filter(Boolean).map(line => {
        const m = line.match(/^(\d{4}-\d{2}-\d{2})\s+(.+)$/);
        if (m) return { date: m[1], title: m[2].trim(), category };
        return { date: els.bulkStart.value || toKey(new Date()), title: line, category };
      }).filter(item => isDateKey(item.date) && item.title).slice(0, 500);
    }

    function walkDates(start, end, fn) {
      const cur = new Date(start);
      while (cur <= end) {
        fn(new Date(cur));
        cur.setDate(cur.getDate() + 1);
      }
    }

    function exportData() {
      const payload = { tasks, settings, templates: taskTemplates, dayStates, dayNotes, exportedAt: new Date().toISOString(), app: "极简待办" };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;

    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const incoming = Array.isArray(data) ? data : data.tasks;
          if (!Array.isArray(incoming)) throw new Error("invalid");
          const existing = new Set(tasks.map(task => task.id));
          tasks = [...normalizeTasks(incoming).filter(task => !existing.has(task.id)), ...tasks];
          if (data.templates) taskTemplates = normalizeTemplates([...data.templates, ...taskTemplates]);
          if (data.settings) settings = normalizeSettings({ ...settings, ...data.settings });
          if (data.dayStates) dayStates = { ...dayStates, ...normalizeDayStates(data.dayStates) };
          if (data.dayNotes) dayNotes = normalizeDayNotes([...data.dayNotes, ...dayNotes]);
          persist();
          persistTemplates();
          persistDayData();
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
          queueCloudSave();
          applySettings();
          renderVisibleWeeks();
          showToast("导入成功");
        } catch {
          showToast("导入文件格式不正确");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    async function handleAuthRedirect() {
      const params = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const error = params.get("error_description") || hash.get("error_description");
      if (error) {
        showToast(decodeURIComponent(error));
        history.replaceState(null, "", getSiteUrl());
        openAuth();
        return;
      }
      const accessToken = hash.get("access_token");
      const refreshToken = hash.get("refresh_token");
      if (accessToken && refreshToken) {
        ensureCloudClient();
        setCloudSession({
          access_token: accessToken,
          refresh_token: refreshToken,
          expires_in: Number(hash.get("expires_in")) || 3600,
          token_type: hash.get("token_type") || "bearer",
          user: null
        });
        history.replaceState(null, "", getSiteUrl());
        showToast("注册成功，正在加载云端数据");
        await loadCloudData();
        return;
      }
      const type = params.get("type") || hash.get("type");
      if (type === "signup" || type === "email_change") {
        history.replaceState(null, "", getSiteUrl());
        showToast("邮箱确认成功，请登录");
        openAuth();
      }
    }

    async function syncNow() {
