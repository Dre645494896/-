<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>极简待办</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f1f4f8;
      --line: #e1e6ed;
      --line-strong: #c8d1dc;
      --text: #1f2933;
      --muted: #6f7b88;
      --quiet: #9aa5b1;
      --primary: #2563eb;
      --primary-soft: #eaf1ff;
      --green: #10b981;
      --red: #e5484d;
      --amber: #f59e0b;
      --shadow: 0 12px 32px rgba(31, 41, 51, .08);
      --radius: 8px;
      --topbar-h: 64px;
      --weekday-h: 40px;
      --day-min-h: 360px;
      --task-min-h: 30px;
      --task-font-size: 13px;
      --task-pad-x: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--topbar-h);
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, .92);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .topbar-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 560;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-label {
      min-width: 120px;
      text-align: center;
      font-size: 16px;
      font-weight: 760;
    }

    .filters {
      position: absolute;
      left: 50vw;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      width: max-content;
      justify-self: center;
    }

    .category-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
    }

    .category-toggle-btn {
      min-width: 92px;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 760;
      transition: .15s ease;
    }

    .category-toggle-btn.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--primary);
      box-shadow: 0 1px 2px rgba(31, 41, 51, .06);
    }

    .search, .select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: 0;
    }

    .search {
      width: 100%;
      padding: 0 12px;
    }

    .select {
      padding: 0 10px;
    }

    .search:focus, .select:focus, .task-input:focus, .modal :is(textarea, input, select, [contenteditable="true"]):focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      justify-self: end;
      position: relative;
    }

    .desktop-search {
      position: relative;
    }

    .search-icon-btn {
      width: 38px;
      min-height: 38px;
      padding: 0;
    }

    .search-icon-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
    }

    .desktop-search-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 45;
      width: 280px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      display: none;
    }

    .desktop-search.open .desktop-search-panel {
      display: block;
    }

    .account-pill {
      min-height: 38px;
      max-width: 104px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-pill.syncing {
      color: #1d4ed8;
      background: #eaf1ff;
      border-color: #bfdbfe;
    }

    .account-pill.synced {
      color: #047857;
      background: #ecfdf5;
      border-color: #a7f3d0;
    }

    .account-pill.error {
      color: #b91c1c;
      background: #fff1f2;
      border-color: #fecaca;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 650;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--line-strong); }
    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.danger {
      color: #fff;
      border-color: var(--red);
      background: var(--red);
      box-shadow: 0 8px 18px rgba(229, 72, 77, .20);
    }

    .btn.danger:hover {
      background: #dc2626;
      border-color: #dc2626;
    }

    .btn.icon {
      width: 38px;
      padding: 0;
      font-size: 18px;
    }

    .weekday {
      position: sticky;
      top: var(--topbar-h);
      z-index: 20;
      min-height: var(--weekday-h);
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    .weekday span {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: .04em;
    }

    .calendar {
      padding: 1px 0 28px;
    }

    .sentinel {
      height: 1px;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .month-band-a .day:not(.is-today):not(.drag-over) {
      background: #ffffff;
    }

    .month-band-b .day:not(.is-today):not(.drag-over) {
      background: #fbfcff;
    }

    .month-start {
      position: relative;
    }

    .month-start::before {
      content: attr(data-month-title);
      position: absolute;
      left: 10px;
      top: -1px;
      z-index: 2;
      padding: 2px 8px;
      border: 1px solid #d7e2f2;
      border-radius: 0 0 7px 7px;
      background: rgba(248, 251, 255, .94);
      color: #64748b;
      font-size: 11px;
      font-weight: 750;
      pointer-events: none;
    }

    .day {
      min-width: 0;
      min-height: var(--day-min-h);
      background: var(--panel);
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .day.other-month {
      background: #fbfcfd;
      color: var(--quiet);
    }

    .day.other-month.hide-other-tasks .task-list {
      display: none;
    }

    .day.weekend.weekend-tint:not(.is-today) {
      background: #fffafa;
    }

    .day.weekend.weekend-tint:not(.is-today) .date-num {
      color: #d94665;
    }

    .day.rest-day:not(.is-today):not(.selected-day):not(.has-special):not(.day-good):not(.day-bad):not(.drag-over) {
      background: #f2f4f7;
    }

    .rest-day-pill,
    .work-adjust-pill {
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
      white-space: nowrap;
    }

    .rest-day-pill {
      color: #64748b;
      background: rgba(100, 116, 139, .14);
    }

    .work-adjust-pill {
      color: #92400e;
      background: rgba(245, 158, 11, .16);
    }

    .day.is-today {
      position: relative;
      z-index: 1;
      background: #f5f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .42);
    }

    .day.is-today::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(37, 99, 235, .55);
    }

    .day:hover:not(.drag-over) {
      background: #f4f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .22);
    }

    .day.drag-over {
      background: #dbe8ff;
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .day.selected-day {
      background: #f7fbff;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .34);
    }

    .day.day-good {
      background: #dcfce7;
      box-shadow: inset 0 0 0 2px rgba(22, 163, 74, .34);
    }

    .day.day-bad {
      background: #ffe4e6;
      box-shadow: inset 0 0 0 2px rgba(225, 29, 72, .34);
    }

    .day.day-good.is-today {
      background: linear-gradient(180deg, rgba(220, 252, 231, .95), rgba(239, 246, 255, .82));
    }

    .day.day-bad.is-today {
      background: linear-gradient(180deg, rgba(255, 228, 230, .96), rgba(239, 246, 255, .82));
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 24px;
    }

    .day-actions {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .date-main {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .date-inline-meta {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
    }

    .date-inline-chip {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-pill:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .date-inline-chip.special {
      color: var(--special-color, var(--primary));
      font-weight: 800;
    }

    .date-inline-sep {
      color: var(--quiet);
      flex: 0 0 auto;
    }

    .date-extra {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: var(--quiet);
      font-size: 11px;
      line-height: 1;
      margin-top: 3px;
    }

    .date-lunar {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: -3px;
      min-height: 18px;
    }

    .date-badge {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 750;
      line-height: 1.2;
      color: #64748b;
      background: #eef2f7;
    }

    .date-badge.holiday {
      color: #b45309;
      background: rgba(245, 158, 11, .16);
    }

    .date-badge.workday {
      color: #64748b;
      background: rgba(100, 116, 139, .14);
    }

    .date-badge.festival {
      color: #be123c;
      background: rgba(244, 63, 94, .13);
    }

    .date-badge.special {
      color: var(--special-color, #7c3aed);
      background: var(--special-bg, rgba(124, 58, 237, .13));
    }

    .day.has-holiday:not(.is-today) {
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, .14);
    }

    .day.has-special:not(.is-today) {
      background: linear-gradient(180deg, var(--special-bg, rgba(124, 58, 237, .14)), rgba(255,255,255,.96) 52px);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--special-color, #7c3aed) 28%, transparent);
    }

    .day.has-special {
      position: relative;
    }

    .day.has-special::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 5px;
      background: var(--special-color, #7c3aed);
      opacity: .78;
      pointer-events: none;
    }

    .calendar .week .day.day-good:not(.drag-over),
    .calendar .week .day.day-good.is-today,
    .calendar .week .day.day-good.has-special,
    .calendar .week .day.day-good.weekend.weekend-tint {
      background: #dff7e8;
      box-shadow: inset 0 0 0 2px rgba(16, 185, 129, .42);
    }

    .calendar .week .day.day-bad:not(.drag-over),
    .calendar .week .day.day-bad.is-today,
    .calendar .week .day.day-bad.has-special,
    .calendar .week .day.day-bad.weekend.weekend-tint {
      background: #ffe1e7;
      box-shadow: inset 0 0 0 2px rgba(229, 72, 77, .42);
    }

    .calendar .week .day.day-good.selected-day,
    .calendar .week .day.day-bad.selected-day {
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .42), inset 0 0 0 4px rgba(255, 255, 255, .58);
    }

    .date-num {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .date-week {
      display: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .today-pill {
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 760;
    }

    .day-action,
    .add-day {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--quiet);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
    }

    .day-action {
      font-size: 13px;
      font-weight: 800;
    }

    .day:hover .add-day,
    .day:hover .day-action {
      border-color: var(--line);
      background: #fff;
      color: var(--primary);
    }

    .day-action.good.active {
      color: #15803d;
      border-color: rgba(22, 163, 74, .28);
      background: rgba(220, 252, 231, .95);
    }

    .day-action.bad.active {
      color: #be123c;
      border-color: rgba(225, 29, 72, .28);
      background: rgba(255, 228, 230, .95);
    }

    .task-list {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .day-notes {
      width: 100%;
      min-width: 0;
      margin-top: auto;
      padding-top: 8px;
      display: grid;
      gap: 4px;
      align-content: end;
      justify-content: stretch;
      justify-items: stretch;
      align-self: stretch;
    }

    .task {
      min-height: var(--task-min-h);
      border: 1px solid color-mix(in srgb, var(--cat-color) 24%, var(--line));
      border-left: 4px solid var(--cat-color, var(--primary));
      border-radius: 7px;
      background: var(--cat-bg, #fff);
      padding: 3px 5px 3px var(--task-pad-x);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      cursor: grab;
      touch-action: none;
      transition: box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .task.has-image {
      align-items: stretch;
      grid-template-columns: minmax(0, 1fr);
      padding: 6px;
      gap: 6px;
    }

    .task:hover {
      box-shadow: 0 4px 14px rgba(31, 41, 51, .08);
    }

    .task.dragging {
      opacity: .45;
      cursor: grabbing;
    }

    .task.priority-high {
      border-color: rgba(220, 38, 38, .28);
      border-left-color: #dc2626;
      background: #fff1f2;
    }

    .task.priority-urgent {
      border-color: rgba(127, 29, 29, .45);
      border-left-color: #7f1d1d;
      background: #991b1b;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    .task.priority-urgent .task-title,
    .task.priority-urgent .task-title-more,
    .task.priority-urgent .note {
      color: #fff;
    }

    .task.priority-urgent .tag,
    .task.priority-urgent .progress-tag,
    .task.priority-urgent .priority-tag {
      background: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .task.priority-urgent .mini-btn {
      background: rgba(255, 255, 255, .12);
      border-color: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .priority-tag {
      border-radius: 5px;
      padding: 1px 5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .priority-tag.high {
      background: #ffe4e6;
      color: #be123c;
    }

    .priority-tag.urgent {
      background: #7f1d1d;
      color: #fff;
    }

    .drop-marker {
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .drag-preview {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 90;
      pointer-events: none;
      opacity: .74;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .58);
      box-shadow: 0 10px 26px rgba(31, 41, 51, .13), 0 0 0 1px rgba(37, 99, 235, .08);
      backdrop-filter: blur(16px) saturate(1.18);
      -webkit-backdrop-filter: blur(16px) saturate(1.18);
      transform-origin: 0 0;
      will-change: transform;
      scale: .985;
    }

    .drag-preview.task,
    .drag-preview.day-note {
      cursor: grabbing;
    }

    .drag-preview.copy-mode {
      box-shadow: 0 10px 26px rgba(37, 99, 235, .18), 0 0 0 2px rgba(37, 99, 235, .22);
    }

    .drag-preview.copy-mode::after {
      content: "复制";
      position: absolute;
      right: 6px;
      top: 6px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 800;
    }

    body.dragging-task {
      user-select: none;
      cursor: grabbing;
    }

    .task.done {
      opacity: .72;
      filter: saturate(.65);
    }

    .task.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-title-wrap {
      min-width: 0;
      flex: 1 1 auto;
    }

    .task-title {
      margin: 0;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: pre-line;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      font-size: var(--task-font-size);
      line-height: 1.25;
      font-weight: 700;
      word-break: break-word;
    }

    .task-title-more {
      margin: 0;
      color: var(--text);
      font-size: var(--task-font-size);
      line-height: 1.25;
      font-weight: 700;
      word-break: break-word;
    }

    .task-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(148, 163, 184, .22);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .task-content {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .task.has-image .task-content {
      pointer-events: none;
      user-select: none;
    }

    .task-content-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task.has-image .task-main {
      display: grid;
      gap: 5px;
    }

    .task.has-image .task-title {
      white-space: pre-line;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .task.has-image .task-actions {
      opacity: 1;
      justify-content: flex-start;
    }

    .task-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
    }

    .tag {
      border-radius: 5px;
      padding: 1px 5px;
      background: var(--panel-soft);
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .note {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .day-note {
      width: 100%;
      justify-self: stretch;
      margin-left: 0;
      margin-right: 0;
      min-height: 28px;
      border: 1px solid rgba(225, 29, 72, .22);
      border-left: 4px solid #e11d48;
      border-radius: 7px;
      background: #fff1f2;
      color: #881337;
      padding: 4px 5px 4px 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      cursor: grab;
      transition: box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .day-note:hover {
      box-shadow: 0 4px 14px rgba(225, 29, 72, .1);
    }

    .day-note.dragging {
      opacity: .45;
      cursor: grabbing;
    }

    .day-note.done {
      opacity: .58;
      filter: saturate(.55);
    }

    .day-note.done .day-note-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .day-note-title {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 740;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .day-note-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .note-drop-marker {
      width: 100%;
      justify-self: stretch;
      margin-left: 0;
      margin-right: 0;
      height: 3px;
      border-radius: 999px;
      background: #e11d48;
      box-shadow: 0 0 0 3px rgba(225, 29, 72, .12);
    }

    .hidden {
      display: none !important;
    }

    .modal.note-mode #taskMetaRow {
      grid-template-columns: 1fr;
    }

    .task-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      opacity: .18;
      transition: opacity .15s ease;
    }

    .task:hover .task-actions,
    .task:focus-within .task-actions {
      opacity: 1;
    }

    .mini-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
    }

    .mini-btn:hover { border-color: var(--line-strong); color: var(--text); }
    .mini-btn.good:hover { color: var(--green); border-color: #a7f3d0; background: #ecfdf5; }
    .mini-btn.bad:hover { color: var(--red); border-color: #fecaca; background: #fff1f2; }

    .empty-hint {
      color: var(--quiet);
      font-size: 12px;
      opacity: 0;
      transition: opacity .16s ease;
      padding: 6px 2px;
    }

    .day:hover .empty-hint { opacity: 1; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, .34);
      opacity: 0;
      transition: opacity .18s ease;
    }

    .modal-backdrop.show {
      display: flex;
      opacity: 1;
    }

    .modal-backdrop.closing {
      opacity: 0;
    }

    .modal {
      width: min(520px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      transform: translateY(10px) scale(.985);
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
    }

    .modal-backdrop.show .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-backdrop.closing .modal {
      transform: translateY(8px) scale(.99);
      opacity: 0;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .confirm-modal {
      width: min(420px, 100%);
    }

    .confirm-modal h2 {
      margin-bottom: 8px;
    }

    .confirm-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-grid {
      display: grid;
      gap: 10px;
    }

    .modal-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-priority-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .priority-segment {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-soft);
    }

    .priority-option {
      min-width: 44px;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      padding: 0 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .priority-option.active {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
      box-shadow: 0 1px 5px rgba(31, 41, 51, .08);
    }

    .priority-option[data-priority="high"].active {
      color: #be123c;
      background: #fff1f2;
      border-color: rgba(220, 38, 38, .24);
    }

    .priority-option[data-priority="urgent"].active {
      color: #fff;
      background: #991b1b;
      border-color: #7f1d1d;
    }

    .modal textarea,
    .modal input,
    .modal select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: 0;
      padding: 0 11px;
    }

    .modal textarea {
      min-height: 120px;
      resize: vertical;
      padding-top: 10px;
    }

    #taskTitle {
      min-height: 180px;
      padding: 12px;
      resize: vertical;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

      content: attr(data-placeholder);

    }

    #taskTitle img {
      display: block;
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);

    }

    .modal-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 92px;
      gap: 10px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .auth-status {
      min-height: 32px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
    }

    .auth-switch {
      margin-top: 4px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .auth-mode-link {
      min-height: 28px;
      border: 0;
      background: transparent;
      color: var(--primary);
      padding: 0;
      font-weight: 750;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
      min-height: 430px;
      max-height: min(58vh, 560px);
      overflow-y: auto;
      align-content: start;
      padding-right: 2px;
    }

    .settings-modal {
      width: min(760px, 96vw);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .settings-tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      overflow-x: auto;
    }

    .settings-tab {
      min-height: 32px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .settings-tab.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--primary);
      box-shadow: 0 1px 2px rgba(31, 41, 51, .06);
    }

    .settings-panel {
      display: none;
      gap: 12px;
    }

    .settings-panel.active {
      display: grid;
      align-content: start;
    }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
      align-items: center;
    }

    .setting-row label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .setting-row input[type="range"] {
      width: 100%;
    }

    .setting-help {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .setting-field {
      display: grid;
      gap: 6px;
    }

    .setting-field label,
    .category-settings-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .settings-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .category-settings {
      display: grid;
      gap: 8px;
    }

    .category-setting {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 7px;
      background: var(--swatch-color);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, .08);
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .color-swatch:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, .08), 0 6px 12px rgba(31, 41, 51, .12);
    }

    .color-swatch.active {
      border-color: #0f172a;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .78), 0 0 0 2px rgba(37, 99, 235, .18);
    }

    .color-swatch::after {
      content: "";
      width: 8px;
      height: 5px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      opacity: 0;
    }

    .color-swatch.active::after {
      opacity: 1;
    }

    .special-editor {
      display: grid;
      grid-template-columns: 112px 64px 64px minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .special-editor input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 9px;
      outline: 0;
    }

    .special-color-row {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
    }

    .special-list {
      display: grid;
      gap: 6px;
    }

    .special-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
    }

    .special-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--special-color);
      flex: 0 0 auto;
    }

    .special-item span:nth-child(2) {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-tag {
      border-radius: 5px;
      padding: 1px 5px;
      background: #ecfdf5;
      color: #047857;
      font-weight: 800;
      white-space: nowrap;
    }

    .special-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .template-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 30px;
      padding: 8px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .paste-zone {
      display: grid;
      gap: 8px;
      min-height: 168px;
      padding: 10px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfd;
      color: var(--muted);
      font-size: 12px;
      align-content: start;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .paste-zone:focus-within,
    .paste-zone.is-ready {
      border-color: var(--primary);
      background: #f5f8ff;
      color: var(--text);
    }

    .paste-zone button {
      justify-self: start;
    }

    .paste-zone-hint {
      color: var(--muted);
      line-height: 1.5;
    }

    .content-blocks {
      display: grid;
      gap: 8px;
    }

    .content-blocks:empty {
      display: none;
    }

    .content-block {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      line-height: 1.55;
    }

    .content-block img {
      width: min(100%, 360px);
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block-actions {
      display: flex;
      justify-content: flex-end;
    }

    .template-save {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      justify-self: start;
      min-height: 26px;
      padding: 2px 4px;
    }

    .template-save input {
      width: 16px;
      height: 16px;
    }

    .template-chip {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .template-chip button {
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
    }

    .bulk-grid {
      display: grid;
      gap: 10px;
    }

    .bulk-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .bulk-preview {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (prefers-reduced-motion: reduce) {

        transition: none;
        animation: none;

    .toast {

      bottom: 22px;

      transform: translateX(-50%) translateY(20px);

      transition: .18s ease;
    }

      transform: translateX(-50%) translateY(0);
    }

      display: none;

      left: 0;
      right: 0;
      z-index: 70;

    }

      background: linear-gradient(180deg, rgba(246, 247, 249, .98), rgba(246, 247, 249, .86));

    .mobile-toolbar,

    }

    .mobile-title-btn,
    .mobile-icon-btn,
    .mobile-bottom-btn {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: #111827;
      box-shadow: 0 10px 30px rgba(31, 41, 51, .10);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;

    .mobile-title-btn {

      font-size: 20px;
      font-weight: 820;
    }

    .mobile-title-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 3;
      fill: none;
    }

    .mobile-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 10px 30px rgba(31, 41, 51, .10);
    }

      width: 44px;

      fill: none;
    }

    .mobile-title-btn:active,
    .mobile-icon-btn:active,
    .mobile-bottom-btn:active {
      transform: scale(.96);
    }

    .mobile-search-panel {
      display: none;
      margin-top: 10px;
      pointer-events: auto;
    }

    .mobile-search-panel.open {
      display: block;
    }

    .mobile-search-input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 16px;
      background: rgba(255, 255, 255, .96);
      outline: 0;
      font-size: 16px;
    }

    .mobile-search-results {

      gap: 6px;
      max-height: 42vh;
      overflow: auto;
    }

    .mobile-search-result {

      border-radius: 12px;

      padding: 10px 12px;

    }

    .mobile-search-result strong {

      line-height: 1.35;
    }

    .mobile-search-result span {
      color: var(--muted);
      font-size: 12px;
    }

    .mobile-content {
      height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(max(158px, env(safe-area-inset-top)) + 18px) 14px calc(88px + env(safe-area-inset-bottom));
      background: #f8fafc;

    .mobile-content.mobile-leaving {

    .mobile-content.mobile-entering {

      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .mobile-empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
      font-size: 14px;
      background: rgba(248, 250, 252, .8);
    }

    .mobile-date-strip {
      margin: 10px -2px 0;
      padding: 0 2px 4px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      pointer-events: auto;
    }

    .mobile-date-strip::-webkit-scrollbar {
      display: none;
    }

    .mobile-date-btn {
      flex: 0 0 54px;
      min-height: 62px;
      border: 0;
      border-radius: 16px;
      background: rgba(255, 255, 255, .78);
      color: #111827;
      display: grid;
      place-items: center;
      gap: 1px;
      scroll-snap-align: center;
    }

    .mobile-date-btn .dow,
    .mobile-date-btn .lunar {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .mobile-date-btn .num {
      font-size: 22px;
      font-weight: 860;
      line-height: 1;
    }

    .mobile-date-btn.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .24);
    }

    .mobile-date-btn.active .dow,
    .mobile-date-btn.active .lunar {
      color: rgba(255, 255, 255, .86);
    }

    .mobile-month-stack,
    .mobile-year-stack {
      display: grid;
      gap: 28px;
    }

    .mobile-month-block,
    .mobile-year-section {
      border-radius: 18px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(203, 213, 225, .72);
      box-shadow: 0 12px 32px rgba(31, 41, 51, .07);
      padding: 14px;
    }

    .mobile-month-block h2,
    .mobile-year-title {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
    }

    .mobile-month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px 5px;
    }

    .mobile-month-cell {
      min-height: 78px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      padding: 5px 3px;
      display: grid;
      align-content: start;
      gap: 2px;
      text-align: center;
    }

    .mobile-month-cell.other { opacity: .28; }

    .mobile-month-cell.today .daynum,
    .mobile-year-day.today {
      background: #ef4444;
      color: #fff;
      border-radius: 999px;
    }

    .mobile-month-cell .daynum {
      width: 30px;
      height: 30px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 840;
    }

    .mobile-month-cell .lunar {
      color: var(--muted);
      font-size: 11px;
      min-height: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mobile-summary-lines {
      display: grid;
      gap: 3px;
      min-height: 18px;
      margin-top: 2px;
    }

    .mobile-summary-line {
      height: 5px;
      border-radius: 999px;
      background: #bfdbfe;
    }

    .mobile-summary-line.high { background: #fecdd3; }
    .mobile-summary-line.urgent { background: #991b1b; }
    .mobile-summary-more {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
    }

    .mobile-year-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px 18px;
      align-items: start;
    }

    .mobile-year-month {
      border: 0;
      background: transparent;
      padding: 0;
      text-align: left;
      width: 100%;
      min-width: 0;
    }

    .mobile-year-month h3 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1;
    }

    .mobile-year-month.current h3 { color: #ef4444; }

    .mobile-year-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: 16px;
      gap: 5px 3px;
      align-items: center;
      justify-items: center;
    }

    .mobile-year-day {
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 780;
    }

    .mobile-highlight {
      animation: mobilePulse 1.4s ease;
    }

    @keyframes mobilePulse {
      0%, 100% { box-shadow: none; }
      35% { box-shadow: 0 0 0 4px rgba(37, 99, 235, .18); }
    }

    .mobile-bottom {
      bottom: 0;
      padding: 10px 18px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(248, 250, 252, .98), rgba(248, 250, 252, .68), rgba(248, 250, 252, 0));
    }

    .mobile-bottom-btn {
      padding: 0 18px;
      font-size: 18px;
      font-weight: 820;
    }

    .mobile-bottom-btn.icon {
      width: 54px;
      padding: 0;
    }

    .mobile-shell.mobile-year-mode .mobile-title-btn {
      display: none;
    }

    .mobile-shell.mobile-year-mode .mobile-toolbar {
      justify-content: flex-end;
    }

    @media (max-width: 1040px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }
      .topbar-left {
        grid-column: 1 / -1;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .filters {
        position: static;
        transform: none;
        grid-column: 1 / -1;
        width: max-content;
        justify-self: center;
      }
      .actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
        background: #f8fafc;
      }
      .topbar,
      .weekday,
      .calendar {
        display: none;
      }
      .mobile-shell {
        display: block;
      }
      .modal-backdrop {
        align-items: flex-end;
        justify-content: stretch;
        padding: 0;
        z-index: 90;
        background: rgba(15, 23, 42, .38);
      }
      .modal {
        width: 100%;
        max-height: min(86dvh, calc(100dvh - max(42px, env(safe-area-inset-top))));
        border-right: 0;
        border-bottom: 0;
        border-left: 0;
        border-radius: 18px 18px 0 0;
        padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
        overflow-y: auto;
        overscroll-behavior: contain;
        transform: translateY(100%);
      }
      .modal-backdrop.show .modal {
        transform: translateY(0);
      }
      .modal-backdrop.closing .modal {
        transform: translateY(100%);
      }
      .modal-heading {
        align-items: flex-start;
        gap: 10px;
      }
      .modal h2 {
        font-size: 20px;
        line-height: 1.25;
      }
      .task-priority-wrap {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .priority-option {
        min-height: 36px;
        min-width: 48px;
        font-size: 13px;
      }
      .modal textarea,
      .modal input,
      .modal select {
        min-height: 46px;
        font-size: 16px;
        border-radius: 10px;
      }
      #taskTitle {
        min-height: 132px;
        max-height: 34dvh;
        font-size: 16px;
        border-radius: 12px;
      }
      #taskTitle img {
        max-height: 190px;
      }
      .modal-row { grid-template-columns: 1fr; }
      .modal-actions {
        position: sticky;
        bottom: calc(-14px - env(safe-area-inset-bottom));
        z-index: 2;
        margin: 14px -16px calc(-14px - env(safe-area-inset-bottom));
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        background: linear-gradient(180deg, rgba(255,255,255,.82), #fff 34%);
        border-top: 1px solid rgba(203, 213, 225, .72);
      }
      .modal-actions .btn {
        min-height: 44px;
        padding: 0 16px;
        border-radius: 10px;
      }
      .settings-modal {
        width: 100%;
      }
      .settings-two { grid-template-columns: 1fr; }
      .special-editor { grid-template-columns: 1fr 1fr; }
      .bulk-row { grid-template-columns: 1fr; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <h1>极简待办</h1>
      </div>

      <nav class="month-nav" aria-label="月份导航">
        <button class="btn icon" id="prevMonthBtn" title="上个月">‹</button>
        <div class="month-label" id="monthLabel">--</div>
        <button class="btn icon" id="nextMonthBtn" title="下个月">›</button>
        <button class="btn" id="currentMonthBtn">当月</button>
        <button class="btn" id="todayBtn">今天</button>
      </nav>
    </div>

    <div class="filters" aria-label="任务分类筛选">
      <div class="category-toggle" id="categoryToggle">
        <button class="category-toggle-btn active" type="button" data-category-view="work">工作</button>
        <button class="category-toggle-btn" type="button" data-category-view="personal">个人</button>
      </div>
    </div>

    <div class="actions">
      <div class="desktop-search" id="desktopSearch">
        <button class="btn icon search-icon-btn" id="searchToggleBtn" type="button" title="搜索任务" aria-label="搜索任务">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.8" cy="10.8" r="6.3"></circle><path d="m16 16 4 4"></path></svg>
        </button>
        <div class="desktop-search-panel">
          <input class="search" id="searchInput" type="search" placeholder="搜索当前分类任务" autocomplete="off" />
        </div>
      </div>
      <button class="account-pill" id="accountStatus" type="button">登录</button>
      <button class="btn" id="settingsBtn">设置</button>
      <button class="btn primary" id="newTaskBtn">新任务</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <div class="weekday" aria-hidden="true">
    <span>周一</span>
    <span>周二</span>
    <span>周三</span>
    <span>周四</span>
    <span>周五</span>
    <span>周六</span>
    <span>周日</span>
  </div>

  <main class="calendar" id="calendar">
    <div class="sentinel" id="topSentinel"></div>
    <div id="weeks"></div>
    <div class="sentinel" id="bottomSentinel"></div>
  </main>

  <section class="mobile-shell" id="mobileShell" aria-label="移动端待办">
    <div class="mobile-top">
      <div class="mobile-toolbar">
        <button class="mobile-title-btn" id="mobileTitleBtn" type="button" aria-label="切换到上级视图">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"></path></svg>
          <span>6月</span>
        </button>
        <div class="mobile-actions">
          <button class="mobile-icon-btn" id="mobileSearchBtn" type="button" title="搜索" aria-label="搜索"></button>
          <button class="mobile-icon-btn" id="mobileAddBtn" type="button" title="新增任务" aria-label="新增任务"></button>
        </div>
      </div>
      <div class="mobile-search-panel" id="mobileSearchPanel">
        <input class="mobile-search-input" id="mobileSearchInput" type="search" placeholder="搜索所有任务" autocomplete="off" />
        <div class="mobile-search-results" id="mobileSearchResults"></div>
      </div>
      <div class="mobile-date-strip" id="mobileDateStrip" aria-label="日期切换"></div>
    </div>
    <div class="mobile-content" id="mobileContent"></div>
    <div class="mobile-bottom">
      <div class="mobile-bottom-inner">
        <button class="mobile-bottom-btn" id="mobileTodayBtn" type="button">今天</button>
        <button class="mobile-bottom-btn icon" id="mobileMineBtn" type="button" title="我的" aria-label="我的"></button>
      </div>
    </div>
  </section>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="taskForm">
      <div class="modal-heading">
        <h2 id="modalTitle">新任务</h2>
        <div class="task-priority-wrap" id="taskPriorityWrap">
          <span>优先级</span>
          <input id="taskPriority" type="hidden" value="normal" />
          <div class="priority-segment" id="taskPriorityOptions">
            <button class="priority-option active" type="button" data-priority="normal">普通</button>
            <button class="priority-option" type="button" data-priority="high">优先</button>
            <button class="priority-option" type="button" data-priority="urgent">紧急</button>
          </div>
        </div>
      </div>
      <div class="modal-grid">
        <div id="taskTitle" class="paste-zone" contenteditable="true" data-placeholder="输入任务内容，或在这里按 Ctrl+V 粘贴图片/文字"></div>
        <div class="modal-row" id="taskMetaRow">
          <input id="taskDate" type="date" required />
          <select id="taskCategory"></select>
          <input id="taskProgress" type="number" min="1" max="100" step="1" placeholder="进度 %" />
        </div>
        <input id="taskNote" type="text" placeholder="备注，可选" maxlength="120" />
        <label class="template-save" id="saveTemplateLabel">
          <input id="saveTemplateCheck" type="checkbox" />
          保存为模板
        </label>
        <div class="template-strip" id="templateStrip"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="openBulkBtn">批量创建</button>
        <button class="btn" type="button" id="cancelBtn">取消</button>
        <button class="btn primary" type="submit">保存</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop">
    <form class="modal settings-modal" id="settingsForm">
      <h2>设置</h2>
      <div class="settings-tabs" id="settingsTabs">
        <button class="settings-tab active" type="button" data-settings-tab="appearance">外观</button>
        <button class="settings-tab" type="button" data-settings-tab="calendar">标注</button>
        <button class="settings-tab" type="button" data-settings-tab="tasks">任务</button>
        <button class="settings-tab" type="button" data-settings-tab="data">数据</button>
      </div>
      <div class="settings-grid">
        <div class="settings-panel active" data-settings-panel="appearance">
          <div class="setting-row">
            <label>
              日期栏最小高度
              <input id="dayHeightRange" type="range" min="300" max="600" step="10" />
            </label>
            <input id="dayHeightInput" type="number" min="300" max="600" step="10" />
          </div>
          <div class="settings-two">
            <div class="setting-field">
              <label for="taskDensity">事项条密度</label>
              <select id="taskDensity" class="select">
                <option value="compact">紧凑</option>
                <option value="standard">标准</option>
                <option value="relaxed">舒展</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="taskDisplay">事项显示内容</label>
              <select id="taskDisplay" class="select">
                <option value="title">只显示标题</option>
                <option value="note">标题 + 备注</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="otherMonthMode">非本月日期</label>
              <select id="otherMonthMode" class="select">
                <option value="dim">显示并淡化</option>
                <option value="hideTasks">隐藏事项</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="weekendStyle">周末样式</label>
              <select id="weekendStyle" class="select">
                <option value="normal">普通</option>
                <option value="tint">轻微高亮</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="monthTintEnabled">跨月背景区分</label>
              <select id="monthTintEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>
          <p class="setting-help">外观设置会即时影响日期框和事项条的视觉密度。</p>
        </div>

        <div class="settings-panel" data-settings-panel="calendar">
          <div class="settings-two">
            <div class="setting-field">
              <label for="lunarEnabled">农历显示</label>
              <select id="lunarEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="holidayEnabled">法定节假日显示</label>
              <select id="holidayEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>
          <div class="category-settings">
            <div class="category-settings-title">特殊日期</div>
            <div id="specialDateList"></div>
            <div class="special-editor">
              <select id="specialType" class="select">
                <option value="solar">公历每年</option>
                <option value="lunar">农历每年</option>
              </select>
              <input id="specialMonth" type="number" min="1" max="12" placeholder="月" />
              <input id="specialDay" type="number" min="1" max="31" placeholder="日" />
              <input id="specialName" type="text" maxlength="12" placeholder="名称" />
              <button class="btn" type="button" id="addSpecialDateBtn">添加</button>
              <div class="special-color-row">
                <span class="setting-help">颜色</span>
                <div class="color-palette" id="specialColorPalette"></div>
                <input id="specialColor" type="hidden" value="#8b5cf6" />
              </div>
            </div>
          </div>
        </div>

        <div class="settings-panel" data-settings-panel="tasks">
          <div class="settings-two">
            <div class="setting-field">
              <label for="dragEnabled">拖拽移动/排序</label>
              <select id="dragEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>
          <div class="category-settings">
            <div class="category-settings-title">任务模板</div>
            <div id="templateSettingsList"></div>
          </div>
        </div>

        <div class="settings-panel" data-settings-panel="data">
          <div class="settings-two">
            <button class="btn" type="button" id="settingsExportBtn">导出数据</button>
            <button class="btn" type="button" id="settingsImportBtn">导入数据</button>
            <button class="btn" type="button" id="clearDoneBtn">清理已完成</button>
          </div>
          <input id="supabaseUrl" type="hidden" />
          <input id="supabaseAnonKey" type="hidden" />
          <p class="setting-help" id="cloudHelp">导入导出可作为离线备份；清理已完成会删除所有已完成事项。</p>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="settingsCancelBtn">取消</button>
        <button class="btn primary" type="submit">保存</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="authBackdrop">
    <form class="modal" id="authForm">
      <h2 id="authTitle">登录账号</h2>
      <div class="modal-grid">
        <div class="auth-status" id="authStatusText">登录后会把任务、模板和设置同步到云端。</div>
        <input id="authEmail" type="email" placeholder="邮箱" autocomplete="email" />
        <input id="authPassword" type="password" placeholder="密码，至少 6 位" autocomplete="current-password" />
        <div class="auth-switch" hidden>
          <span id="authSwitchText">没有账号？</span>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="logoutBtn">退出登录</button>
        <button class="btn" type="button" id="authSyncBtn">立即同步</button>
        <button class="btn" type="button" id="authCancelBtn">关闭</button>
        <button class="btn" type="button" id="authModeBtn">注册</button>
        <button class="btn primary" type="submit" id="authSubmitBtn">登录</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="bulkBackdrop">
    <form class="modal" id="bulkForm">
      <h2>批量创建</h2>
      <div class="bulk-grid">
        <div class="setting-field">
          <label for="bulkTitle">任务内容</label>
          <input id="bulkTitle" type="text" maxlength="120" placeholder="例如：健身、复盘、提交日报" />
        </div>
        <div class="bulk-row">
          <div class="setting-field">
            <label for="bulkMode">创建方式</label>
            <select id="bulkMode" class="select">
              <option value="range">日期范围</option>
              <option value="weekly">每周重复</option>
              <option value="monthly">每月某日</option>
              <option value="interval">每隔 N 天</option>
              <option value="text">文本导入</option>
            </select>
          </div>
          <div class="setting-field">
            <label for="bulkCategory">分类</label>
            <select id="bulkCategory" class="select"></select>
          </div>
        </div>
        <div class="bulk-row">
          <div class="setting-field">
            <label for="bulkStart">开始日期</label>
            <input id="bulkStart" type="date" />
          </div>
          <div class="setting-field">
            <label for="bulkEnd">结束日期</label>
            <input id="bulkEnd" type="date" />
          </div>
        </div>
        <div class="bulk-row">
          <div class="setting-field">
            <label for="bulkWeekdays">周几</label>
            <select id="bulkWeekdays" class="select" multiple size="3">
              <option value="1">周一</option>
              <option value="2">周二</option>
              <option value="3">周三</option>
              <option value="4">周四</option>
              <option value="5">周五</option>
              <option value="6">周六</option>
              <option value="0">周日</option>
            </select>
          </div>
          <div class="setting-field">
            <label for="bulkMonthDay">每月/间隔</label>
            <input id="bulkMonthDay" type="number" min="1" max="31" placeholder="每月第几天或间隔天数" />
          </div>
        </div>
        <textarea id="bulkText" placeholder="文本导入：每行一个任务，可写 2026-06-01 任务内容"></textarea>
        <div class="bulk-preview" id="bulkPreview">填写后会在这里预览将创建的任务。</div>
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="bulkCancelBtn">取消</button>
        <button class="btn" type="button" id="bulkPreviewBtn">预览</button>
        <button class="btn primary" type="submit">创建</button>
      </div>

    function updateMobileHeader(date) {
      const year = date.getFullYear();

      els.mobileShell.classList.toggle("mobile-year-mode", mobileViewMode === "year");
      els.mobileSearchBtn.innerHTML = mobileIcon("search");
      els.mobileSearchBtn.classList.toggle("active", mobileSearchOpen);

      els.mobileMineBtn.innerHTML = mobileIcon("user");
      els.mobileSearchPanel.classList.toggle("open", mobileSearchOpen);
