<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>极简待办</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f1f4f8;
      --line: #e1e6ed;
      --line-strong: #c8d1dc;
      --text: #1f2933;
      --muted: #6f7b88;
      --quiet: #9aa5b1;
      --primary: #2563eb;
      --primary-soft: #eaf1ff;
      --green: #10b981;
      --red: #e5484d;
      --amber: #f59e0b;
      --shadow: 0 12px 32px rgba(31, 41, 51, .08);
      --radius: 8px;
      --topbar-h: 64px;
      --weekday-h: 40px;
      --day-min-h: 360px;
      --task-min-h: 30px;
      --task-font-size: 13px;
      --task-pad-x: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--topbar-h);
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, .92);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: minmax(420px, auto) minmax(360px, 620px) minmax(220px, auto);
      gap: 18px;
      align-items: center;
    }

    .topbar-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 560;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-label {
      min-width: 120px;
      text-align: center;
      font-size: 16px;
      font-weight: 760;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 320px) 118px 108px;
      gap: 8px;
      min-width: 0;
      width: min(560px, 100%);
      justify-self: center;
    }

    .search, .select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: 0;
    }

    .search {
      width: 100%;
      padding: 0 12px;
    }

    .select {
      padding: 0 10px;
    }

    .search:focus, .select:focus, .task-input:focus, .modal :is(textarea, input, select, [contenteditable="true"]):focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      justify-self: end;
    }

    .account-pill {
      min-height: 38px;
      max-width: 104px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-pill.syncing {
      color: #1d4ed8;
      background: #eaf1ff;
      border-color: #bfdbfe;
    }

    .account-pill.synced {
      color: #047857;
      background: #ecfdf5;
      border-color: #a7f3d0;
    }

    .account-pill.error {
      color: #b91c1c;
      background: #fff1f2;
      border-color: #fecaca;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 650;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--line-strong); }
    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.danger {
      color: #fff;
      border-color: var(--red);
      background: var(--red);
      box-shadow: 0 8px 18px rgba(229, 72, 77, .20);
    }

    .btn.danger:hover {
      background: #dc2626;
      border-color: #dc2626;
    }

    .btn.icon {
      width: 38px;
      padding: 0;
      font-size: 18px;
    }

    .weekday {
      position: sticky;
      top: var(--topbar-h);
      z-index: 20;
      min-height: var(--weekday-h);
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    .weekday span {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: .04em;
    }

    .calendar {
      padding: 1px 0 28px;
    }

    .sentinel {
      height: 1px;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .month-band-a .day:not(.is-today):not(.drag-over) {
      background: #ffffff;
    }

    .month-band-b .day:not(.is-today):not(.drag-over) {
      background: #fbfcff;
    }

    .month-start {
      position: relative;
    }

    .month-start::before {
      content: attr(data-month-title);
      position: absolute;
      left: 10px;
      top: -1px;
      z-index: 2;
      padding: 2px 8px;
      border: 1px solid #d7e2f2;
      border-radius: 0 0 7px 7px;
      background: rgba(248, 251, 255, .94);
      color: #64748b;
      font-size: 11px;
      font-weight: 750;
      pointer-events: none;
    }

    .day {
      min-width: 0;
      min-height: var(--day-min-h);
      background: var(--panel);
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .day.other-month {
      background: #fbfcfd;
      color: var(--quiet);
    }

    .day.other-month.hide-other-tasks .task-list {
      display: none;
    }

    .day.weekend.weekend-tint:not(.is-today) {
      background: #fffafa;
    }

    .day.weekend.weekend-tint:not(.is-today) .date-num {
      color: #d94665;
    }

    .day.rest-day:not(.is-today):not(.selected-day):not(.has-special):not(.day-good):not(.day-bad):not(.drag-over) {
      background: #f2f4f7;
    }

    .rest-day-pill,
    .work-adjust-pill {
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
      white-space: nowrap;
    }

    .rest-day-pill {
      color: #64748b;
      background: rgba(100, 116, 139, .14);
    }

    .work-adjust-pill {
      color: #92400e;
      background: rgba(245, 158, 11, .16);
    }

    .day.is-today {
      position: relative;
      z-index: 1;
      background: #f5f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .42);
    }

    .day.is-today::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(37, 99, 235, .55);
    }

    .day:hover:not(.drag-over) {
      background: #f4f8ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .22);
    }

    .day.drag-over {
      background: #dbe8ff;
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .day.selected-day {
      background: #f7fbff;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .34);
    }

    .day.day-good {
      background: #dcfce7;
      box-shadow: inset 0 0 0 2px rgba(22, 163, 74, .34);
    }

    .day.day-bad {
      background: #ffe4e6;
      box-shadow: inset 0 0 0 2px rgba(225, 29, 72, .34);
    }

    .day.day-good.is-today {
      background: linear-gradient(180deg, rgba(220, 252, 231, .95), rgba(239, 246, 255, .82));
    }

    .day.day-bad.is-today {
      background: linear-gradient(180deg, rgba(255, 228, 230, .96), rgba(239, 246, 255, .82));
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 24px;
    }

    .day-actions {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .date-main {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .date-inline-meta {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
    }

    .date-inline-chip {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-pill:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .date-inline-chip.special {
      color: var(--special-color, var(--primary));
      font-weight: 800;
    }

    .date-inline-sep {
      color: var(--quiet);
      flex: 0 0 auto;
    }

    .date-extra {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: var(--quiet);
      font-size: 11px;
      line-height: 1;
      margin-top: 3px;
    }

    .date-lunar {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: -3px;
      min-height: 18px;
    }

    .date-badge {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 750;
      line-height: 1.2;
      color: #64748b;
      background: #eef2f7;
    }

    .date-badge.holiday {
      color: #b45309;
      background: rgba(245, 158, 11, .16);
    }

    .date-badge.workday {
      color: #64748b;
      background: rgba(100, 116, 139, .14);
    }

    .date-badge.festival {
      color: #be123c;
      background: rgba(244, 63, 94, .13);
    }

    .date-badge.special {
      color: var(--special-color, #7c3aed);
      background: var(--special-bg, rgba(124, 58, 237, .13));
    }

    .day.has-holiday:not(.is-today) {
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, .14);
    }

    .day.has-special:not(.is-today) {
      background: linear-gradient(180deg, var(--special-bg, rgba(124, 58, 237, .14)), rgba(255,255,255,.96) 52px);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--special-color, #7c3aed) 28%, transparent);
    }

    .day.has-special {
      position: relative;
    }

    .day.has-special::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 5px;
      background: var(--special-color, #7c3aed);
      opacity: .78;
      pointer-events: none;
    }

    .calendar .week .day.day-good:not(.drag-over),
    .calendar .week .day.day-good.is-today,
    .calendar .week .day.day-good.has-special,
    .calendar .week .day.day-good.weekend.weekend-tint {
      background: #dff7e8;
      box-shadow: inset 0 0 0 2px rgba(16, 185, 129, .42);
    }

    .calendar .week .day.day-bad:not(.drag-over),
    .calendar .week .day.day-bad.is-today,
    .calendar .week .day.day-bad.has-special,
    .calendar .week .day.day-bad.weekend.weekend-tint {
      background: #ffe1e7;
      box-shadow: inset 0 0 0 2px rgba(229, 72, 77, .42);
    }

    .calendar .week .day.day-good.selected-day,
    .calendar .week .day.day-bad.selected-day {
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .42), inset 0 0 0 4px rgba(255, 255, 255, .58);
    }

    .date-num {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .date-week {
      display: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .today-pill {
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 760;
    }

    .day-action,
    .add-day {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--quiet);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
    }

    .day-action {
      font-size: 13px;
      font-weight: 800;
    }

    .day:hover .add-day,
    .day:hover .day-action {
      border-color: var(--line);
      background: #fff;
      color: var(--primary);
    }

    .day-action.good.active {
      color: #15803d;
      border-color: rgba(22, 163, 74, .28);
      background: rgba(220, 252, 231, .95);
    }

    .day-action.bad.active {
      color: #be123c;
      border-color: rgba(225, 29, 72, .28);
      background: rgba(255, 228, 230, .95);
    }

    .task-list {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .day-notes {
      width: 100%;
      min-width: 0;
      margin-top: auto;
      padding-top: 8px;
      display: grid;
      gap: 4px;
      align-content: end;
      justify-content: stretch;
      justify-items: stretch;
      align-self: stretch;
    }

    .task {
      min-height: var(--task-min-h);
      border: 1px solid color-mix(in srgb, var(--cat-color) 24%, var(--line));
      border-left: 4px solid var(--cat-color, var(--primary));
      border-radius: 7px;
      background: var(--cat-bg, #fff);
      padding: 3px 5px 3px var(--task-pad-x);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      cursor: grab;
      touch-action: none;
      transition: box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .task.has-image {
      align-items: stretch;
      grid-template-columns: minmax(0, 1fr);
      padding: 6px;
      gap: 6px;
    }

    .task:hover {
      box-shadow: 0 4px 14px rgba(31, 41, 51, .08);
    }

    .task.dragging {
      opacity: .45;
      cursor: grabbing;
    }

    .task.priority-high {
      border-color: rgba(220, 38, 38, .28);
      border-left-color: #dc2626;
      background: #fff1f2;
    }

    .task.priority-urgent {
      border-color: rgba(127, 29, 29, .45);
      border-left-color: #7f1d1d;
      background: #991b1b;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    .task.priority-urgent .task-title,
    .task.priority-urgent .task-title-more,
    .task.priority-urgent .note {
      color: #fff;
    }

    .task.priority-urgent .tag,
    .task.priority-urgent .progress-tag,
    .task.priority-urgent .priority-tag {
      background: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .task.priority-urgent .mini-btn {
      background: rgba(255, 255, 255, .12);
      border-color: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .priority-tag {
      border-radius: 5px;
      padding: 1px 5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .priority-tag.high {
      background: #ffe4e6;
      color: #be123c;
    }

    .priority-tag.urgent {
      background: #7f1d1d;
      color: #fff;
    }

    .drop-marker {
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .drag-preview {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 90;
      pointer-events: none;
      opacity: .74;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .58);
      box-shadow: 0 10px 26px rgba(31, 41, 51, .13), 0 0 0 1px rgba(37, 99, 235, .08);
      backdrop-filter: blur(16px) saturate(1.18);
      -webkit-backdrop-filter: blur(16px) saturate(1.18);
      transform-origin: 0 0;
      will-change: transform;
      scale: .985;
    }

    .drag-preview.task,
    .drag-preview.day-note {
      cursor: grabbing;
    }

    .drag-preview.copy-mode {
      box-shadow: 0 10px 26px rgba(37, 99, 235, .18), 0 0 0 2px rgba(37, 99, 235, .22);
    }

    .drag-preview.copy-mode::after {
      content: "复制";
      position: absolute;
      right: 6px;
      top: 6px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 800;
    }

    body.dragging-task {
      user-select: none;
      cursor: grabbing;
    }

    .task.done {
      opacity: .72;
      filter: saturate(.65);
    }

    .task.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-title-wrap {
      min-width: 0;
      flex: 1 1 auto;
    }

    .task-title {
      margin: 0;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: pre-line;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      font-size: var(--task-font-size);
      line-height: 1.25;
      font-weight: 700;
      word-break: break-word;
    }

    .task-title-more {
      margin: 0;
      color: var(--text);
      font-size: var(--task-font-size);
      line-height: 1.25;
      font-weight: 700;
      word-break: break-word;
    }

    .task-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(148, 163, 184, .22);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .task-content {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .task.has-image .task-content {
      pointer-events: none;
      user-select: none;
    }

    .task-content-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task.has-image .task-main {
      display: grid;
      gap: 5px;
    }

    .task.has-image .task-title {
      white-space: pre-line;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .task.has-image .task-actions {
      opacity: 1;
      justify-content: flex-start;
    }

    .task-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
    }

    .tag {
      border-radius: 5px;
      padding: 1px 5px;
      background: var(--panel-soft);
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .note {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .day-note {
      width: 100%;
      justify-self: stretch;
      margin-left: 0;
      margin-right: 0;
      min-height: 28px;
      border: 1px solid rgba(225, 29, 72, .22);
      border-left: 4px solid #e11d48;
      border-radius: 7px;
      background: #fff1f2;
      color: #881337;
      padding: 4px 5px 4px 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      cursor: grab;
      transition: box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .day-note:hover {
      box-shadow: 0 4px 14px rgba(225, 29, 72, .1);
    }

    .day-note.dragging {
      opacity: .45;
      cursor: grabbing;
    }

    .day-note.done {
      opacity: .58;
      filter: saturate(.55);
    }

    .day-note.done .day-note-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .day-note-title {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 740;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .day-note-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .note-drop-marker {
      width: 100%;
      justify-self: stretch;
      margin-left: 0;
      margin-right: 0;
      height: 3px;
      border-radius: 999px;
      background: #e11d48;
      box-shadow: 0 0 0 3px rgba(225, 29, 72, .12);
    }

    .hidden {
      display: none !important;
    }

    .modal.note-mode #taskMetaRow {
      grid-template-columns: 1fr;
    }

    .task-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      opacity: .18;
      transition: opacity .15s ease;
    }

    .task:hover .task-actions,
    .task:focus-within .task-actions {
      opacity: 1;
    }

    .mini-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
    }

    .mini-btn:hover { border-color: var(--line-strong); color: var(--text); }
    .mini-btn.good:hover { color: var(--green); border-color: #a7f3d0; background: #ecfdf5; }
    .mini-btn.bad:hover { color: var(--red); border-color: #fecaca; background: #fff1f2; }

    .empty-hint {
      color: var(--quiet);
      font-size: 12px;
      opacity: 0;
      transition: opacity .16s ease;
      padding: 6px 2px;
    }

    .day:hover .empty-hint { opacity: 1; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, .34);
      opacity: 0;
      transition: opacity .18s ease;
    }

    .modal-backdrop.show {
      display: flex;
      opacity: 1;
    }

    .modal-backdrop.closing {
      opacity: 0;
    }

    .modal {
      width: min(520px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      transform: translateY(10px) scale(.985);
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
    }

    .modal-backdrop.show .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-backdrop.closing .modal {
      transform: translateY(8px) scale(.99);
      opacity: 0;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .confirm-modal {
      width: min(420px, 100%);
    }

    .confirm-modal h2 {
      margin-bottom: 8px;
    }

    .confirm-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-grid {
      display: grid;
      gap: 10px;
    }

    .modal-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-priority-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .task-priority-wrap select {
      width: 96px;
      min-height: 34px;
      padding: 0 9px;
    }

    .modal textarea,
    .modal input,
    .modal select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: 0;
      padding: 0 11px;
    }

    .modal textarea {
      min-height: 120px;
      resize: vertical;
      padding-top: 10px;
    }

    #taskTitle {
      min-height: 180px;
      padding: 12px;
      resize: vertical;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #taskTitle:empty::before {
      content: attr(data-placeholder);
      color: var(--quiet);
      pointer-events: none;
    }

    #taskTitle img {
      display: block;
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .modal-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 92px;
      gap: 10px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .auth-status {
      min-height: 32px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
    }

    .auth-switch {
      margin-top: 4px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .auth-mode-link {
      min-height: 28px;
      border: 0;
      background: transparent;
      color: var(--primary);
      padding: 0;
      font-weight: 750;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
      min-height: 430px;
      max-height: min(58vh, 560px);
      overflow-y: auto;
      align-content: start;
      padding-right: 2px;
    }

    .settings-modal {
      width: min(760px, 96vw);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .settings-tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      overflow-x: auto;
    }

    .settings-tab {
      min-height: 32px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .settings-tab.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--primary);
      box-shadow: 0 1px 2px rgba(31, 41, 51, .06);
    }

    .settings-panel {
      display: none;
      gap: 12px;
    }

    .settings-panel.active {
      display: grid;
      align-content: start;
    }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
      align-items: center;
    }

    .setting-row label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .setting-row input[type="range"] {
      width: 100%;
    }

    .setting-help {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .setting-field {
      display: grid;
      gap: 6px;
    }

    .setting-field label,
    .category-settings-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .settings-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .category-settings {
      display: grid;
      gap: 8px;
    }

    .category-setting {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 7px;
      background: var(--swatch-color);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, .08);
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .color-swatch:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, .08), 0 6px 12px rgba(31, 41, 51, .12);
    }

    .color-swatch.active {
      border-color: #0f172a;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .78), 0 0 0 2px rgba(37, 99, 235, .18);
    }

    .color-swatch::after {
      content: "";
      width: 8px;
      height: 5px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      opacity: 0;
    }

    .color-swatch.active::after {
      opacity: 1;
    }

    .special-editor {
      display: grid;
      grid-template-columns: 112px 64px 64px minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .special-editor input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 9px;
      outline: 0;
    }

    .special-color-row {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
    }

    .special-list {
      display: grid;
      gap: 6px;
    }

    .special-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
    }

    .special-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--special-color);
      flex: 0 0 auto;
    }

    .special-item span:nth-child(2) {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-tag {
      border-radius: 5px;
      padding: 1px 5px;
      background: #ecfdf5;
      color: #047857;
      font-weight: 800;
      white-space: nowrap;
    }

    .special-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .template-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 30px;
      padding: 8px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .paste-zone {
      display: grid;
      gap: 8px;
      min-height: 168px;
      padding: 10px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcfd;
      color: var(--muted);
      font-size: 12px;
      align-content: start;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .paste-zone:focus-within,
    .paste-zone.is-ready {
      border-color: var(--primary);
      background: #f5f8ff;
      color: var(--text);
    }

    .paste-zone button {
      justify-self: start;
    }

    .paste-zone-hint {
      color: var(--muted);
      line-height: 1.5;
    }

    .content-blocks {
      display: grid;
      gap: 8px;
    }

    .content-blocks:empty {
      display: none;
    }

    .content-block {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      line-height: 1.55;
    }

    .content-block img {
      width: min(100%, 360px);
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .content-block-actions {
      display: flex;
      justify-content: flex-end;
    }

    .template-save {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      justify-self: start;
      min-height: 26px;
      padding: 2px 4px;
    }

    .template-save input {
      width: 16px;
      height: 16px;
    }

    .template-chip {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .template-chip button {
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
    }

    .bulk-grid {
      display: grid;
      gap: 10px;
    }

    .bulk-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .bulk-preview {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (prefers-reduced-motion: reduce) {
      .modal-backdrop,
      .modal {
        transition: none;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 70;
      transform: translateX(-50%) translateY(20px);
      border-radius: 8px;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }
      .topbar-left {
        grid-column: 1 / -1;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .filters {
        grid-column: 1 / -1;
        grid-template-columns: minmax(180px, 1fr) 140px 120px;
        width: 100%;
        justify-self: stretch;
      }
      .actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }
    }

    @media (max-width: 720px) {
      :root { --topbar-h: auto; }
      .topbar {
        position: static;
        grid-template-columns: 1fr;
        padding: 14px;
      }
      .topbar-left, .month-nav, .actions { justify-content: space-between; }
      .topbar-left { gap: 12px; }
      .filters { grid-template-columns: 1fr; }
      .weekday { display: none; }
      .calendar { padding: 0 12px 24px; }
      .week {
        display: block;
        border: 0;
        background: transparent;
      }
      .day {
        min-height: auto;
        margin: 10px 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: 0 1px 2px rgba(31, 41, 51, .04);
      }
      .day.other-month {
        opacity: .7;
      }
      .day.is-today {
        box-shadow: inset 0 0 0 2px var(--primary), 0 8px 22px rgba(37, 99, 235, .12);
      }
      .date-week { display: inline; }
      .date-extra { margin-top: 0; }
      .empty-hint { opacity: 1; }
      .modal-row { grid-template-columns: 1fr; }
      .settings-two { grid-template-columns: 1fr; }
      .special-editor { grid-template-columns: 1fr 1fr; }
      .bulk-row { grid-template-columns: 1fr; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <h1>极简待办</h1>
      </div>

      <nav class="month-nav" aria-label="月份导航">
        <button class="btn icon" id="prevMonthBtn" title="上个月">‹</button>
        <div class="month-label" id="monthLabel">--</div>
        <button class="btn icon" id="nextMonthBtn" title="下个月">›</button>
        <button class="btn" id="currentMonthBtn">当月</button>
        <button class="btn" id="todayBtn">今天</button>
      </nav>
    </div>

    <div class="filters">
      <input class="search" id="searchInput" type="search" placeholder="搜索任务" autocomplete="off" />
      <select class="select" id="categoryFilter"></select>
      <select class="select" id="statusFilter">
        <option value="all">全部状态</option>
        <option value="open">未完成</option>
        <option value="done">已完成</option>
      </select>
    </div>

    <div class="actions">
      <button class="account-pill" id="accountStatus" type="button">本地</button>
      <button class="btn" id="settingsBtn">设置</button>
      <button class="btn primary" id="newTaskBtn">新任务</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <div class="weekday" aria-hidden="true">
    <span>周一</span>
    <span>周二</span>
    <span>周三</span>
    <span>周四</span>
    <span>周五</span>
    <span>周六</span>
    <span>周日</span>
  </div>

  <main class="calendar" id="calendar">
    <div class="sentinel" id="topSentinel"></div>
    <div id="weeks"></div>
    <div class="sentinel" id="bottomSentinel"></div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="taskForm">
      <div class="modal-heading">
        <h2 id="modalTitle">新任务</h2>
        <label class="task-priority-wrap" id="taskPriorityWrap">
          优先级
          <select id="taskPriority">
            <option value="normal">普通</option>
            <option value="high">优先</option>
            <option value="urgent">紧急</option>
          </select>
        </label>
      </div>
      <div class="modal-grid">
        <div id="taskTitle" class="paste-zone" contenteditable="true" data-placeholder="输入任务内容，或在这里按 Ctrl+V 粘贴图片/文字"></div>
        <div class="modal-row" id="taskMetaRow">
          <input id="taskDate" type="date" required />
          <select id="taskCategory"></select>
          <input id="taskProgress" type="number" min="1" max="100" step="1" placeholder="进度 %" />
        </div>
        <input id="taskNote" type="text" placeholder="备注，可选" maxlength="120" />
        <label class="template-save" id="saveTemplateLabel">
          <input id="saveTemplateCheck" type="checkbox" />
          保存为模板
        </label>
        <div class="template-strip" id="templateStrip"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="openBulkBtn">批量创建</button>
        <button class="btn" type="button" id="cancelBtn">取消</button>
        <button class="btn primary" type="submit">保存</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop">
    <form class="modal settings-modal" id="settingsForm">
      <h2>设置</h2>
      <div class="settings-tabs" id="settingsTabs">
        <button class="settings-tab active" type="button" data-settings-tab="appearance">外观</button>
        <button class="settings-tab" type="button" data-settings-tab="calendar">标注</button>
        <button class="settings-tab" type="button" data-settings-tab="tasks">任务</button>
        <button class="settings-tab" type="button" data-settings-tab="categories">分类</button>
        <button class="settings-tab" type="button" data-settings-tab="data">数据</button>
      </div>
      <div class="settings-grid">
        <div class="settings-panel active" data-settings-panel="appearance">
          <div class="setting-row">
            <label>
              日期栏最小高度
              <input id="dayHeightRange" type="range" min="300" max="600" step="10" />
            </label>
            <input id="dayHeightInput" type="number" min="300" max="600" step="10" />
          </div>
          <div class="settings-two">
            <div class="setting-field">
              <label for="taskDensity">事项条密度</label>
              <select id="taskDensity" class="select">
                <option value="compact">紧凑</option>
                <option value="standard">标准</option>
                <option value="relaxed">舒展</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="taskDisplay">事项显示内容</label>
              <select id="taskDisplay" class="select">
                <option value="title">只显示标题</option>
                <option value="category">标题 + 分类</option>
                <option value="note">标题 + 分类 + 备注</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="otherMonthMode">非本月日期</label>
              <select id="otherMonthMode" class="select">
                <option value="dim">显示并淡化</option>
                <option value="hideTasks">隐藏事项</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="weekendStyle">周末样式</label>
              <select id="weekendStyle" class="select">
                <option value="normal">普通</option>
                <option value="tint">轻微高亮</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="monthTintEnabled">跨月背景区分</label>
              <select id="monthTintEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>
          <p class="setting-help">外观设置会即时影响日期框和事项条的视觉密度。</p>
        </div>

        <div class="settings-panel" data-settings-panel="calendar">
          <div class="settings-two">
            <div class="setting-field">
              <label for="lunarEnabled">农历显示</label>
              <select id="lunarEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
            <div class="setting-field">
              <label for="holidayEnabled">法定节假日显示</label>
              <select id="holidayEnabled" class="select">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>

      els.categoryFilter.innerHTML = categoryOptions;
      const taskOptions = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join("");
      els.taskCategory.innerHTML = taskOptions;
      els.defaultCategory.innerHTML = taskOptions;
      els.bulkCategory.innerHTML = taskOptions;
    }

    function renderAround(date) {
      const start = getMonday(new Date(date.getFullYear(), date.getMonth(), 1));
      start.setDate(start.getDate() - 28);
      const weeks = [];
      const cursor = new Date(start);
      for (let i = 0; i < 18; i++) {
        weeks.push(getWeekDates(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = weeks[0][0];
      lastSunday = weeks[weeks.length - 1][6];
      els.weeks.innerHTML = weeks.map(renderWeek).join("");
      updateMonthFromScroll();
      updateTaskTitleOverflow();
    }

    function renderVisibleWeeks() {
      document.querySelectorAll(".week").forEach(week => {
        const dates = JSON.parse(week.dataset.dates).map(parseKey);
        week.outerHTML = renderWeek(dates);
      });
      updateMonthFromScroll();
      updateTaskTitleOverflow();
    }

    function renderWeek(dates) {
      const middle = dates[3];
      const monthKey = `${middle.getFullYear()}-${middle.getMonth()}`;
      const dateKeys = dates.map(toKey);
      const startsMonth = dates.some(d => d.getDate() === 1);
      const monthTitleDate = dates.find(d => d.getDate() === 1) || middle;
      const monthBand = settings.monthTintEnabled ? (monthTitleDate.getMonth() % 2 === 0 ? "month-band-a" : "month-band-b") : "";
      return `<section class="week ${monthBand} ${startsMonth ? "month-start" : ""}" data-month="${monthKey}" data-month-title="${monthTitleDate.getFullYear()}年${monthTitleDate.getMonth()+1}月" data-dates='${JSON.stringify(dateKeys)}'>
        ${dates.map(date => renderDay(date, monthKey)).join("")}
      </section>`;
    }

    function renderDay(date, monthKey) {
      const key = toKey(date);
      const dayMonthKey = `${date.getFullYear()}-${date.getMonth()}`;
      const isOtherMonth = dayMonthKey !== monthKey;
      const dayTasks = isOtherMonth && settings.otherMonthMode === "hideTasks" ? [] : getVisibleTasksForDate(key);
      const notes = isOtherMonth && settings.otherMonthMode === "hideTasks" ? [] : getVisibleNotesForDate(key);
      const dayState = dayStates[key] || "";
      const today = isToday(date);
      const weekend = date.getDay() === 0 || date.getDay() === 6;
      const weekday = WEEKDAYS[(date.getDay() + 6) % 7];
      const marks = getDateMarks(date);
      const special = marks.find(mark => mark.kind === "special");
      const isWorkAdjustDay = marks.some(mark => mark.kind === "workday");
      const isRestDay = !isWorkAdjustDay && (weekend || marks.some(mark => mark.kind === "holiday"));
      const dayTypePill = isWorkAdjustDay
        ? '<span class="work-adjust-pill">调休上班</span>'
        : isRestDay ? '<span class="rest-day-pill">休息</span>' : "";
      const style = special ? ` style="--special-color:${special.color};--special-bg:${hexToSoftBg(special.color)}"` : "";
      const classes = [
        "day",
        isOtherMonth ? "other-month" : "",
        isOtherMonth && settings.otherMonthMode === "hideTasks" ? "hide-other-tasks" : "",
        weekend ? "weekend" : "",
        settings.weekendStyle === "tint" ? "weekend-tint" : "",
        marks.some(mark => mark.kind === "holiday") ? "has-holiday" : "",
        isRestDay ? "rest-day" : "",
        isWorkAdjustDay ? "work-adjust-day" : "",
        special ? "has-special" : "",
        dayState === "good" ? "day-good" : "",
        dayState === "bad" ? "day-bad" : "",
        today ? "is-today" : "",
        selectedDateKey === key ? "selected-day" : ""
      ].filter(Boolean).join(" ");
      return `<article class="${classes}" data-date="${key}"${style} ondblclick="openModal('${key}')">
        <div class="day-head">
          <div class="date-main">
            <span class="date-num">${date.getDate()}</span>
            ${dayTypePill}
            ${renderDateInlineMeta(date, marks)}
            <span class="date-week">${weekday}</span>
            ${today ? '<span class="today-pill">今天</span>' : ""}
          </div>
          <div class="day-actions">
            <button class="day-action good ${dayState === "good" ? "active" : ""}" type="button" title="标记完成日" onclick="event.stopPropagation();setDayState('${key}','good')">✓</button>
            <button class="day-action bad ${dayState === "bad" ? "active" : ""}" type="button" title="标记异常日" onclick="event.stopPropagation();setDayState('${key}','bad')">×</button>
            <button class="add-day" type="button" title="添加日期备注" onclick="event.stopPropagation();openNoteModal('${key}')">+</button>
          </div>
        </div>
        <div class="task-list" data-date="${key}">
          ${dayTasks.length ? dayTasks.map(renderTask).join("") : '<div class="empty-hint">双击添加任务，点 + 添加备注</div>'}
        </div>
        ${renderDayNotes(key, notes)}
      </article>`;
    }
    function renderTask(task) {
      const cat = getCategory(task.category);
      const showCategory = settings.taskDisplay === "category" || settings.taskDisplay === "note";
      const showNote = settings.taskDisplay === "note" && task.note;
      const blocks = getTaskBlocks(task);
      const visibleBlocks = blocks.filter(block => block.type === "image").slice(0, 3);
      const hasImage = blocks.some(block => block.type === "image");
      const progress = normalizeProgress(task.progress);
      const priority = normalizePriority(task.priority);
      const priorityClass = priority === "normal" ? "" : `priority-${priority}`;
      const priorityLabel = priority === "normal" ? "" : PRIORITIES[priority].name;
      return `<div class="task ${task.done ? "done" : ""} ${hasImage ? "has-image" : ""} ${priorityClass}" draggable="false" data-task-id="${task.id}" data-task-date="${task.date}" style="--cat-color:${cat.color};--cat-bg:${cat.bg}" ondblclick="event.stopPropagation();openModal('${task.date}','${task.id}')">
        <div class="task-main">
          ${visibleBlocks.length ? `<div class="task-content">${visibleBlocks.map(renderTaskBlock).join("")}</div>` : ""}
          <div class="task-title-wrap">
            <p class="task-title">${escapeHtml(task.title)}</p>
            <p class="task-title-more hidden">......</p>
          </div>
          ${showCategory ? `<span class="tag">${escapeHtml(cat.name)}</span>` : ""}
          ${priorityLabel ? `<span class="priority-tag ${priority}">${escapeHtml(priorityLabel)}</span>` : ""}
          ${progress ? `<span class="progress-tag">进度 ${progress}%</span>` : ""}
          ${showNote ? `<span class="note">${escapeHtml(task.note)}</span>` : ""}
        </div>
        <div class="task-actions">
          <button class="mini-btn good" type="button" title="${task.done ? "取消完成" : "完成"}" onclick="event.stopPropagation();toggleTask('${task.id}')">${task.done ? "↩" : "✓"}</button>
          <button class="mini-btn bad" type="button" title="删除" onclick="event.stopPropagation();deleteTask('${task.id}')">×</button>
        </div>
      </div>`;
    }

    function renderTaskBlock(block) {
      if (block.type === "image") return `<img class="task-image" src="${escapeAttr(block.src)}" alt="图片内容" loading="lazy" draggable="false" />`;
      if (block.type === "text") return `<p class="task-content-text">${escapeHtml(block.text)}</p>`;
      return "";
    }

    function updateTaskTitleOverflow() {
      requestAnimationFrame(() => {
        document.querySelectorAll(".task-title").forEach(title => {
          const more = title.nextElementSibling?.classList.contains("task-title-more") ? title.nextElementSibling : null;
          if (!more) return;
          const hasExplicitOverflow = (title.textContent || "").split(/\r?\n/).length > 3;
          const hasVisualOverflow = title.scrollHeight > title.clientHeight + 1;
          more.classList.toggle("hidden", !(hasExplicitOverflow || hasVisualOverflow));
        });
      });
    }

    function renderDayNotes(dateKey, notes = getVisibleNotesForDate(dateKey)) {
      if (!notes.length) return `<div class="day-notes" data-date="${dateKey}"></div>`;
      return `<div class="day-notes" data-date="${dateKey}">
        ${notes.map(renderDayNote).join("")}
      </div>`;
    }

    function renderDayNote(note) {
      return `<div class="day-note ${note.done ? "done" : ""}" data-note-id="${note.id}" data-note-date="${note.date}" ondblclick="event.stopPropagation();openNoteModal('${note.date}','${note.id}')">
        <p class="day-note-title">${escapeHtml(note.text)}</p>
        <div class="day-note-actions">
          <button class="mini-btn good" type="button" title="${note.done ? "取消完成" : "完成"}" onclick="event.stopPropagation();toggleDayNote('${note.id}')">${note.done ? "↩" : "✓"}</button>
          <button class="mini-btn bad" type="button" title="删除" onclick="event.stopPropagation();deleteDayNote('${note.id}')">×</button>
        </div>
      </div>`;
    }

    function getVisibleTasksForDate(key) {
      const query = els.searchInput.value.trim().toLowerCase();
      const category = els.categoryFilter.value;
      const status = els.statusFilter.value;
      return tasks
        .filter(task => task.date === key)
        .filter(task => category === "all" || task.category === category)
        .filter(task => status === "all" || (status === "done" ? task.done : !task.done))
        .filter(task => !query || task.title.toLowerCase().includes(query) || (task.note || "").toLowerCase().includes(query) || getTaskBlocks(task).some(block => block.type === "text" && block.text.toLowerCase().includes(query)))
        .sort(taskOrder);
    }

    function getVisibleNotesForDate(key) {
      const query = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      return dayNotes
        .filter(note => note.date === key)
        .filter(note => status === "all" || (status === "done" ? note.done : !note.done))
        .filter(note => !query || note.text.toLowerCase().includes(query))
        .sort(noteOrder);
    }

    function handlePointerDragStart(event) {
      beginUnifiedDrag(event, "pointer");
    }

    function handlePointerDragMove(event) {
      updateUnifiedDrag(event, "pointer");
    }

    function handlePointerDragEnd(event) {
      finishUnifiedDrag(event, "pointer");
    }

    function handleLegacyDragStart(event) {
      if (activeDrag) return;
      beginUnifiedDrag(event, "mouse");
    }

    function handleLegacyDragMove(event) {
      updateUnifiedDrag(event, "mouse");
    }

    function handleLegacyDragEnd(event) {
      finishUnifiedDrag(event, "mouse");
    }

    function beginUnifiedDrag(event, source) {
      if (!settings.dragEnabled || event.button !== 0 || activeDrag) return;
      if (event.target.closest("button, input, select, textarea, [contenteditable='true']")) return;
      const noteEl = event.target.closest(".day-note");
      const taskEl = noteEl ? null : event.target.closest(".task");
      const el = noteEl || taskEl;
      if (!el) return;
      const type = noteEl ? "note" : "task";
      activeDrag = {
        source,
        pointerId: source === "pointer" ? event.pointerId : null,
        type,
        id: type === "note" ? el.dataset.noteId : el.dataset.taskId,
        sourceDate: type === "note" ? el.dataset.noteDate : el.dataset.taskDate,
        startX: event.clientX,
        startY: event.clientY,
        x: event.clientX,
        y: event.clientY,
        active: false,
        copyMode: event.altKey,
        el,
        preview: null,
        targetDate: null,
        beforeId: null
      };
    }

    function updateUnifiedDrag(event, source) {
      if (!activeDrag || activeDrag.source !== source) return;
      if (source === "pointer" && activeDrag.pointerId !== event.pointerId) return;
      const distance = Math.hypot(event.clientX - activeDrag.startX, event.clientY - activeDrag.startY);
      if (!activeDrag.active && distance < 8) return;
      event.preventDefault();
      if (!activeDrag.active) activateUnifiedDrag(event);
      activeDrag.x = event.clientX;
      activeDrag.y = event.clientY;
      activeDrag.copyMode = event.altKey;
      activeDrag.preview?.classList.toggle("copy-mode", activeDrag.copyMode);
      moveDragPreview(event.clientX, event.clientY);
      updateUnifiedDropTarget(event.clientX, event.clientY);
    }

    function activateUnifiedDrag(event) {
      activeDrag.active = true;
      activeDrag.el.classList.add("dragging");
      if (Number.isInteger(event.pointerId)) {
        activeDrag.el.setPointerCapture?.(event.pointerId);
      }
      document.body.classList.add("dragging-task");
      activeDrag.preview = createDragPreview(activeDrag.el);
      moveDragPreview(event.clientX, event.clientY);
    }

    function finishUnifiedDrag(event, source) {
      if (!activeDrag || activeDrag.source !== source) return;
      if (source === "pointer" && activeDrag.pointerId !== event.pointerId) return;
      const drag = activeDrag;
      drag.copyMode = event.altKey || drag.copyMode;
      if (Number.isInteger(event.pointerId)) {
        drag.el.releasePointerCapture?.(event.pointerId);
      }
      if (drag.active) {
        suppressNextClick = true;
        const day = getDropDayAt(event.clientX, event.clientY);
        const targetDate = day?.dataset.date || drag.targetDate;
        if (targetDate) {
          const position = day ? getUnifiedDropPosition(day, drag.type, event.clientY) : { beforeId: drag.beforeId };
          if (drag.copyMode && drag.type === "task") copyTaskToDate(drag.id, targetDate, position.beforeId);
          if (drag.copyMode && drag.type === "note") copyNoteToDate(drag.id, targetDate, position.beforeId);
          if (!drag.copyMode && drag.type === "task") moveTaskToDate(drag.id, targetDate, position.beforeId);
          if (!drag.copyMode && drag.type === "note") moveNoteToDate(drag.id, targetDate, position.beforeId);
        }
      }
      activeDrag = null;
      cleanupUnifiedDrag(drag);
    }

    function createDragPreview(el) {
      const rect = el.getBoundingClientRect();
      const preview = el.cloneNode(true);
      preview.classList.add("drag-preview");
      preview.classList.toggle("copy-mode", activeDrag.copyMode);
      preview.classList.remove("dragging");
      preview.style.width = `${rect.width}px`;
      preview.style.height = `${rect.height}px`;
      preview.style.left = "0";
      preview.style.top = "0";
      preview.style.setProperty("--drag-offset-x", `${activeDrag.startX - rect.left}px`);
      preview.style.setProperty("--drag-offset-y", `${activeDrag.startY - rect.top}px`);
      document.body.appendChild(preview);
      return preview;
    }

    function moveDragPreview(clientX, clientY) {
      if (!activeDrag?.preview) return;
      const offsetX = Number.parseFloat(activeDrag.preview.style.getPropertyValue("--drag-offset-x")) || 0;
      const offsetY = Number.parseFloat(activeDrag.preview.style.getPropertyValue("--drag-offset-y")) || 0;
      activeDrag.preview.style.transform = `translate3d(${clientX - offsetX}px, ${clientY - offsetY}px, 0)`;
    }

    function updateUnifiedDropTarget(clientX, clientY) {
      const day = getDropDayAt(clientX, clientY);
      document.querySelectorAll(".day.drag-over").forEach(el => {
        if (el !== day) el.classList.remove("drag-over");
      });
      if (!day) {
        clearDropMarkers();
        return;
      }
      day.classList.add("drag-over");
      const position = getUnifiedDropPosition(day, activeDrag.type, clientY);
      activeDrag.targetDate = day.dataset.date;
      activeDrag.beforeId = position.beforeId;
      placeUnifiedDropMarker(day, activeDrag.type, position.beforeId);
    }

    function getDropDayAt(clientX, clientY) {
      const stack = document.elementsFromPoint(clientX, clientY);
      const sourceDay = activeDrag?.sourceDate ? document.querySelector(`.day[data-date="${activeDrag.sourceDate}"]`) : null;
      for (const el of stack) {
        if (el.closest?.(".drag-preview, .dragging, .drop-marker, .note-drop-marker")) continue;
        const day = el.closest?.(".day");
        if (day) {
          if (activeDrag?.type === "note" && sourceDay && day !== sourceDay) {
            const sourceRect = sourceDay.getBoundingClientRect();
            const stillSortingNearSource =
              clientX >= sourceRect.left &&
              clientX <= sourceRect.right &&
              clientY >= sourceRect.top - 24 &&
              clientY <= sourceRect.bottom + 90 &&
              Math.abs(clientX - activeDrag.startX) < 72;
            if (stillSortingNearSource) return sourceDay;
          }
          return day;
        }
      }
      return null;
    }

    function getUnifiedDropPosition(day, type, clientY) {
      const selector = type === "note" ? ".day-note:not(.dragging)" : ".task:not(.dragging)";
      const idName = type === "note" ? "noteId" : "taskId";
      const items = [...day.querySelectorAll(selector)];
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) return { beforeId: el.dataset[idName] };
      }
      return { beforeId: null };
    }

    function placeUnifiedDropMarker(day, type, beforeId) {
      const list = day.querySelector(type === "note" ? ".day-notes" : ".task-list");
      if (!list) return;
      const markerClass = type === "note" ? "note-drop-marker" : "drop-marker";
      const itemSelector = type === "note" ? ".day-note" : ".task";
      const idAttr = type === "note" ? "noteId" : "taskId";
      const existing = list.querySelector(`.${markerClass}`);
      const beforeEl = beforeId ? [...list.querySelectorAll(itemSelector)].find(el => el.dataset[idAttr] === beforeId) : null;
      if (existing && existing.nextElementSibling === beforeEl) return;
      animateListChange(list, () => {
        clearDropMarkers();
        const marker = document.createElement("div");
        marker.className = markerClass;
        list.insertBefore(marker, beforeEl || null);
      });
    }

    function animateListChange(list, mutate) {
      const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
      if (reduceMotion) {
        mutate();
        return;
      }
      const items = [...list.querySelectorAll(".task:not(.dragging), .day-note:not(.dragging)")];
      const before = new Map(items.map(el => [el, el.getBoundingClientRect()]));
      mutate();
      requestAnimationFrame(() => {
        for (const el of items) {
          const first = before.get(el);
          if (!first || !el.isConnected) continue;
          const last = el.getBoundingClientRect();
          const dx = first.left - last.left;
          const dy = first.top - last.top;
          if (!dx && !dy) continue;
          el.style.transition = "none";
          el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
          requestAnimationFrame(() => {
            el.style.transition = "transform .18s cubic-bezier(.2,.8,.2,1)";
            el.style.transform = "translate3d(0,0,0)";
            setTimeout(() => {
              el.style.transition = "";
              el.style.transform = "";
            }, 210);
          });
        }
      });
    }

    function clearDropMarkers() {
      document.querySelectorAll(".drop-marker, .note-drop-marker").forEach(el => el.remove());
    }

    function cleanupUnifiedDrag(drag) {
      drag.el.classList.remove("dragging");
      drag.preview?.remove();
      document.body.classList.remove("dragging-task");
      document.querySelectorAll(".day.drag-over").forEach(el => el.classList.remove("drag-over"));
      clearDropMarkers();
    }
    function moveTaskToDate(taskId, targetDate, beforeId = null) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || !targetDate) return false;
      const oldDate = task.date;
      task.date = targetDate;
      reorderDateTasks(targetDate, taskId, beforeId);
      if (oldDate !== targetDate) reorderDateTasks(oldDate);
      persist();
      renderVisibleWeeks();
      showToast(oldDate === targetDate ? "已调整顺序" : `已移动到 ${targetDate.slice(5)}`);
      return true;
    }

    function moveNoteToDate(noteId, targetDate, beforeId = null) {
      const note = dayNotes.find(item => item.id === noteId);
      if (!note || !targetDate) return false;
      const oldDate = note.date;
      note.date = targetDate;
      reorderDateNotes(targetDate, noteId, beforeId);
      if (oldDate !== targetDate) reorderDateNotes(oldDate);
      persistDayData();
      renderVisibleWeeks();
      showToast(oldDate === targetDate ? "备注顺序已调整" : `备注已移动到 ${targetDate.slice(5)}`);
      return true;
    }

    function copyTaskToDate(taskId, targetDate, beforeId = null) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || !targetDate) return false;
      const copy = {
        ...task,
        id: createId(),
        date: targetDate,
        done: false,
        priority: normalizePriority(task.priority),
        createdAt: Date.now(),
        sortIndex: nextSortIndex(targetDate),
        contentBlocks: getTaskBlocks(task).map(block => ({ ...block, createdAt: Number(block.createdAt) || Date.now() }))
      };
      const progress = normalizeProgress(task.progress);
      if (progress) copy.progress = progress;
      else delete copy.progress;
      tasks.push(copy);
      reorderDateTasks(targetDate, copy.id, beforeId);
      persist();
      renderVisibleWeeks();
      showToast(`已复制到 ${targetDate.slice(5)}`);
      return true;
    }

    function copyNoteToDate(noteId, targetDate, beforeId = null) {
      const note = dayNotes.find(item => item.id === noteId);
      if (!note || !targetDate) return false;
      const copy = {
        ...note,
        id: createId(),
        date: targetDate,
        done: false,
        createdAt: Date.now(),
        sortIndex: nextNoteSortIndex(targetDate)
      };
      dayNotes.push(copy);
      reorderDateNotes(targetDate, copy.id, beforeId);
      persistDayData();
      renderVisibleWeeks();
      showToast(`已复制到 ${targetDate.slice(5)}`);
      return true;
    }

    function reorderDateTasks(dateKey, movedId = null, beforeId = null) {
      const ordered = tasks
        .filter(item => item.date === dateKey && item.id !== movedId)
        .sort(taskOrder);
      const moved = movedId ? tasks.find(item => item.id === movedId) : null;
      if (moved && moved.date === dateKey) {
        const targetIndex = beforeId ? ordered.findIndex(item => item.id === beforeId) : -1;
        ordered.splice(targetIndex >= 0 ? targetIndex : ordered.length, 0, moved);
      }
      ordered.forEach((item, index) => {
        item.sortIndex = index;
      });
    }

    function reorderDateNotes(dateKey, movedId = null, beforeId = null) {
      const ordered = dayNotes
        .filter(item => item.date === dateKey && item.id !== movedId)
        .sort(noteOrder);
      const moved = movedId ? dayNotes.find(item => item.id === movedId) : null;
      if (moved && moved.date === dateKey) {
        const targetIndex = beforeId ? ordered.findIndex(item => item.id === beforeId) : -1;
        ordered.splice(targetIndex >= 0 ? targetIndex : ordered.length, 0, moved);
      }
      ordered.forEach((item, index) => {
        item.sortIndex = index;
      });
    }

    function setDayState(dateKey, state) {
      if (!isDateKey(dateKey)) return;
      if (dayStates[dateKey] === state) {
        delete dayStates[dateKey];
      } else {
        dayStates[dateKey] = state;
      }
      persistDayData();
      renderVisibleWeeks();
      showToast(dayStates[dateKey] === "good" ? "已标记为淡绿色" : dayStates[dateKey] === "bad" ? "已标记为淡红色" : "已取消日期标记");
    }

    function handleDocumentClick(event) {
      if (suppressNextClick) {
        suppressNextClick = false;
        event.preventDefault();
        return;
      }
      if (event.target.closest(".modal, button, input, select, textarea, .task, .day-note")) return;
      const day = event.target.closest(".day");
      if (!day) return;
      selectDate(day.dataset.date);
      showToast(`已选中 ${selectedDateKey.slice(5)}，按 Ctrl+C 复制当天事项`);
    }

    function selectDate(dateKey) {
      selectedDateKey = dateKey;
      document.querySelectorAll(".day.selected-day").forEach(el => el.classList.remove("selected-day"));
      document.querySelectorAll(`.day[data-date="${dateKey}"]`).forEach(el => el.classList.add("selected-day"));
    }

    function handleDocumentCopy(event) {
      if (!selectedDateKey) return;
      if (hasActiveTextSelection()) return;
      if (isCopyFromEditableContext()) return;
      const rows = getCopyRowsForDate(selectedDateKey);
      if (!rows.length) {
        showToast("当天没有可复制的用户内容");
        return;
      }
      const text = buildDateCopyText(selectedDateKey, rows);
      event.clipboardData.setData("text/plain", text);
      event.clipboardData.setData("text/html", buildDateCopyHtml(selectedDateKey, rows));
      event.preventDefault();
      showToast(`已复制 ${rows.length} 条用户内容`);
    }

    function hasActiveTextSelection() {
      const selection = window.getSelection?.();
      if (!selection || selection.rangeCount === 0) return false;
      return selection.toString().trim().length > 0;
    }

    function isCopyFromEditableContext() {
      const el = document.activeElement;
      if (!el) return false;
      if (["INPUT", "TEXTAREA", "SELECT"].includes(el.tagName)) return true;
      return Boolean(el.closest?.(".modal, [contenteditable='true']"));
    }

    function buildDateCopyText(dateKey, rows) {
      const lines = [];
      let number = 1;
      rows.forEach(row => {
        const parts = getUserTextParts(row);
        if (!parts.length) return;
        lines.push(`${number}. ${parts.shift()}`);
        parts.forEach(part => lines.push(part));
        number += 1;
      });
      return lines.join("\n").trim();
    }

    function getTasksForDate(dateKey) {
      return tasks.filter(task => task.date === dateKey).sort(taskOrder);
    }

    function getNotesForDate(dateKey) {
      return dayNotes.filter(note => note.date === dateKey).sort(noteOrder);
    }

    function getCopyRowsForDate(dateKey) {
      return getTasksForDate(dateKey)
        .map(item => ({ type: "task", item }))
        .filter(row => getUserTextParts(row).length || getUserImageBlocks(row).length);
    }

    function buildDateCopyHtml(dateKey, rows) {
      const parts = ["<ol>"];
      rows.forEach(row => {
        const textParts = getUserTextParts(row);
        const imageBlocks = getUserImageBlocks(row);
        parts.push("<li>");
        textParts.forEach((text, index) => {
          parts.push(index === 0 ? `<strong>${escapeHtml(text)}</strong>` : `<p>${escapeHtml(text).replace(/\n/g, "<br>")}</p>`);
        });
        imageBlocks.forEach(block => {
          if (block.type === "text") parts.push(`<p>${escapeHtml(block.text).replace(/\n/g, "<br>")}</p>`);
          if (block.type === "image") parts.push(`<div><img src="${escapeAttr(block.src)}" style="max-width:420px;height:auto;" /></div>`);
        });
        parts.push("</li>");
      });
      parts.push("</ol>");
      return parts.join("");
    }

    function getUserTextParts(row) {
      if (row.type === "note") return [row.item.text].filter(Boolean);
      const task = row.item;
      const textBlocks = getTaskBlocks(task).filter(block => block.type === "text").map(block => block.text).filter(Boolean);
      const hasImages = getTaskBlocks(task).some(block => block.type === "image");
      const fallbackTitle = hasImages && task.title === "图片事项" ? "" : task.title;
      const parts = textBlocks.length ? [...textBlocks] : [fallbackTitle].filter(Boolean);
      if (task.note) parts.push(task.note);
      const progress = normalizeProgress(task.progress);
      if (progress) parts.push(`${progress}%`);
      return parts;
    }

    function getUserImageBlocks(row) {
      if (row.type !== "task") return [];
      return getTaskBlocks(row.item).filter(block => block.type === "image");
    }

    function setupInfiniteScroll() {
      const bottomObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) appendWeeks(8);
      }, { rootMargin: "700px 0px" });
      const topObserver = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) prependWeeks(8);
      }, { rootMargin: "700px 0px" });
      bottomObserver.observe(els.bottomSentinel);
      topObserver.observe(els.topSentinel);
    }

    function appendWeeks(count) {
      if (loadingMore || !lastSunday) return;
      loadingMore = true;
      const cursor = new Date(lastSunday);
      cursor.setDate(cursor.getDate() + 1);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      const newLast = new Date(cursor);
      newLast.setDate(newLast.getDate() - 1);
      lastSunday = newLast;
      els.weeks.insertAdjacentHTML("beforeend", html);
      loadingMore = false;
    }

    function prependWeeks(count) {
      if (loadingMore || !firstMonday) return;
      loadingMore = true;
      const beforeTop = els.weeks.getBoundingClientRect().top;
      const start = new Date(firstMonday);
      start.setDate(start.getDate() - count * 7);
      const cursor = new Date(start);
      let html = "";
      for (let i = 0; i < count; i++) {
        const week = getWeekDates(cursor);
        html += renderWeek(week);
        cursor.setDate(cursor.getDate() + 7);
      }
      firstMonday = start;
      els.weeks.insertAdjacentHTML("afterbegin", html);
      const afterTop = els.weeks.getBoundingClientRect().top;
      window.scrollBy(0, afterTop - beforeTop);
      loadingMore = false;
    }

    function jumpMonth(delta) {
      const target = new Date(currentYear, currentMonth + delta, 1);
      currentYear = target.getFullYear();
      currentMonth = target.getMonth();
      ensureMonthRendered(target);
      setTimeout(() => scrollToMonth(target), 40);
    }

    function goToday() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      ensureMonthRendered(today);
      setTimeout(() => scrollToDate(today, true), 40);
    }

    function goCurrentMonth() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      ensureMonthRendered(today);
      setTimeout(() => scrollToMonth(new Date(today.getFullYear(), today.getMonth(), 1)), 40);
    }

    function scrollToTodayOnBoot() {
      const today = new Date();
      const run = () => {
        ensureMonthRendered(today);
        scrollToDate(today, false);
      };
      run();
      requestAnimationFrame(() => {
        run();
        setTimeout(() => {
          if (!isDateInView(today)) run();
        }, 180);
      });
    }

    function restoreViewState(state) {
      const next = normalizeViewState(state);
      if (!next) {
        bootAutoScrollActive = true;
        scrollToTodayOnBoot();
        return;
      }
      restoringViewState = true;
      const target = new Date(next.year, next.month, 1);
      ensureMonthRendered(target);
      const restore = () => {
        const max = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
        let top = next.scrollY;
        if (next.anchorDate && isDateKey(next.anchorDate)) {
          ensureDateRendered(parseKey(next.anchorDate));
          const anchorCell = document.querySelector(`.day[data-date="${next.anchorDate}"]`);
          const anchorWeek = anchorCell?.closest(".week");
          if (anchorWeek) {
            const weekTop = anchorWeek.getBoundingClientRect().top + window.scrollY;
            top = weekTop + next.anchorOffset;
          }
        }
        window.scrollTo({ top: clamp(top, 0, max), behavior: "auto" });
        updateMonthFromScroll();
      };
      restore();
      requestAnimationFrame(() => {
        restore();
        setTimeout(() => {
          restore();
          setTimeout(() => {
            restoringViewState = false;
          }, 700);
        }, 180);
      });
    }

    function cancelBootAutoScroll() {
      bootAutoScrollActive = false;
    }

    function ensureMonthRendered(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      if (document.querySelector(`.week[data-month="${key}"]`)) return;
      renderAround(date);
    }

    function scrollToMonth(date) {
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      const week = document.querySelector(`.week[data-month="${key}"]`);
      if (!week) return;
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: "smooth" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function scrollToDate(date, smooth) {
      const key = toKey(date);
      const cell = document.querySelector(`.day[data-date="${key}"]`);
      if (!cell) return;
      const week = cell.closest(".week");
      const top = week.getBoundingClientRect().top + window.scrollY - getStickyOffset() - 8;
      window.scrollTo({ top, behavior: smooth ? "smooth" : "auto" });
      updateMonthLabel(date.getFullYear(), date.getMonth());
    }

    function isDateInView(date) {
      const cell = document.querySelector(`.day[data-date="${toKey(date)}"]`);
      if (!cell) return false;
      const rect = cell.getBoundingClientRect();
      const topLimit = getStickyOffset();
      return rect.top >= topLimit && rect.top < window.innerHeight * 0.72;
    }

    function updateMonthFromScroll() {
      const weeks = document.querySelectorAll(".week");
      const threshold = getStickyOffset() + 14;
      for (const week of weeks) {
        const rect = week.getBoundingClientRect();
        if (rect.top <= threshold && rect.bottom > threshold) {
          const [year, month] = week.dataset.month.split("-").map(Number);
          updateMonthLabel(year, month);
          return;
        }
      }
      const first = weeks[0];
      if (first) {
        const [year, month] = first.dataset.month.split("-").map(Number);
        updateMonthLabel(year, month);
      }
    }

    function updateMonthLabel(year, month) {
      currentYear = year;
      currentMonth = month;
      els.monthLabel.textContent = `${year}年${month + 1}月`;
    }

    function captureViewState() {
      const anchor = getCurrentViewAnchor();
      return normalizeViewState({
        year: currentYear,
        month: currentMonth,
        scrollY: Math.max(0, Math.round(window.scrollY || 0)),
        savedAt: Date.now(),
        anchorDate: anchor?.date || null,
        anchorOffset: anchor?.offset || 0
      });
    }

    function getCurrentViewAnchor() {
      const threshold = getStickyOffset() + 14;
      const weeks = [...document.querySelectorAll(".week")];
      let candidate = weeks.find(week => {
        const rect = week.getBoundingClientRect();
        return rect.top <= threshold && rect.bottom > threshold;
      }) || weeks.find(week => week.getBoundingClientRect().bottom > threshold) || weeks[0];
      if (!candidate) return null;
      const dates = JSON.parse(candidate.dataset.dates || "[]");
      const date = dates[0];
      if (!isDateKey(date)) return null;
      const weekTop = candidate.getBoundingClientRect().top + window.scrollY;
      return {
        date,
        offset: Math.max(0, Math.round((window.scrollY - weekTop) || 0))
      };
    }

    function saveCurrentViewState() {
      if (restoringViewState) return;
      const next = captureViewState();
      if (!next) return;
      const previous = viewState;
      if (previous && previous.year === next.year && previous.month === next.month && Math.abs(previous.scrollY - next.scrollY) < 4) return;
      viewState = next;
      settings.viewState = next;
      saveViewStateLocal(next);
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      queueCloudSave();
    }

    function saveCurrentViewStateImmediate() {
      if (restoringViewState) return;
      const next = captureViewState();
      if (!next) return;
      viewState = next;
      settings.viewState = next;
      saveViewStateLocal(next);
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }
